  - {type: variant, offset: 1275, length: 465, content: 也海外南經圖讚自此山來蟲爲蛇蛇號爲魚賤無定貢貴無常珍物不自物自物由人萬事皆然豈伊蛇鱗羽民國鳥喙長頰羽生則卵矯翼而翔龍飛不遠人維倮屬何狀之反神人二八羽民之東有神司夜二八連臂自相羈駕晝隱宵出詭時淪化讙頭國讙國鳥喙行則杖羽潜于海濱維食𥝗秬實維嘉穀所謂濡黍厭火國有人獸體厥狀怪譎吐納炎精火隨氣烈推之無竒理有不熱三珠樹三珠所生赤水之際翹葉栢竦美壯若彗濯彩丹波自相霞映臷國不蠶不絲不稼不穡百獸率儛羣鳥拊翼是號臷民自然衣食貫匈交脛支舌國鑠金洪爐灑成萬品造物無私各任所禀歸於曲成是見兆朕不死國有人爰處員丘之上赤泉駐年神木養命禀此遐齡悠悠無竟鑿齒鑿齒人類實有傑牙猛越九嬰害過長蛇堯乃命羿斃之壽華三首國雖云一氣呼吸異道觀則俱見食則皆飽物形自周造化非巧焦僥國羣籟舛吹氣有萬殊大人三丈焦僥尺餘混之一歸此亦僑如長臂國雙肱三尺體如中人彼曷爲者長臂之民脩脚是負捕魚海濱狄山帝堯葬于陽帝嚳葬于隂聖德廣被物無不懷爰乃殂落封墓表哀異類猶然矧乃華黎視肉聚肉有眼而無腸胃與彼馬勃頗相髣髴奇在不盡食人薄味南方祝融祝融火神雲駕龍驂氣御朱明正陽是舍作配炎帝列位于南山海經卷之六, SBCK: ''}
