  - {type: variant, offset: 8345, length: 1485, content: 西山經圖讚羬羊月氏之羊其類甚野厥高六尺尾赤如馬何以審之事見爾雅太華山華嶽靈峻削成四方爰有神女是挹玉漿其誰由之龍駕雲裳肥遺蛇肥遺爲物與災合契鼓翼陽山以表亢厲桑林既禱倏忽潜逝䳋渠赤鷩鳥文莖木鴖鳥䳋渠已殃赤鷩辟火文莖愈聾是則嘉果鴖亦衛災厥形惟麽流赭沙則潜流亦有運赭干以求鐵趍在其下蠲牛之癘作采于社豪彘剛鬛之族號曰豪彘毛如攢錐中有激矢厥體兼資自爲牝牡黃雚草肥遺鳥囂獸浴疾之草厥子赭赤肥遺似鶉其肉已疫囂獸長臂爲物好擲橐𨛬有鳥人面一脚孤立性與時反冬出夏蟄帶其羽毛迅雷不入桃枝嶓冢美竹厥号桃枝叢薄幽藹從容鬱猗簟以安寢杖以扶危杜衡狌狌犇人杜衡走馬理固須因體亦有假足駿在感安事御者蓇容草邊谿獸櫟鳥前作蓇蓉前作谿邊有華無實蓇容之樹邊谿類狗皮厭妖蠱黑文赤翁鳥愈隱痔鸚䳇慧鳥青羽赤喙譽石禀氣方殊件錯理微譽石殺鼠蠶食而肥性雖反齊之一歸𤣎如𤣎如之獸鹿狀四角馬足人手其尾則白貌兼三形攀木縁石鸚䳇鸚䳇慧鳥栖林喙桑四指中分行則以觜自貽伊籠見幽坐趾數斯鳥𤛎獸鸓鳥數斯人脚厥狀似鴟𤛎獸大眼有鳥名鸓兩頭四足翔若合飛鸞鳥鸞翔女牀鳳出丹穴拊翼相和以應聖哲擊石靡詠韶音其絶鳧徯鳥朱厭獸鳧徯朱厭見則有兵類異感同理不虚行推之自然厥數難明蠻蠻比翼之鳥似鳧青赤雖云一形氣同體隔延頸離鳥翻飛合翮丹木玉膏丹木煒燁沸沸玉膏黄軒是服遂攀龍豪眇然升遐羣下烏號瑾瑜玉鍾山之寳爰有玉華符彩流映氣如虹霞君子是佩象德閑邪鍾山之子鼓欽䲹欽䲹及鼓是殺祖江帝乃戮之崑崙之東二子皆化矯翼亦同鰩魚見則邑穰厥名曰鰩經營二海矯翼閑霄唯味之奇見歎伊巵神英招槐江之山英招是主巡遊四海撫翼雲儛實惟帝囿有謂玄圃揺木揺惟靈樹爰生若木重根增駕流光旁燭食之靈化榮名仙録崑崙丘崑崙月精水之靈府惟帝下都西老之宇嶸然中峙号曰天柱神陸吾肩吾得一以處崑崙開明是對司帝之門吐納靈氣熊熊魂魂土螻獸欽原鳥土螻食人四角似羊欽原類蜂大如鴛鴦觸物則斃其銳難當沙棠安得沙棠制爲龍丹汎彼滄海眇然遐遊聊以逍遥任波去留鶉鳥沙棠實𦿜草司帝百服其鳥名鶉沙棠之實惟果是珍爰有奇菜厥号曰𦿜神長乗九德之氣是生長乗人狀犳尾其神則凝妙物自潜世無得稱西王母天帝之女蓬髮虎顔穆王執贄賦詩交歡韻外之事難以具言積石積石之中實出重河夏后是導石門涌波珍物斯備比奇崑阿白帝少昊少昊之帝號曰金天磈氏之宫亦在此山是司日入其景則圓狰章莪之山奇怪所宅有獸似豹厥色惟赤五尾一角鳴如擊石畢方畢方赤文離精是炳旱則高翔鼓翼陽景集乃流災火不炎正文貝先民有作龜貝爲貨貝以文彩賈以大小簡則易從犯而不過天狗乾麻不長天狗不大厥質雖小攘災除害氣之相王在乎食帶三青鳥山名三危青鳥所解往來崑崙王母是隸穆王西征旋軫斯地江疑獓𤝱獸𪇱鳥江疑所居風雲是潜獸有獓𤝱毛如披蓑𪇱鳥一頭厥身則兼神耆童顓頊之子嗣作火正鏗鎗其鳴聲如鍾磬處于騩山唯靈之盛帝江質則混沌神則旁通自然靈照聽不以聦强爲之名曰在帝江獂獸鵸鵌鳥鵸鵌三頭獂獸三尾俱禦不祥消凶辟眯君子服之不逢不韙當扈鳥飛以翼當扈則鬚廢多任少沛然有餘輪運於轂至用在無白狼矯矯白狼有道則遊應符變質乃銜靈鈎惟德是適出殷見周白虎甝之虎仁而有猛其質載皓其文載炳應德而擾止我交境駮駮惟馬類實畜之英騰髦驤首噓天雷鳴氣無馮凌吞虎辟兵神𩲫蠻蠻髯遺魚前作冉遺其音如吟一脚人面鼠身鼈頭厥號曰蠻目如馬耳食厭妖變欀木欀之爲木厥形似槤若能長服拔樹排山力則有之壽則宜然鳥鼠同穴山䳜鼵二蟲殊類同歸聚不以方或走或飛不然之然難以理推𩶯魮魚形如覆銚包玉含珠有而不積泄以尾閭闇與道會可謂竒魚丹木爰有丹木生彼淆盤厥實如瓜其味甘酸蠲痾辟火用竒桂蘭窮竒獸蠃魚孰湖獸窮竒如牛蝟毛自表濛水之蠃匪魚伊鳥孰湖之獸見人則抱鰠魚物以感應亦有數動壯士挺劎氣激白虹鰠魚潜淵出則邑悚山海經卷之二, SBCK: ''}
