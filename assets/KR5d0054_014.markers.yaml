  body:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 大荒東經第十四郭氏傳東海之外大壑謂此壑也離騷曰降土大壑詩含神霧曰東注無底之谷少昊之國帝摰之號也少昊金天氏少昊孺帝顓頊於此未詳孺義棄其琴瑟有琴瑟也言其壑中有甘山者甘水出焉生甘淵成淵也水積則大荒東南隅有山名皮母地丘東海之外大荒之中有山名曰大言日月所出有波谷山者有大人之國縣南廿里之鷔陂中民周虎張永嘉二年有鶖鳥集于始安者人身應長一丈五六尺也又平州别駕髙會語云得之木矢貫之鐵錄其長六尺有半以箭計之其射形狀似胡盖是長翟别種箭殆將從此國来也外傳倭國人甞行遭風吹度大海外見一國人皆長丈餘也案河圖玉版曰從崑崙以北九萬里得龍伯國人曰焦僥人長三尺短之至也長者不過十丈數之極長十丈皆衣帛從此以東十萬里得佻人國長三十長三十丈生萬八千歳而死從崑崙以東得大秦人傳曰長翟身横九畆下其頭眉見於軾即長一丈人丈五尺從此以東十萬里得中秦國人長一丈穀梁斯以言則此大人之長短未可得限度也也秦時大人見臨兆身長五丈脚跡六尺凖有大人之市名曰大人之堂人時集㑹其上作市肆也亦山名形扶如堂室耳大有一大人踆其上張其兩耳莊子曰踆於㑹稽也踆或作俊皆古蹲字有小人國名靖人殆謂此小人也或作竫音同詩含神霧曰東北極有人長九寸神人靣獸身名曰犁之尸靈字音有潏山楊水出焉詐之譎音如譎有蒍國黍食榖也蒍音口偽反言此國中惟有黍使四鳥虎豹熊羆大荒之中有山名曰合虚日月所出有中容之國帝俊生中容假借音也俊亦舜字中容人食獸木實木玄木其華此國中有赤氏春秋實葉見吕使四鳥豹虎熊羆有東口之山有君子之國其人衣冠帶劔好謙譲也亦使虎豹有司幽之國帝俊生晏龍晏龍生司幽司幽生思士不妻思女不夫子此莊生所謂白鵠相視眸子不運言其人直思感而氣通無配合而生之也而感風化食黍食獸是使四鳥有大阿之山者大荒中有山名曰明星日月所出有白民之國帝俊生帝鴻帝鴻生白民白民銷姓黍食使四鳥虎豹熊羆之以致壽考也又有乘黄獸乘有青丘之國有狐九尾而為瑞也太平則出有柔僕民是維嬴土之國也音盈蠃猶沃衍有黑齒之國漆也齒如帝俊生黑齒人聖之人諸言生者多謂其苖裔未必是親所産神化無方故其後世所降育多有殊異狀姜姓黍食使四鳥有夏州之國有盖余之國有神人八首人靣虎身十尾名曰天吴伯水大荒之中有山名曰鞠陵于天菊音東極離瞀也音榖三山名瞀日月所出名曰折丹人神東方曰折之單吁來風曰俊所在也未詳來風處東極以出入風風氣時其出入言此人節宣東海之渚中島渚有神人面鳥身珥兩黄蛇貫耳以蛇踐兩黄蛇名曰禺䝞黄帝生禺禺生禺京彊也即禺禺京處北海禺處東海是惟海神神也一本作號言分治一海而為有招揺山融水出焉有國曰玄股下如漆自髀以黍食使四鳥有困民國勾姓而食有人曰王亥兩手操鳥方食其頭王亥託于有易河伯僕牛託寄也見汲郡竹書河伯僕牛皆人姓名有易殺王亥取僕牛滛焉有易之君綿臣殺而放之竹書曰殷王子亥賔于有易而伐有易滅之遂殺其君綿臣也是故殷王甲㣲假師于河伯以河念有易有易潜出為國於獸方食之名曰揺民王甲徴殷之賢王假師言有易本與河伯友善哀念有易使得潛化而出化為揺民國以義伐罪故河伯不得不助滅之暨而帝舜生戯戯生揺民海内有兩人所化作也此乃有易名曰女丑尸言其變即女丑之而不之觸感而寄迹矣范蠡之倫亦聞其風者也化無常也然則一以渉化津而遯神域者亦無徃女丑有大里也廣千大荒之中有山名曰孽揺頵羝上有扶木柱三百里其葉如芥葉似芥菜柱猶起高也有谷曰温源谷湯谷也温源即湯谷上有扶木在上扶桑一日方至一日方出相代也言交㑹皆載於烏足烏中有三有神人面犬耳獸身珥兩青蛇名曰奢比尸有五彩之鳥相郷棄沙沙義未聞惟帝俊下友聞也亦未帝下兩壇彩鳥是司壇五彩鳥主之言山下有舜二大荒之中有山名曰猗天蘇門日月所生有壎民之國譁之諠音如諠有綦山忌音又有揺山有䰝山甑之甑音如釡又有門戸山又有盛山又有待山有五彩之鳥東荒之中有山名曰壑明俊疾日月所出有中容之國東北海外又有三青馬三騅毛為騅馬蒼白雜甘華爰有遺玉三青鳥三騅視肉有眼聚肉甘華甘柤百榖所在自言也生有女和月母之國有人名曰婉音北方曰來之風曰名也音剡言亦有兩是處東極隅以止日月使無相間出没司其短長得相間錯知景之短長言主察日月出入不令大荒東北隅中有山名曰凶犁土丘應龍處南極龍應者也龍有翼殺尤與夸父兵者尤作不得復上住地下應龍遂故下數旱者故也上無復作旱而為應龍之狀乃得大雨土龍今之感非人所為者本此氣應自然東海中有流波山入海七千里其上有獸状如牛蒼身而無角一足出入水則必風雨其光如日月其聲如雷其名曰䕫黄帝得之以其皮為皷橛以雷獸之骨身皷其腹者橛猶擊也雷獸即雷神也人面龍聲聞五百里以威天下}
