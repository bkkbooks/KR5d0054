  - {type: variant, offset: 5887, length: 838, content: 北山經圖讚水馬馬寔龍精爰出水類渥洼之駿是靈是瑞昔在夏后亦有何駟儵魚涸和損平莫慘於憂詩詠萱草帶山則儵壑焉遺岱聊以盤遊臞疏獸鵸䳜鳥何羅魚厭火之獸厥名䑏疏有鳥自化號曰鵸䳜一頭十身何羅之魚孟槐孟槐似貆其豪則赤列象畏獸凶邪是辟氣之相勝莫見其迹鰼鰼魚鼓翮一揮十翼翩飜厥鳴如鵲鱗在羽端是謂怪魚食之辟燔橐駝駝惟奇畜肉鞍是被迅鶩流沙顯功絶地潜識泉源微乎其智耳鼠蹠實以足排虚以羽翹尾飜飛奇哉耳鼠厥皮惟良百毒是禦幽頞幽頞似猴俾愚作智觸物則笑見人佯睡好用小慧終是嬰繫寓鳥孟極足訾獸鼠而傅翼厥聲如羊孟極似豹或倚無良見人則呼號曰足訾鵁鳥毛如雌雉朋翔羣下飛則籠日集則蔽野肉驗鍼石不勞補寫諸犍獸白鵺竦斯鳥諸犍善吒行則銜尾白鵺竦斯厥狀如雉見人則跳頭文如繡磁石磁石吸鐵瑇瑁取芥氣有潜感數亦冥會物之相投出乎意外旄牛牛充兵機兼之者旄冠于旌鼓爲軍之標匪肉致災亦毛之招長蛇長蛇百尋厥鬛如彘飛羣走類靡不吞噬極物之惡盡毒之厲山𤟤山𤟤之獸見人歡謔性善厥投行如矢激是惟氣精出則風作窫窳諸懷獸䲃魚肥遺蛇翼窳諸懷是則害人䲃之爲狀羊鱗黑文肥遺之蛇一頭兩身鮆魚陽鑒動日土蛇致宵微哉鮆魚食則不驕物在所感其用無褾狍鴞狍鴞貪惏其目在腋食人未盡還自齦割圖形妙鼎是謂不若狕閭𩣡馬獨𤞞有獸如豹厥文惟縟閭善躍嶮𩣡馬一角虎狀馬尾號曰獨𤞞𪄀𪃑禦暍之鳥厥名𪄀𪃑昏明是互晝隱夜覿物貴應用安事鸞鵠居暨獸囂鳥三桑居暨豚鳴如彙赤毛四翼一目其名曰囂三桑無枝厥樹唯高䮝獸䮝獸四角馬尾有距涉歷歸山騰嶮躍岨厥貌惟奇如是旋舞天馬龍馮雲遊騰蛇假霧未若天馬自然凌翥有理懸運天機潜御鶌居前鶋鶌居如烏青身黃足食之不飢可以辟穀内厥唯珍配彼丹木飛鼠或以尾翔或以髯凌飛鼠鼓翰翛然背騰用無惟神是馮䴅象蛇䱤父魚有鳥善驚名曰䴅䴅象蛇似雉自生子孫䱤父魚首厥體如豚酸與景山有鳥禀形殊類厥狀如蛇脚二翼四見則邑恐食之不醉鴣𪄶黄鳥鴣𪄶之鳥食之不瞧爰有黄鳥其鳴自叫婦人是服矯情易操精衛炎帝之女化爲精衛沈所東海靈爽西邁乃銜木石以堙波海䍶䍶羆九獸大蛇䍶䍶似羊眼在耳後竅生尾上號曰羆九幽都之山大蛇牛呴山海經卷之三, SBCK: ''}
