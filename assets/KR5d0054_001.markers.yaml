  - {type: variant, offset: 3052, length: 656, content: 南山經圖讚桂桂生南裔枝華岑嶺廣莫熙葩凌霜津穎氣王百藥森然雲挺迷穀爰有奇樹産自招搖厥華流光上映垂霄佩之不惑潜有靈標狌狌前作生狌狌似猴走立行伏欀木挺力少辛明目飛廉迅足豈食斯肉水玉水玉沐浴潜映洞淵赤松是服靈蜕乗煙吐納六氣昇降九天白猿白猿肆巧由基撫弓應吁而號神有先中數如循環其妙無窮鹿蜀鹿蜀之獸馬質虎文驤首吟鳴矯足騰羣佩其皮毛子孫如雲鯥魚号曰鯥處不在水厥狀如牛鳥翼蛇尾隨時隱見倚乎生死類類之爲獸一體兼二近取諸身用不假器窈窕是佩不知妬忌猼𧦧猼𧦧似羊眼反在背視之則奇推之無怪若欲不恐厥皮可佩祝荼草旋龜𪁺𩿧魚祝荼嘉草食之不飢鳥首蚖尾其名旋龜𪁺𩿧六足三翅並翬灌灌鳥赤鱬厥聲如訶厥形如鳩佩之辨惑出自青丘赤鱬之物魚身人頭鴸鳥彗星横天鯨魚死浪鴸鳴于邑賢士見放厥理至微言之無况猾褢猾褢之獸見則興役膺政而出匪亂不適天下有道幽形匿迹長右彘長右四耳厥狀如猴實爲水祥見則横流彘虎其身厥尾如牛會稽山禹徂會稽爰朝羣臣不虔是討乃戮長人玉贑表夏玄石勒秦患前作䍺有獸無口其名曰患害氣不入厥體無間至理之盡出乎自然犀犀頭似猪形兼牛質角則併三分身互出鼓鼻生風壯氣隘溢兕兕推壯獸似牛青黑力無不傾自焚以革皮充武備角助文德象象實魁梧體巨貌詭肉兼十牛目不踰豕望頭如尾動若丘徙纂雕瞿如鳥虎蛟纂雕有角聲若兒號瞿如三手厥狀似鵁魚身蛇尾是謂虎蛟鳳鳳皇靈鳥實冠羽羣八象其體五德其文羽翼來儀應我聖君育隧谷前作育遺育隧之谷爰含凱風青陽既謝氣應祝融炎雰是扇以散鬱隆鱄魚顒鳥顒鳥栖林鱄魚處淵俱爲旱徵災延普天測之無象厥數推玄白䓘自䓘睪蘇其汁如飴食之辟穀味有餘滋逍遥忘勞窮生盡期山海經卷之一, SBCK: ''}
