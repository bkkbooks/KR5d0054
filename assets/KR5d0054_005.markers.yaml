  - {type: variant, offset: 11821, length: 1323, content: 桃林桃林之谷實惟塞野武王克商休牛風馬阨越三塗作險西夏鳴石金石同類潜響是韞擊之雷駭厥聲遠聞苟以數通氣無不運旋龜人魚脩辟聲如破木號曰旋龜脩辟以黽厥鳴如鴟人魚類䱱出于洛伊帝臺棋茫茫帝臺維靈之貴爰有石棋五彩焕蔚觴禱百神以和天氣若華烏酸草療瘧之草厥實如瓜烏酸之葉三成黄華可以爲毒不畏蚖蛇䔄草䔄草黄華實如菟絲君子是佩人服媚之帝女所化其理難思山膏獸黄棘山膏如豚厥性好罵黄棘是食匪子匪化雖無貞操理同不嫁三足龜造物維均靡偏靡頗少不爲短長不爲多賁能三足何異黿鼉嘉榮霆維天精動心駭目曷以御之嘉榮是服所正者神用口腸腹天楄牛傷文獸鰧魚牛傷鎮氣天楄弭噎文獸如蜂枝尾反舌鰧魚青斑處于逵穴帝休帝休之樹厥枝交對竦本少室曾隂雲䨴君子服之匪怒伊愛泰室嵩維岳宗華岱恒衡氣通天漢神洞幽明嵬然中立衆山之英栯木爰有嘉樹厥名曰栯薄言采之窈窕是服君子維歡家無反目𦱌草𦱌草赤莖實如蘡薁食之益智忽不自覺殆齊生知功奇於學鶡鳥鶡之爲鳥同羣相爲畸類被侵雖死不避毛飾武士兼厲以義鳴蛇化蛇鳴化二蛇同類異狀拂翼俱遊騰波漂浪見則並災或淫或亢赤銅昆吾之山名銅所在切玉如泥火灸有彩尸子所歎驗之彼宰神熏池泰逢虎尾武羅人面熏池之神厥狀不見爰有美玉河林如蒨神武羅有神武羅細腰白齒聲如鳴佩以鐻貫耳司帝宻都是宜女子鴢鳥鴢鳥似鳧翠羽朱目既麗其形亦奇其肉婦女是食子孫繁育荀草荀草赤實厥狀如菅婦人服之練色易顔夏姬是豔厥媚三還馬腹獸飛魚馬腹之物人面似虎飛魚如豚赤文無羽食之辟兵不畏雷鼓神泰逢神號泰逢好遊山陽濯足九州出入流光天氣是動孔甲迷惶葪栢葪栢白華厥子如丹實肥變氣食之忘寒物隨所染墨子所歎橘櫾厥苞橘櫾奇者維甘朱實金鮮葉蒨翠藍靈均是詠以爲美談𦵧大騩之山爰有苹草青華白實食之無夭雖不增齡可以窮老鮫魚魚之别屬厥號曰鮫珠皮毒尾匪鱗匪毛可以錯角兼飾劎刀鴆鳥蝮維毒魁鴆鳥是噉拂翼鳴林草瘁木慘羽行隱戮厥罰難犯椒椒之灌殖實繁有倫拂穎霑霜朱實芬辛服之洞見可以通神神𧕛圍計蒙涉𧕛涉𧕛三脚𧕛圍虎爪計蒙龍首獨禀異表升降風雨茫茫渺渺岷山岷山之精上絡東井始出一勺終致森冥作紀南夏天清地靜䕫牛西南巨牛出自江岷體若垂雲肉盈千鈞雖有逸力難以揮輪峽山卭峽峻嶮其坂九折王陽逡巡王尊逞節殷有三仁漢稱二哲𤜣狼雍和𤟑獸𤜣狼之出兵不外擊雍和作恐𤟑乃流疫同惡殊災氣各有適蜼寓屬之才莫過於蜼雨則自懸塞鼻以尾厥形雖隨列象宗彝熊穴熊山有穴神人是出與彼石鼓象殊應一祥雖先見厥事非吉跂踵青耕禦疫跂踵降災物之相反各以氣來見則民咨實爲病媒蛟匪蛇匪龍鱗彩炳焕騰躍波濤蜿蜒江漢漢武飲羽飛佽疊斷神耕父清泠之水在乎山頂耕父是遊流光灑景黔首祀榮以弭災眚九鍾嶢崩涇竭麟鬥曰薄九鍾將鳴凌霜乃落氣之相應觸感而作嬰勺支離之山有鳥似鵲白身赤眼厥尾如勺維彼有斗不可以酌獜有獸虎爪厥號曰獜好自跳撲鼓甲振奮若食其肉不覺風迅帝臺漿帝臺之水飲蠲心病靈府是滌和神養性食可逍遥濯髮浴泳狙如狙如微蟲厥體無害見則師興兩陣交會物之所感焉有小大帝女桑爰有洪桑生瀆淪潭厥圍五丈枝相交參園客是採帝女所蠶梁渠𤝻即聞獜獸䳅餘鳥梁渠致兵𤝻即起災䳅餘辟火物各有能聞獜之見大風乃來神于兒于兒如人蛇頭有兩常遊江淵見于洞廣乍潜乍出神光忽恍神二女神之二女爰宅洞庭游化五江惚恍窈冥號曰夫人是維湘靈飛蛇騰蛇配龍因霧而躍雖欲登天雲罷陸略伏非啓體難以云託山海經卷之五, SBCK: ''}
