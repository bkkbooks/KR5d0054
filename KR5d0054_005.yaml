front:
  text: 山海經卷之五竟五
  hash: sha256:f3114047bce29cd7ae1314bb09c2b0420dacfe09e8bfd415aac90530676669d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_HFL_005-001a, image: hfl/0676/0676-004.png}
body:
  text: 郭璞傳中山經中山經薄山之首曰甘棗之山共水出焉音恭而西流注于河其上多杻木其下有草焉葵本而杏葉或作楛葉黄華而莢實名曰他落切可以已瞢音有獸焉其狀如𤟩鼠而文題𤟩鼠所未詳音虺字亦或作虺其名曰㔮音那或作熊也食之已癭又東二十里曰歷兒之山其上多橿多櫔木音厲是木也方莖而圓葉黄葉而毛其實如楝楝木名子如指頭白而粘即以浣衣也音練或作簡服之不忘又東十五里曰渠猪之山其上多竹渠猪之水出焉而南流注于河其中是多豪魚狀如鮪鮪似鱣也赤喙尾赤羽可以已白癬又東三十五里曰葱聾之山其中多大谷是多白堊黑青黄堊言有雜色堊也又東十五里曰涹山音倭其上多赤銅其隂多鐵又東七十里曰脫扈之山有草焉其狀如葵葉而赤華莢實實如㯶莢今㯶木莢似皂莢也名曰植楮可以已癙癙病也淮南子曰狸頭已癙也食之不眯又東二十里曰金星之山多天嬰其狀如龍骨可以已痤癰痤也又東七十里曰泰威之山其中有谷曰梟谷其中多鐵或無谷字又東十五里曰橿谷之山其中多赤銅或作檀谷之山又東百二十里曰吴林之山其中多葌草亦菅字又北三十里曰牛首之山今長安西南有牛首山上有館下有水未知此是非有草焉名曰鬼草其葉如葵而赤莖其秀如禾服之不憂勞水岀焉而西流注于滴水音如𧩡詐之𧩡是多飛魚其狀如鮒魚食之已痔衕又北四十里曰霍山今平陽永安縣廬江灊縣晋安羅江縣河南鞏縣皆有霍山明山以霍爲名者非一矣按爾雅大山繞小山爲霍其木多穀有獸焉其狀如狸而白尾有鬛名曰朏朏養之可以已憂謂蓄養之也普昧反又北五十二里曰合谷之山是多簷棘未詳音瞻又北三十五里曰隂山亦曰險山多礪石文石礪石石中磨者少水出焉其中多彫棠其葉如榆葉而方其實如赤菽菽豆食之已聾又東北四百里曰鼓鐙之山多赤銅有草焉名曰榮草其葉如柳其本如鷄卵食之已風凡薄山之首自甘棗之山至于鼓鐙之山凡十五山六千六百七十里歷兒家也其祠禮毛太牢之具縣以吉玉縣祭山之名也見爾雅其餘十三山者毛用一羊縣嬰用桑封瘞而不糈桑封者桑主也方其下而銳其上而中穿之加金言作神主而祭以金銀飾之也公羊傳曰虞主用桑主或作王中次二經濟山之首曰輝諸之山其上多桑其獸多閭麋其鳥多鶡似雉而文青色有毛勇健鬥死乃止音曷出上黨也又西南二百里曰發視之山其上多金玉其下多砥礪即魚之水出焉而流注于伊水又西三百里曰豪山其上多金玉而無草木又西三百里曰鮮山多金玉無草木鮮水出焉而北流注于伊水其中多鳴蛇其狀如蛇而四翼其音如磬見則其邑大旱又西三百里曰陽山多石無草木陽水出焉而北流注于伊水其中多化蛇其狀如人面而豺身鳥翼而蛇行其音如叱呼見則其邑大水又西二百里曰昆吾之山其上多赤銅此山出名銅色赤如火以之作刀切玉如割泥也周穆王時西戎獻之尸子所謂昆吾之劎也越絶書曰赤堇之山破而出錫若耶之谷涸而出銅歐冶子因以爲統鈎之劎汲郡冢中得銅劎一枝長三尺五寸乃今所名爲干將劎汲郡亦皆非鐵也明古者通以錫雜銅爲兵器也有獸焉其狀如彘而有角其音如號如人號哭名曰蠪蚳上已有此獸疑同名食之不眯又西百二十里曰葌音𨳩山葌水出焉而北流注于伊水其上多金玉其下多青雄黃有木焉其狀如棠而赤葉名曰芒草音忘可以毒魚又西一百五十里曰獨蘇之山無草木而多水又西二百里曰蔓渠之山其上多金玉其下多竹箭伊水出焉而東流注于洛今伊水出上洛盧氏縣熊耳山東北至河南洛陽縣入洛有獸焉其名曰馬腹其狀如人面虎身其音如嬰兒是食人凡濟山經之首自輝諸之山至于蔓渠之山凡九山一千六百七十里其神皆人面而鳥身祠用毛擇用毛色用一吉玉投而不糈中次三經萯山之首曰敖岸之山或作獻萯音倍其陽多㻬琈之玉其隂多赭黄金神熏池居之是常出美玉或作石北望河林其狀如蒨如舉說者云蒨舉皆木名也未詳蒨音倩有獸焉其狀如白鹿而四角名曰夫諸見則其邑大水又東十里曰青要之山實維帝之宻都天帝曲宻之邑北望河曲河千里一曲一直也是多駕鳥未詳也或曰駕宜爲鴽鴛鵝也音加南望墠渚水中小洲名渚墠音蟬也禹父之所化鯀化於羽淵爲黄熊今復云在此然則一己有變怪之性者亦無往而不化也是多僕纍蒲盧僕纍蝸牛也爾雅曰蒲盧者螟蛉也䰠武羅司之武羅神名䰠即神字其狀人面而豹文小腰而白齒或作首而穿耳以鐻鐻金銀器之名未詳也音渠其鳴如鳴玉如人鳴玉珮聲是山也宜女子畛水出焉音軫而北流注于河其中有鳥焉名曰鵬音如窈窕之窈其狀如鳧青身而朱目赤尾食之宜子朱淺赤也有草焉其狀如葌菅似芽也而方莖黃華赤實其本如藁本根似藁本亦香草名曰荀草或作苞草服之美人色令人更美艷又東十里曰騩山音巍其上有美棗其隂有㻬琈之玉正回之水出焉而北流注于河其中多飛魚其狀如豚而赤文服之不畏雷可以禦兵又東四十里曰宜蘇之山其上多金玉其下多蔓居之木未詳滽滽之水出焉音容而北流注于河是多黄貝又東二十里曰和山其土無草木而多瑶碧實惟河之九都九水所聚故曰九都是山也五曲曲回五重九水出焉合而北流注于河其中多蒼玉吉神泰逢司之吉猶善也其狀如人而虎尾或作尾是好居于萯山之陽出入有光太逢神動天地氣也言其有靈爽能興雲雨也夏萯之下天大風晦冥孔甲迷見吕氏春秋也凡萯山之首自敖岸之山至于和山凡五山四百四十里其祠太逢熏池武羅皆一牡羊副副謂破羊骨礫之以祭也見周禮音悃愊之情嬰用吉玉其二神用一雄雞瘞之糈用稌中次四經釐山之首音狸曰鹿蹄之山其上多玉其下多金甘水出焉而北流注于洛其中多泠石未聞也泠或作涂西五十里曰扶猪之山其上多礝石音耎今鴈門山中出礝石白者如氷半中有赤色者有獸焉其狀如貉而人目貉或作據古字其名曰麏音銀或作麋虢水出焉而北流注于洛其中多瓀石言亦出水中又西一百二十里曰釐山其陽多玉其隂多蒐音搜茅蒐今之蒨草也有獸焉其狀如牛蒼身其音如嬰兒是食人其名曰犀渠滽滽之水出焉而南流注于伊水有獸焉名曰𤢺音蒼頡之頡其狀如獳犬而有鱗其毛如彘鬛又西二百里曰箕尾之山多穀多涂石其上多㻬琈之玉又西二百五十里曰栖山其上多玉其下多銅滔雕之水出焉而北流注于洛其中多羬羊有木焉其狀如樗其葉如桐而莢實其名曰苃可以毒魚茇一作艾又西二百里曰白邊之山其上多金玉其下多青雄黄又西二百里曰熊耳之山今在上洛縣南其上多漆其下多㯶浮濠之水出焉而西流注于洛其中多水玉多人魚有草焉其狀如蘇而赤華名曰葶䔭亭寧耵聹二音可以毒魚又西三百里曰壯山其上多文石其下多竹箭竹䉋其獸多㸲牛羬羊鳥多赤鷩音閉即鷩雉也又西三百五十里曰讙舉之山雒水出焉而東北流注于玄扈之水其中多馬腸之物此二山者洛間也洛水今出上洛縣冢嶺山河圖曰玄扈洛汭謂此間也凡釐山之首自鹿蹄之山至于玄扈之山凡九山千六百七十里其神狀皆人面獸身其祠之毛用一白鷄祈而不糈言直祈禱以彩衣之以彩飾鷄中次五經薄山之首曰苟牀之山或作苟林山無草木多怪石恠石似玉也書曰鉛松怪石也東三百里曰首山其隂多榖柞草多𦬸芫𦬸山薊也芫華中藥其陽多㻬琈之玉木多槐其隂有谷曰机谷多𩿁鳥音如鉗釱之釱其狀如梟而三目有耳其音如録食之已墊未聞又東三百里曰縣斸之山音如斤之無草木多文石又東三百里曰葱聾之山無草木多𢈦石未詳東北五百里曰條谷之山其木多槐桐其草多芍藥𧄸冬本草經曰𧄸冬一名滿冬今符門俗作耳又北十里曰超山其隂多蒼玉其陽有井冬有水而夏竭又東五百里曰成侯之山其上多櫄木似樗樹材中車轅吴人呼櫄音輴車或曰輶車其草多芃又東五百里曰朝歌之山谷多美堊又東五百里曰槐山谷多金錫又東十里曰歷山其木多槐其陽多玉又東十里曰曰山多蒼玉其獸多麖似鹿而小黑色尸水出焉南流注于洛水其中多美玉又東十里曰良餘之山其上多榖柞無石餘水出于其隂而北流注于河乳水出于其陽而東南流注于洛又東南十里曰蠱尾之山多礪石赤銅龍餘之水出焉而東南流注于洛又東北二十里曰升山其木多穀柞棘其草多藷龔蕙蕙香草也多寇脫寇脫草生南方高丈許似荷葉而莖中有瓤正白零佳人植而日灌之以爲樹也黄酸之水出焉而北流注于河其中多旋玉石次玉者也孫卿曰旋瑶珠不知佩音旋又東十二里曰陽虚之山多金臨于玄扈之水河圖曰蒼頡爲帝南巡狩登陽虚之山臨于玄扈洛汭靈龜負書丹甲青文以授之出此水中也凡薄山之首自苟林之山至于陽虚之山凡十六山二千九百八十二里升山冢也其祠禮太牢嬰用吉玉首山䰠也其祠用稌黑犧太牢之具蘖釀以蘖作醴酒也于儛千萬儛置鼓擊之以儛嬰用一璧尸水合天地天神之所也肥牲祠之用一黑犬于上用一雌雞于下刉一牝羊獻血以血祭也刉猶刲也周禮曰刉咡奉犬牲嬰用吉玉彩之又加以繒綵之也饗之勸强之也特牲饋食禮曰執奠祝饗是也中次六經縞羝山之首曰平逢之山南望伊洛東望穀城之山在濟北穀城縣西黄石公石在此山下張良取以合葬爾無草木無水多沙石有神焉其狀如人而二首名曰驕蟲是爲螫蟲爲螫蟲之長實爲蜂蜜之廬言羣蜂之所含集蜜亦蜂名其祠之用一雄鷄禳而勿殺禳亦祭名謂禳却惡氣也西十里曰縞羝之山無草木多金玉又西十里曰廆山音如瓌之瓌其隂多㻬琈之玉其西有谷焉名曰雚谷其木多柳楮其中有鳥焉狀如山雞而長尾赤如丹火而青喙名曰鳹鷄鈴要二音其鳴自呼服之不眯交觴之水出于其陽而南流注于洛俞隨之水出于其隂而北流注于穀水又西三十里曰瞻諸之山其陽多金其隂多文石㴬水出焉音謝而東南流注于洛少水出其隂而東流注于穀水又西三十里曰婁涿之山無草木多金玉瞻水出于其陽而東流注于洛陂水出于其隂世謂之百答水而北流注于穀水其中多茈石文石又西四十里曰白石之山惠水出于其陽而南流注于洛其中多水玉澗水出于其隂書曰伊洛瀍澗西北流注于穀水其中多麋石櫨丹皆未聞又西五十里曰穀山其上多穀其下多桑爽水出焉世謂之紵麻澗而西北流注于穀水其中多碧緑又西七十二里曰宻山今榮陽宻縣亦有宻山疑非也其陽多玉其隂多鐵豪水出焉而南流注于洛其中多旋龜其狀鳥首而鼈尾其音如判木無草木又西百里曰長石之山無草木多金玉其西有谷焉名曰共谷多竹共水出焉西南流注于洛其中多鳴石晋永康元年襄陽郡上鳴石似玉色青撞之聲聞七八里今零陵泉陵縣永正鄉有鳴石二所其一狀如鼓俗因名爲石鼓即此類也又西一百四十里曰傅山無草木多瑶碧厭染之水出于其陽而南流注于洛其中多人魚其西有林焉名曰潘冢音番穀水出焉而東流注于洛今穀水出穀陽谷東北至穀城縣入洛河其中多珚玉未聞也珚音因又西五十里曰橐山其木多樗多𣖾木今蜀中有𣖾木七八月中吐穗穗成如有鹽粉著狀可以酢羹音備其陽多金玉其隂多鐵多蕭蕭蒿見爾雅橐水出焉而北流注于河其中多脩辟之魚狀如黽黽蛙屬也而白喙其音如鴟食之已白癬又西九十里曰常烝之山無草木多堊潐水出焉音譙而東北流注于河其中多蒼玉菑水出焉而北流注于河又西九十里曰夸父之山其木多㯶柟多竹箭其獸多㸲牛羬羊其鳥多赤鷩其陽多玉其隂多鐵其北有林焉名曰桃林是廣員三百里其中多馬桃林今弘農湖縣闕鄉南谷中是也饒野馬山羊山牛湖水出焉而北流注于河其中多珚玉又西九十里曰陽華之山其陽多金玉其隂多青雄黄其草多藷龔多苦莘其狀如橚即楸字也其實如瓜其味酸甘食之已瘧楊水出焉而西南流注于洛其中多人魚門水出焉而東北流注于河其中多玄䃤黑砥石生水中𦁎姑之水出于其隂𦁎音藉而東流注于門水其上多銅門水至于河七百九十里入雒水凡縞羝山之首自平逢之山至于陽華之山凡十四山七百九十里嶽在其中以六月祭之六月亦歲之中如諸嶽之祠法則天下安寧中次七經苦山之首曰休與之山與或作輿下同其上有石焉名曰帝臺之棋帝臺神人名棋謂博棋也五色而文其狀如鶉卵帝臺之石所以禱百神者也禱祀百神則用此石服之不蠱有草焉其狀如蓍赤葉而本叢生名曰夙條可以爲簳中箭竿也東三百里曰鼓鍾之山帝臺之所以觴百神也舉觴燕會則於此山因名爲鼓鍾山有草焉方莖而黄葉圓葉而三成葉三重也其名曰烏酸可以爲毒爲治其上多礪其下多砥又東二百里曰姑媱之山音遥或無之山字帝女死焉其名曰女尸化爲䔄草其葉胥成言葉相重也亦音遥其華黄其實如菟丘菟丘菟絲也見爾雅服之媚於人鳥人所愛也傳曰人服媚之如是一名荒夫草又東二十里曰苦山有獸焉名曰山膏其狀如逐即豚字赤若丹火善罵好罵人其上有木焉名曰黄棘黄華而圓葉其實如蘭服之不字字生也易曰女子貞不字有草焉圓葉而無莖赤華而不實名曰無條服之不癭又東二十七里曰堵山神天愚居之是多怪風雨其上有木焉名曰天楄音鞭方莖而葵狀服者不㖶食不噎也又東五十二里曰放臯之山放或作效又作牧明水出焉南流注于伊水其中多蒼玉有木焉其葉如槐黄華而不實其名曰蒙木服之不惑有獸焉其狀如蜂枝尾而反舌善呼好呼唤也其名曰文文又東五十七里曰大𩇵之山多㻬琈之玉多麋玉未詳有草焉其狀葉如榆方莖而蒼傷其名曰牛傷猶言牛棘其根蒼文服者不厥厥逆氣病可以禦兵其陽狂水出焉西南流注于伊水其中多三足龜今吴興陽羨縣有君山山上有池水中有三足六眼龜鼈龜三足者名寳出爾雅食者無大疾可以已腫又東七十里曰半石之山其上有草焉生而秀其高丈餘赤葉赤華華而不實初生先作穗却著葉花生穗間其名曰嘉榮服之者不霆不畏雷霆霹靂也音廷搏之廷來需之水出于其陽而西流注于伊水其中多鯩魚音倫黑文其狀如鮒食者不睡合水出于其隂而北流注于洛多鰧魚音騰狀如鱖居逵鱖魚犬目大曰細鱗有斑彩逵水中之穴道交通者鱖音劌倉文赤尾食者不癰可以爲瘻瘻癰屬也中多有蟲淮南子曰雞頭已瘻音漏又東五十里曰少室之山今在河南陽城西俗名泰室百草木成囷未詳其上有木焉其名曰帝休葉狀如楊其枝五衢言樹枝交錯相重五出有象衢路也離騷曰靡萍九衢黄華黑實服者不怒其上多玉比山巓亦有白玉膏得服之即得仙道世人不能上也詩含神霧云其下多鐵休水出焉而北流注于洛其中多䱱魚狀如盩蜼未詳盩音侜而長距足白而對未詳食者無蠱疾可以禦兵又東三十里曰泰室之山即中嶽嵩山也今在陽城縣西其上有木焉葉狀如梨而赤理其名曰栯木音郁服者不妬有草焉其狀如𦬸𦬸似葪也白華黑實澤如蘡薁言子滑澤其名曰䔄草服之不昧上多美石次玉者也啓母化爲石而生啓在此山見淮南子又北三十里曰講山其上多玉多柘多栢有木焉名曰帝屋葉狀如椒反傷赤實反傷剌下勾也可以禦凶又北三十里曰嬰梁之山上多蒼玉錞于玄石言蒼玉依黑石而生也或曰錞于樂器名形似蜼頭又東三十里曰浮戲之山有木焉葉狀如樗而赤實名曰亢木食者不蠱汜水岀焉而北流注于河其東有谷因名曰蛇谷言此中出蛇故以名之上多少辛細辛也又東四十里曰少陘之山有草焉名曰𦱌草音剛葉狀如葵而赤莖白華實如蘡薁食之不愚言益人智器難之水出焉或作囂而北流注于役水或作侵又東南十里曰太山别有東小太山今在朱虚縣汶水所出疑此非也有草焉名曰梨其葉狀如荻荻亦蒿也音狄而赤華可以已疽太水出于其陽而東南流注于没水承水出于其隂而東北流注于没世謂之靖澗水又東二十里曰末山上多赤金末水出焉北流注于没水經作沫又東二十五里曰役山上多白金多鐵役水出焉北注于河又東三十五里曰敏山上有木焉其狀如荆白華而赤實名曰葪音計栢服者不寒令人耐寒其陽多㻬琈之玉又東三十里曰大騩之山今榮陽宻縣有大騩山騩因溝水所出音歸其隂多鐵美玉青堊有草焉其狀如蓍而毛青華而白實其名曰𦵧音狼服之不夭言盡壽也或作芺可以爲腹疾鳥治也一作已凡苦山之首自休與之山至于大騩之山凡十有九山千一百八十四里其十六神者皆豕身而人面其祠毛牷用一羊羞言以羊爲薦羞嬰用一藻玉瘞藻玉玉有五彩者也或曰所以盛玉藻藉也苦山少室太室皆冢也其祠之太牢之具嬰以吉玉其神狀皆人面而三首其餘屬皆豕身人面也中次八經荆山之首曰景山今在南郡界中其上多金玉其木多杼檀杼音椽柱之柱雎水出焉雎音癰疽之疽東南流注于江今雎水出新城魏昌縣東南發阿山東南至南郡枝江縣入江也其中多丹粟多文魚有斑彩也東北百里曰荆山今在新城沐鄉縣南其隂多鐵其陽多赤金其中多犛牛旄牛屬也黑色出西南徼外也音狸一音來多豹虎其木多松栢其草多竹多橘櫾櫾似橘而大也皮厚味酸漳水出焉而東南流注于雎出荆山至南郡當陽縣入沮水其中多黄金多鮫魚鮫鮒魚類也皮有珠文而堅尾長三四尺末有毒螫人皮可飾刀劎口錯治林角今臨海縣亦有之音交其獸多閭麋似鹿而大也又東北百五十里曰驕山其上多玉其下多青𩇥其木多松栢多桃枝鈎端神鼉圍處之音鼉魚之鼉其狀如人面羊角虎爪恒遊于雎漳之淵淵水之府奥也出入有光又東北百二十里曰女几之山其上多玉其下多黄金其獸多豹虎多閭麋麖麂麂似獐而大猥毛豹脚音几其鳥多白鷫鶻似雉而長尾走且鳴青驕多翟多鵬鴨大如鵰紫緑色長頸赤喙食蝮蛇頭雄名運日雌名隂諧也又東北二百里曰宜諸之山其上多金玉其下多青𩇥洈水出焉音詭而南流注于漳今洈水出南郡東洈山至華容縣入江也其中多白玉又東北三百五十里曰綸山音倫其木多梓柟多桃枝多柤栗橘櫾柤似梨而酢嗇其獸多閭塵麖㚟㚟似兔而鹿脚青色音勅略反又東北二百里曰陸䣀之山音如跪對之跪其上多㻬琈之玉其下多堊其木多杻橿又東百三十里曰光山其上多碧其下多木神計蒙處之其狀人身而龍首恒遊于漳淵出入必有飄風暴雨又東百五十里曰岐山其陽多赤金其隂多白珉石似玉者音旻其上多金玉其下多青䨼其木多樗神涉鼉處之徒河切一作鼉笑遊切其狀人身而方面三足又東百三十里曰銅山其上多金銀鐵其木多穀柞柤栗橘櫾其獸多豹又東北一百里曰美山其獸多兕牛多閭麈多豕鹿其上多金其下多青䨼又東北百里曰大堯之山其木多松栢多梓桑多机其草多竹其獸多豹虎麢㚟又東北三百里曰靈山其上多金玉其下多青䨼其木多桃李梅杏梅似杏而酢也又東北七十里曰龍山上多寓木寄生也一名宛童見爾雅其上多碧其下多赤錫其草多桃枝鈎端又東南五十里曰衡山上多寓木穀柞多黄堊白堊又東南七十里曰石山其上多金其下多青䨼多寓木又南百二十里曰若山其上多㻬琈之玉多赭赤土多邽石未詳多寓木多柘若一作前又東南一百二十里曰彘山多美石多柘又東南一百五十里曰玉山其上多金玉其下多碧鐵其木多栢又東南七十里曰讙山其木多檀多邽石多白錫今白鑞也郁水出于其上潜于其下其中多砥礪又東北百五十里曰仁舉之山其木多穀柞其陽多赤金其隂多赭又東五十里曰師每之山其陽多砥礪其隂多青䨼其木多栢多檀多柘其草多竹又東南二百里曰琴鼓之山其木多穀柞椒柘椒爲樹小而叢生下有草木則蠚死其上多白珉其下多洗石其獸多豕鹿多白犀其島多鴆凡荆山之首自景山至琴鼓之山凡二十三山二千八百九十里其神狀皆鳥身而人面其祠用一雄雞祈瘞禱請已埋之也用一藻圭糈用稌驕山家也其祠用羞酒少牢祈瘞嬰毛一壁中次九經岷之首曰女几之山其上多石涅其木多杻橿其草多菊𦬸洛水出焉東注于江其中多雄黄雄黄亦出水中其獸多虎豹又東北三百里曰岷山江水出焉岷山今在汶山郡廣陽縣西大江所出東北流注于海至廣陽縣入海其中多良龜良善多鼉似晰蜴大者長二丈有鱗彩皮可以冒鼓其上多金玉其下多白珉其木多梅棠其獸多犀象多夔牛今蜀山中有大牛重數千斤名爲䕫牛晋大興元年此牛出上庸郡人弩射殺得三十八檐肉即爾雅所謂魏其鳥多翰鷩白翰赤鷩又東北一百四十里曰峽山江水出焉卭來山今在漢嘉嚴道縣南江水所自出也山有九折坂出㹮伯似熊而黑白駮亦食銅鐵也東流注大江其陽多黄金其隂多麋麈其木多檀柘其草多薤韭多药即䖀空奪即蛇被脫也又東一百五十里曰崌山音居江水出焉北江東流注于大江其中多怪蛇今永昌郡有鈎蛇長數丈尾歧在水中鈎取岸上人牛馬啖之又呼馬絆蛇謂此類也多䲀魚音贄未聞其木多楢杻楢剛木也中車材音秋多梅梓其獸多夔牛麢㚟犀兕有鳥焉狀如鴞而赤身白首其名曰竊脂今呼小青雀曲觜肉食者爲竊脂疑此非也可以禦火又東三百里曰高梁之山其上多堊其下多砥礪其木多桃枝鈎端有草焉狀如葵而赤華莢實白柎可以走馬又東四百里曰蛇山其上多黄金其下多堊其木多栒多豫樟其草多嘉榮少辛有獸焉其狀如狐而白尾長耳名曰𤜣狼音巳見則國内有兵一作國有内亂又東五百里曰鬲山其陽多金其隂多白珉蒲𪈘音薨之水出焉而東流注于江其中多白玉其獸多犀象熊羆多猨蜼蜼似獼猴鼻露上向尾四五尺頭有岐蒼黄色雨則自縣樹以尾塞鼻孔或以兩指塞之又東北三百里曰隅陽之山其上多金玉其下多青䨼其木多梓桑其草多茈徐之水出焉東流注于江其中多丹粟又東二百五十里曰岐山今在扶風羡陽縣西其上多白㚟其草多嘉榮又東一百七十里曰賈超之山其陽多黄堊其隂多美赭其木多柤栗橘櫾其中多龍脩龍須也似莞而細生山石穴中莖倒垂可以爲席凡岷山之首自女几山至于賈超之山凡十六山三千五百里其神狀皆馬身而龍首其祠毛用一雄鷄瘞糈用稌文山勾檷風雨醜之山是皆冢也其祠之羞酒先進酒以釂神少牢具嬰毛一吉玉熊山席也席者神之所憑者也其祠羞酒太牢具嬰毛一璧干儛用兵以禳禳被除之祭名儛者持盾武儛也祈璆冕舞所求福祥也祭用玉儛者冕服也美玉曰璆己求反中次十經之首曰首陽之山其上多金玉無草木又西五十里曰虎尾之山其木多椒椐多封石其陽多赤金其隂多鐵又西南五十里曰繁繢之山音潰其木多楢杻其草多枝勾今山中有此草又西南二十里曰勇石之山無草木多白金多水又西二十里曰復州之山其木多檀其陽多黄金有鳥焉其狀如鴞而一足彘尾其名曰跂踵音企見則其國大疫銘曰跂踵爲鳥一足似䕫不爲樂興反以來悲又西三十里曰楮山多寓木多椒椐多柘多堊一作渚州之山又西二十里曰又原之山其陽多青䨼其隂多鐵其鳥多鸛鵒鴝鵒也傳曰鴝鵒來巢音臞又西五十里曰涿山其木多穀柞杻其陽多㻬琈之玉又西七十里曰丙山其木多梓檀多弞杻弞義所未詳凡首陽山之首自首山至于丙山凡九山二百六十七里其神狀皆龍身而人面其祠之毛用一雄雞瘞糈用五種之糈楮山冢也其祠之少牢具羞酒祠嬰毛一璧痤騩山帝也其祠羞酒太牢其合巫祝二人儛嬰一璧中次一十一山經荆山之首曰翼望之山湍水岀焉鹿搏反東流注于濟今湍水逕南陽穰縣而入清水貺水出焉音況東南流注于漢其中多蛟似蛇而四脚小頭細頸頸有白大者十數圍卵如一二石甕能吞人其上多松栢其下多漆梓其陽多赤金其隂多珉又東北一百五十里曰朝歌之山潕水出焉潕水今在南陽舞陽縣音武東南流注于榮其中多人魚其上多梓柟其獸多麢麋有草焉名曰莽草可以毒魚今用之殺魚又東南二百里曰帝囷之山去倫反其陽多㻬琈之玉其隂多鐵帝囷之水出于其上潜于其下多鳴蛇又東南五十里曰視山其上多韭有井焉名曰天井夏有水冬竭其上多桑多美堊金玉又東南二百里曰前山其木多櫧音諸似柞子可食冬夏生作屋柱難腐或作儲多栢其陽多金其隂多赭又東南三百里曰豐山有獸焉其狀如蝯赤目赤喙黄身名曰雍和見則國有大恐神耕父處之帝遊清泠之淵岀入有光清泠水在西號郊縣山上神來時水赤有光耀今有屋祠之見則其國爲敗有九鍾焉是知霜鳴霜降則鍾鳴故言知也物有自然感應而不可爲也其上多金其下多穀柞杻橿又東北八百里曰兔牀之山其陽多鐵其木多藷藇其草金鷄穀其本如鷄卵其味酸甘食者利於人又東六十里曰皮山多堊多赭其木多松栢又東六十里曰瑶碧之山其木多梓柟其隂多青䨼其陽多白金有鳥焉其狀如雉恒食蜚名曰鴆蜚負盤也音翡此更一種鳥非食蛇之鴆也又東四十里曰支離之山濟水出焉南流注于漢今濟水出酈縣西北山中南入漢酈離音字亦同有鳥焉其名曰嬰勺其狀如鵲赤目赤喙白身其尾若勺似酒勺形其鳴自呼多㸲牛多羬羊又東北五十里曰袟𥮐之山音彫其上多松栢机桓桓葉似枷皮黄不措子似楝著酒中飲之辟惡氣浣衣去垢核堅正黑可以間香纓一名栝樓也又西北一百里曰堇理之山其上多松栢多美梓其隂多丹䨼多金其獸多豹虎有鳥焉其狀如鵲青身白喙白目白尾名曰青耕可以禦疫其鳴自叫又東南三十里曰依軲之山音枯其上多杻橿多苴未詳音葅有獸焉其狀如犬虎爪有甲其名曰獜言體有鱗甲音吝善駚𤘝跳躣自撲也鞅奮兩音食者不風不畏天風又東南三十五里曰即谷之山多美玉多玄豹黑豹也則今荆州山中出黑虎也多閭麈多麢㚟其陽多珉其隂多青䨼又東南四十里曰鷄山其上多美梓多桑其草多韭又東南五十里曰高前之山其上有水焉甚寒而清或作潜帝臺之漿也今河東解縣南檀首山上有水潜出停不流俗名爲盎漿即此類也飲之者不心痛其上有金其下有赭又東南三十里曰游戲之山多杻橿穀多玉多封石又東南三十五里曰從山其上多松栢其下多竹從水出于其上潜于其下其中多三足鼈枝尾三脚鼈名能見爾雅食之無蠱疫又東南三十里曰嬰䃌之山音眞其上多松栢其下多梓櫄又東南三十里曰畢山帝苑之水出焉東北流注于視其中多水玉多蛟其上多㻬琈之玉又東南二十里曰樂馬之山有獸焉其狀如彙赤如丹火其名曰𤟑音戾見則其國大疫又東南二十五里曰葴山視水出焉或曰視宜爲瀙瀙水今在南陽也東南流注于汝水其中多人魚多蛟多頡如青狗又東四十里曰嬰山其下多青䨼其上多金玉又東三十里曰虎首之山多苴椆椐椆未詳也音彫又東二十里曰嬰侯之山其上多封石其下多赤錫又東五十里曰大孰之山殺水出焉東北流注于視水其中多白堊又東四十里曰卑山其上多桃李苴梓多纍今虎豆狸豆之屬纍一名縢音誄又東三十里曰倚帝之山其上多玉其下多金有獸焉其狀如鼣鼠爾雅說鼠有十三種中有此鼠形所未詳也音狗吠之吠白耳白喙名曰狙如音即蛆見則其國有大兵又東三十里曰鯢山音霓鯢水出于其上潜于其下其中多美堊其上多金其下多青䨼又東三十里曰雅山澧水出焉音禮今澧水出南陽東流注于視水其中多大魚其上多美桑其下多苴多赤金又東五十里曰宣山淪水出焉東南流注于視水其中多蛟其上有桑焉大五十尺圍五丈也其枝四衢言枝交互四出其葉大尺餘赤理黄華青柎名曰帝女之桑女主以名又東四十五里曰衡山今衡山在衡陽湘南縣南嶽也今謂之峋嶁山其上多青䨼多桑其鳥多鸜鵒又東四十里曰豐山其上多封石其木多桑多羊桃狀如桃而方莖一名鬼桃可以爲皮張治皮腫起又東七十里曰嫗山其上多美玉其下多金其草多鷄穀又東三十里曰鮮山其木多楢杻苴其草多亹冬其陽多金其隂多鐵有獸焉其狀如膜大赤喙赤目白尾見則其邑有火名曰𤝻即音移又東三十里曰章山或作童山其陽多金其隂多美石臯水出焉東流注于澧水其中多硊石未聞魚跪反又東二十五里曰大支之山其陽多金其木多穀柞無草又東五十里曰區吴之山其木多苴又東五十里曰聲匈之山其木多穀多玉上多封石又東五十里曰大騩之山上已有此山疑同名其陽多赤金其隂多砥石又東十里曰踵臼之山無草木又東北七十里曰歷或作磨石之山其木多荆芑其陽多黄金其隂多砥石有獸焉其狀如狸而白首虎爪名曰梁渠見則其國有大兵又東南一百里曰求山求水出于其上潜于其下中有美赭其木多苴多䉋篠屬其陽多金其隂多鐵又東二百里曰丑陽之山其上多椆椐有鳥焉其狀如烏而赤足名曰𩢢餘音如枳橘之枳可以禦火又東三百里曰奥山其上多栢杻檀其陽多㻬殍之玉奥水出焉東流注于視水又東三十五里曰服山其木多苴其上多封石其下多赤錫又東三百里曰杳山其上多嘉榮草多金玉又東三百五十里曰几山其木多楢檀其草多杻有獸焉其狀如彘黄身白頭白尾名曰聞𧲂音鄰見則天下大風𧲂一作音凡荆山之首自翼望之山至于几山凡四十八山三千七百三十二里其神狀皆彘身人首其祠毛用一雄雞祈瘞用一珪糈用五種之禾求山帝也其祠太牢之具羞瘞倒毛薦羞反倒牲埋之也用一璧牛無常堵山玉山冢也皆倒祠羞毛少牢嬰毛吉玉中次十二經洞庭山之首曰篇遇之山或作肩無草木多黄金又東南五十里曰雲山無草木有筀竹甚毒傷人必死今始興郡桂陽縣出筀竹大者圍二尺長四丈又交趾有第竹實中勁彊有毒銳以剌虎中之則死亦此類也其上多黄金其下多㻬琈之玉又東南一百三十里曰龜山其木多穀柞椆椐其上多黄金其下多青雄黄多扶竹卭竹也高節實中中杖也名之扶老竹又東七十里曰丙山多筀竹多黄金銅鐵無木又東南五十里曰風伯之山其上多金玉其下多痠石文石未詳痠石之義多鐵其木多柳杻檀楮其東有林焉名曰莽浮之林多美木鳥獸又東一百五十里曰夫夫之山其上多黄金其下多青雄黄其木多桑楮其草多竹雞鼓神于兒居之其狀人身而身操兩蛇常遊于江淵出入有光又東南一百二十里曰洞庭之山今長沙已陵縣西又有洞庭陂潜伏通江離騷曰邅吾道兮洞庭洞庭波兮木葉下皆謂此也字或作銅宜從水其上多黄金其下多銀鐵其木多柤梨橘櫾其草多葌麋蕪芍藥芎藭麋蕪似蛇牀而香也帝之二女居之天帝之二女而處江爲神即列仙傳江妃二女也離騷九歌所謂湘夫人稱帝子者是也而河圖玉版曰湘夫人者帝堯女也秦始皇浮江至湘山逢大風而問博士湘君何神博士曰聞之堯二女舜妃也死而葬此列女傳曰二女死於江湘之間俗謂爲湘君鄭司農亦以舜妃爲湘君說者皆以舜陟方而死二妃從之俱溺死於湘江遂號爲湘夫人按九歌湘君湘夫人自是二神江湘之有夫人猶河洛之有虙妃也此之爲靈與天地並矣安得謂之堯女且既謂之堯女安得復總云湘君哉何以考之禮記曰舜葬蒼梧二妃不從明二妃生不從征死不從葬義可知矣即令從之二女靈達鑒通無方尚能以鳥工龍裳救井廪之難豈當不能自免於風波而有雙淪之患乎假復如此傳曰生爲上公死爲貴神禮五嶽比三公四瀆比諸侯今湘川不及四瀆無秩於命祀而二女帝者之后配靈神抵無縁當復下降小水而爲夫人也參攷其義義既混錯錯綜其理理無可據斯不然矣原其致謬之由由乎俱以帝女爲名名實相亂莫矯其失習非勝是終古不悟可悲矣是常遊于江淵澧沅之風交瀟湘之淵此言二女遊戲江之淵府則能鼓三江令風波之氣共相交通言其靈響之意也江湘沅水皆共會巴陵頭故號爲三江之口澧又去之七八十里而入江焉淮南子曰弋釣瀟湘今所在未詳也瀟音蕭是在九江之間地理志九江今在潯陽南江自潯陽而分爲九皆東會于大江書曰九江孔殷是也出入必以飄風暴雨是多怪神狀如人而載蛇左右手操蛇多怪鳥又東南一百八十里曰暴山其木多㯶柟荆芑竹箭䉋箘箘亦篠類中箭見禹貢其上多黄金玉其下多文石鐵其獸多麋鹿麂就就鵰也見廣雅又東南二百里曰即公之山其上多黄金其下多㻬殍之玉其木多柳杻檀桑有獸焉其狀如龜而白身赤首名曰蛫音詭是可以禦火又東南一百五十九里曰堯山其隂多黄堊其陽多黄金其木多荆芑柳檀其草多藷藇𦬸又東南一百里曰江浮之山其上多銀砥礪無草木其獸多豕鹿又東二百里曰眞陵之山其上多黄金其下多玉其木多穀柞柳杻其草多榮草又東南一百二十里曰陽帝之山多美銅其木多檀杻檿楮檿山桑也其獸多麢麝又南九十里曰柴桑之山即今潯陽柴桑縣南與廬山相連也其上多銀其下多碧多冷石赭其木多柳芑楮桑其獸多麋鹿多白蛇飛蛇即騰蛇采霧而飛者又東南二百三十里曰榮余之山其上多銅其下多銀其木多柳芑其蟲多怪蛇怪蟲凡洞庭山之首自篇遇之山至于榮余之山凡十五山二千八百里其神狀皆鳥身而龍首其祠毛用一雄鷄一牝豚刉刉亦割剌之名糈用稌凡夫夫之山即公之山堯山陽帝之山皆冢也其祠皆肆瘞肆陳之也陳牲玉而後埋藏之祈用酒毛用少牢嬰毛一吉玉洞庭榮余山神也其祠皆肆瘞肆竟然後依前埋之也祈酒太牢祠嬰用圭璧十五五彩惠之惠猶飾也方言耳右中經之山志大凡百九十七山二萬一千三百七十一里大凡天下名山五千三百七十居地大凡六萬四千五十六里禹曰天下名山經五千三百七十山六萬四千五十六里居地也言其五臧益其餘小山甚衆不足記云天地之東西二萬八千里南北二萬六千里出水之山者八千里受水者八千里出銅之山四百六十七出鐵之山三千六百九十此天地之所分壤樹穀也戈矛之所發也刀鎩之所起也能者有餘拙者不足封於太山禪於梁父七十二家得失之數皆在此内是謂國用管子地數云封禪之王七十二家也右五臧山經五篇大凡一萬五千五百三字桃林桃林之谷實惟塞野武王克商休牛風馬阨越三塗作險西夏鳴石金石同類潜響是韞擊之雷駭厥聲遠聞苟以數通氣無不運旋龜人魚脩辟聲如破木號曰旋龜脩辟以黽厥鳴如鴟人魚類䱱出于洛伊帝臺棋茫茫帝臺維靈之貴爰有石棋五彩焕蔚觴禱百神以和天氣若華烏酸草療瘧之草厥實如瓜烏酸之葉三成黄華可以爲毒不畏蚖蛇䔄草䔄草黄華實如菟絲君子是佩人服媚之帝女所化其理難思山膏獸黄棘山膏如豚厥性好罵黄棘是食匪子匪化雖無貞操理同不嫁三足龜造物維均靡偏靡頗少不爲短長不爲多賁能三足何異黿鼉嘉榮霆維天精動心駭目曷以御之嘉榮是服所正者神用口腸腹天楄牛傷文獸鰧魚牛傷鎮氣天楄弭噎文獸如蜂枝尾反舌鰧魚青斑處于逵穴帝休帝休之樹厥枝交對竦本少室曾隂雲䨴君子服之匪怒伊愛泰室嵩維岳宗華岱恒衡氣通天漢神洞幽明嵬然中立衆山之英栯木爰有嘉樹厥名曰栯薄言采之窈窕是服君子維歡家無反目𦱌草𦱌草赤莖實如蘡薁食之益智忽不自覺殆齊生知功奇於學鶡鳥鶡之爲鳥同羣相爲畸類被侵雖死不避毛飾武士兼厲以義鳴蛇化蛇鳴化二蛇同類異狀拂翼俱遊騰波漂浪見則並災或淫或亢赤銅昆吾之山名銅所在切玉如泥火灸有彩尸子所歎驗之彼宰神熏池泰逢虎尾武羅人面熏池之神厥狀不見爰有美玉河林如蒨神武羅有神武羅細腰白齒聲如鳴佩以鐻貫耳司帝宻都是宜女子鴢鳥鴢鳥似鳧翠羽朱目既麗其形亦奇其肉婦女是食子孫繁育荀草荀草赤實厥狀如菅婦人服之練色易顔夏姬是豔厥媚三還馬腹獸飛魚馬腹之物人面似虎飛魚如豚赤文無羽食之辟兵不畏雷鼓神泰逢神號泰逢好遊山陽濯足九州出入流光天氣是動孔甲迷惶葪栢葪栢白華厥子如丹實肥變氣食之忘寒物隨所染墨子所歎橘櫾厥苞橘櫾奇者維甘朱實金鮮葉蒨翠藍靈均是詠以爲美談𦵧大騩之山爰有苹草青華白實食之無夭雖不增齡可以窮老鮫魚魚之别屬厥號曰鮫珠皮毒尾匪鱗匪毛可以錯角兼飾劎刀鴆鳥蝮維毒魁鴆鳥是噉拂翼鳴林草瘁木慘羽行隱戮厥罰難犯椒椒之灌殖實繁有倫拂穎霑霜朱實芬辛服之洞見可以通神神𧕛圍計蒙涉𧕛涉𧕛三脚𧕛圍虎爪計蒙龍首獨禀異表升降風雨茫茫渺渺岷山岷山之精上絡東井始出一勺終致森冥作紀南夏天清地靜䕫牛西南巨牛出自江岷體若垂雲肉盈千鈞雖有逸力難以揮輪峽山卭峽峻嶮其坂九折王陽逡巡王尊逞節殷有三仁漢稱二哲𤜣狼雍和𤟑獸𤜣狼之出兵不外擊雍和作恐𤟑乃流疫同惡殊災氣各有適蜼寓屬之才莫過於蜼雨則自懸塞鼻以尾厥形雖隨列象宗彝熊穴熊山有穴神人是出與彼石鼓象殊應一祥雖先見厥事非吉跂踵青耕禦疫跂踵降災物之相反各以氣來見則民咨實爲病媒蛟匪蛇匪龍鱗彩炳焕騰躍波濤蜿蜒江漢漢武飲羽飛佽疊斷神耕父清泠之水在乎山頂耕父是遊流光灑景黔首祀榮以弭災眚九鍾嶢崩涇竭麟鬥曰薄九鍾將鳴凌霜乃落氣之相應觸感而作嬰勺支離之山有鳥似鵲白身赤眼厥尾如勺維彼有斗不可以酌獜有獸虎爪厥號曰獜好自跳撲鼓甲振奮若食其肉不覺風迅帝臺漿帝臺之水飲蠲心病靈府是滌和神養性食可逍遥濯髮浴泳狙如狙如微蟲厥體無害見則師興兩陣交會物之所感焉有小大帝女桑爰有洪桑生瀆淪潭厥圍五丈枝相交參園客是採帝女所蠶梁渠𤝻即聞獜獸䳅餘鳥梁渠致兵𤝻即起災䳅餘辟火物各有能聞獜之見大風乃來神于兒于兒如人蛇頭有兩常遊江淵見于洞廣乍潜乍出神光忽恍神二女神之二女爰宅洞庭游化五江惚恍窈冥號曰夫人是維湘靈飛蛇騰蛇配龍因霧而躍雖欲登天雲罷陸略伏非啓體難以云託山海經卷之五
