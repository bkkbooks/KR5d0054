body:
  text: 郭璞傳北山經北山經之首曰單狐之山多机木机木似榆可燒以糞稻田出蜀中音几其上多華草漨水出焉音逢而西流注于泑水其中多芘石文石又北二百五十里曰求如之山其上多銅其下多玉無草木滑水作湑水出焉而西流注于諸毗之水水出諸毗山也其中多滑魚作䱬魚其狀如鱓赤背鱓魚似蛇音善其音如梧如人相枝梧聲音吾子之吾食之已疣疣贅也其中多水馬其狀如馬文臂牛尾臂前脚也周禮曰馬黑脊而斑臂膢漢武元狩四年燉煌渥洼水出馬以爲靈瑞者即此類也其音如呼如人叫呼又北三百里曰帶山其上多玉其下多青碧有獸焉其狀如馬一角有錯言角有甲錯也或作曆其名曰臞疏音歡可以辟火有鳥焉其狀如鳥五彩而赤文名曰鵸䳜上已有此鳥疑同名是自爲牝牡食之不疽無癰疽病也彭水出焉而西流注于芘湖之水其中多儵魚音由其狀如雞而赤毛三尾六足四首其音如鵲食之可以已憂又北四百里曰譙明之山譙水出焉西流注于河其中多何羅之魚一首而十身其音如吠犬食之已癰有獸焉其狀如貆而赤豪貆豪猪也音丸其音如榴榴名曰孟槐可以禦凶辟凶邪氣也亦在畏守畫中也是山也無草木多青雄黄一作多青碧又北三百五十里曰涿光之山囂水出焉而西流注于河其中多鰼鰼之魚音袴褶之褶其狀如鵲而十翼鱗皆在羽端其音如鵲可以禦火食之不癉其上多松栢其下多㯶橿其獸多麢羊其鳥多蕃未詳或云即鴞音煩又北三百八十里曰虢山其上多漆其下多桐椐桐梧桐也椐樻木腫節中杖椐音祛其陽多玉其隂多鐵伊水出焉西流注於河其獸多橐駝有肉鞍善行流沙中日行三百里其負千斤知水泉所在也其鳥多寓狀如鼠而鳥翼其音如羊可以禦兵又北四百里至于虢山之尾其上多玉而無石魚水出焉西流注于河其中多文貝又北二百里曰丹熏之山其上多樗柏其草多韭薤皆山菜爾雅有其名多丹雘熏水出焉而西流注于棠水有獸焉其狀如鼠而菟首麋身其音如獋大以其尾飛或作髯飛獋音豪名曰耳鼠食之不䐆䐆大腹也見裨倉音采也又可以禦百毒又北二百八十里曰石者之山其上無草木多瑶玉泚水出焉西流注于河有獸焉其狀如豹而文題白身題額也名曰孟極走善伏其鳴自呼又北百一十里曰邊春之山或作春山多葱葵韭山葱名茖大葉桃李山桃榹桃子小不解核也杠水出焉而西流注于泑澤有獸焉其狀如禺而文身善笑見人則卧言佯眠也水曰幽鴳或作鴳音遏其鳴自呼又北二百里曰蔓聯之山萬連二音其上無草木有獸焉其狀如禺而有鬛牛尾文臂馬蹄見人則呼名曰足訾其鳴自呼有鳥焉狀如雌雉而人面見人則躍名曰竦斯其鳴自呼也近韓之水出焉而西流注于泑澤其中多磁石可以取鐵磁石管子曰上有磁石下有銅可取也又北百八十里曰單張之山其上無草木有獸焉其狀如豹而長尾人首而牛耳一目名曰諸犍音如犍牛之犍善吒行則銜其尾居則蟠其尾有鳥焉其狀如雉而文首白翼黄足名曰白鵺音夜食之已嗌痛嗌咽也穀梁傳曰嗌不容粒今吴人呼咽爲嗌音隘可以已痸痸癡病也櫟水出焉而南流注于杠水又北三百二十里曰灌題之山其上多樗柘其下多流沙多砥有獸焉其狀如牛而白尾其音如訆如人呼唤訆音叫名曰竦父有鳥焉其狀如雌雉而人面見人則躍躣跣名曰竦斯其鳴自呼也匠韓之水出焉而西流注于泑澤其中多磁石可以取鐵管子曰山上有磁石者下必有銅音慈又北二百里曰潘侯之山其上多松栢其下多榛楛其陽多玉其隂多鐵有獸焉其狀如牛而四節生毛名曰旄牛今旄牛背膝及胡尾皆有長毛邊水出焉而南流注于櫟澤又北二百三十里曰小咸之山無草木冬夏有雪北二百八十里曰大咸之山無草木其下多玉是山也四方不可以上有蛇名曰長蛇其毛如彘豪說者云長百尋今蝮蛇色似艾綬文文間有毛如猪鬣此其類也常山亦有長蛇與此形不同其音如鼓柝如人行夜敲木柝聲音託又北三百二十里曰敦薨之山其上多㯶柟其下多芘草敦薨之水出焉而西流注于泑澤出于崑崙之東北隅實惟河源即河水出崑崙之虚其中多赤鮭今名鯸鮐爲鮭魚音圭其獸多兕旄牛或作樸牛樸牛見離騷天問所未詳其鳥多尸鳩又北二百里曰少咸之山無草木多青碧有獸焉其狀如牛而赤身人面馬足名曰窫窳爾雅云窫窳似𤠾虎爪與此錯軋愈二音其音如嬰兒是食人敦水出焉東流注于鴈門之水水出鴈門山間其中多䰽䰽之魚音沛未詳或作鯆食之殺人又北二百里曰獄法之山瀤澤之水出焉音懷而東北流注于泰澤其中多鱢魚音藻其狀如鯉而雞足食之已疣有獸焉其狀如犬而人面善投見人則笑其名山𤟤音暉其行如風言疾見則天下大風又北二百里曰北嶽之山多枳棘剛木檀柘之屬有獸焉其狀如牛而四角人目彘耳其名曰諸懷其音如鳴鴈是食人諸懷之水出焉而西流注于囂水其中多鮨魚音詣魚身而犬首其音如嬰兒今海中有虎鹿魚及海狶體皆如魚而頭似虎鹿猪此其類也食之已狂又北百八十里曰渾夕之山無草木多銅玉囂水出焉而西北流注于海有蛇一頭兩身四足名曰蜰𧔥見則其國大旱管子曰涸水之精名曰鴟一頭而兩身其狀如蛇長八尺以其名呼之可使取魚鼈亦此類又北五十里曰北單之山無草木多葱韭又北百里曰羆差之山無草木多馬野馬也似馬而小又北百八十里曰北鮮之山是山多馬鮮水出焉而西北流注于涂吾之水漢元狩二年馬出涂吾水中也又北百七十里曰隄山或作䧑古字耳多馬有獸焉其狀如豹而文首名曰狕音么隄水出焉而東流注于泰澤其中多龍龜凡北山經之首自單狐之山至于隄山凡二十五山五千四百九十里其神皆人面蛇身其祠之毛用一雄雞彘瘞吉玉用一珪瘞而不糈言祭不用米皆埋其所用牲玉其山北人皆生食不火之物或作皆生食而不火北次二經之首在河之東其首枕汾臨汾水上也音墳其名曰管涔之山今在太原郡故汾陽縣北秀容山涔音岑其上無木而多草其下多玉汾水出焉而西流注于河至汾陽縣北西入河又北二百五十里曰少陽之山其上多玉其下多赤銀銀之精也酸水出焉而東流注于汾水其中多美赭管子曰山上有赭者其下有鐵又北五十里曰縣雍之山今在晋陽縣西名汲甕雍音甕其上多玉其下多銅其獸多閭糜閭即羭也似驢而歧蹄角如羊一名山驢周書曰北唐以閭亦見鄉射禮其鳥多白翟白䳑即白鵫也音于六反晋水出焉而東南流注于汾水東過晋陽南又東入汾其中多鮆魚其狀如儵而赤鱗小魚曰儵其音如吒食之不驕或作騷騷臭也又北二百里曰狐岐之山無草木多青碧勝水出焉而東北流注于汾水其中多蒼玉又北三百五十里曰白沙山廣圓三百里盡沙也無草木鳥獸鮪水出于其上潜于其下出山之頂停其底也是多白玉又北四十里曰爾是之山無草木無水又北三百八十里曰狂山無草木是山也冬夏有雪狂水出焉而西流注于浮水其中多美玉又北三百八十里曰諸餘之山其上多銅玉其下多松栢諸餘之水出焉而東流注于旄水又北三百五十里曰敦頭之山其上多金玉無草木旄水出焉而東流注于卭澤其中多騂馬音勃牛尾而白身一角其音如呼又北三百五十里曰鉤吾之山其上多玉其下多銅有獸焉其狀羊身人面其目在腋下虎齒人爪其音如嬰兒名曰狍鴞是食人爲物貪惏食人未盡還害其身像在夏鼎左傳所謂饕餮是也狗音咆又北三百里曰北囂之山無石其陽多碧其隂多玉有獸焉其狀如虎而白身犬首馬尾彘鬛名曰獨𤞞音谷有鳥焉其狀如烏人面名曰𪄀𪃑般冒兩音或作夏也宵飛而晝伏鷦之屬食之已暍中熱也音謁涔水出焉而東流注于卭澤又北三百五十里曰梁渠之山無草木多金玉脩水出焉而東流注于鴈門水名其獸多居暨其狀如彙而赤毛彙似鼠赤毛如刺也猬彙音渭其音如豚有鳥焉其狀如夸父或作舉父四翼一目犬尾名曰囂其音如鵲食之已腹痛可以止衕治洞下也音洞又北四百里曰姑灌之山無草木是山也冬夏有雪又北三百八十里曰湖灌之山其陽多玉其隂多碧多馬湖灌之水出焉而東流注于海其中多䱇亦鱓魚字有木焉其葉如柳而赤理又北水行五百里流沙三百里至于洹山其上多金玉三桑生之其樹皆無枝其高百仞百果樹生之其下多怪蛇又北三百里曰敦題之山無草木多金玉是錞于北海凡北次二經之首自管涔之山至于敦題之山凡十七山五千六百九十里其神皆蛇身人面其祠毛用一雄雞彘瘞埋之用一璧一珪投而不糈擿玉於山中以禮神不埋之也北次三經之首曰太行之山今在河内野王縣西北行音户剛反其首曰歸山其上有金玉其下有碧有獸焉其狀如羊而四角馬尾而有距其名曰䮝善還還旋旋儛也䮝音暉其鳴自訆有鳥焉其狀如鵲白身赤尾六足其名曰䴅音犇是善驚其鳴自今吴人謂呼爲詨音呼交反又東北二百里曰龍侯之山無草木多金玉决决之水出焉音訣而東流注于河其中多人魚其狀如䱱魚四足其音如嬰兒䱱見山中經或曰人魚即鯢也似鮎而四脚聲如小兒啼今亦呼鮎爲䱱音蹄食之無癡疾又東北二百里曰馬成之山其上多文石其隂多金玉有獸焉其狀如白犬而黑頭見人則飛言肉翅飛行自在其名曰天馬其鳴自訆有鳥焉其狀如鳥首白而身青足黄是名曰鶌鶋屈居二音或作鳴其鳴自詨食之不飢可以已寓未詳或曰寓猶誤也又東北七十里曰咸山其上有玉其下多銅是多松栢草多茈草條菅之水出焉菅音間而西南流注于長澤其中多器酸三歲一成所未詳也食之已癘又東北二百里曰天池之山其上無草木多文石有獸焉其狀如兔而鼠首以其背飛用其背上毛飛飛則仰也其名曰飛鼠澠水出焉潜于其下停山底也其中多黄堊堊士也又東三百里曰陽山其上多玉其下多金銅有獸焉其狀如牛而赤尾其頸𦜜其狀如勾瞿言頸上有肉𦜜勾瞿者也音劬其名曰領胡其鳴自詨食之已狂有鳥焉其狀如雌雉而五彩以文是自爲牝牡名曰象蛇其鳴自詨留水出焉而南流注于河其中有䱤父之魚音諂其狀如鮒魚魚首而彘身食之已嘔又東三百五十里曰賁聞之山其上多蒼玉其下多黄堊多涅石又北百里曰王屋之山今在河東東垣縣北書曰至于王屋也是多石㶌水出焉㶌音輦而西北流注于泰澤地理志王屋山沇水所出㶌沇聲相近殆一水耳沇則濟也又東北三百里曰教山其上多玉而無石教水出焉西流注于河是水冬乾而夏流實爲乾河今河東聞喜縣東北有乾河因名乾河里但有故溝處無復水即是也其中有兩山是山也廣圓三百步其名曰發丸之山其上有金玉又南三百里曰景山南望鹽販之澤即鹽池也漪氏縣或北望少澤其上多草藷藇根似羊蹄可食曙豫二音今江南單呼爲藷音語有輕重耳其草多秦椒子似椒而細葉草也其隂多赭其陽多玉有鳥焉其狀如蛇而四翼六曰三足名曰酸與其鳴自詨見則其邑有恐或曰食之不醉又東南三百二十里曰孟門之山尸子曰龍門未辟吕梁未鑿河出於孟門之上大溢逆流無有丘陵高阜滅之名曰洪水穆天子傳曰北升孟門九河之澄其上多蒼玉多金其下多黄堊多涅石又東南三百二十里曰平山平水出于其上潜于其下是多美玉又東三百里曰京山有美玉多漆木多竹其陽有赤銅其隂有玄䃤黑砥石也尸子曰加玄黄砥羽色非一也䃤音竹篠之篠高水出焉南流注于河又東二百里曰虫尾之山其上多金玉其下多竹多青碧丹水出焉南流注于河薄水出焉淮南子曰薄水出鮮于山而東南流注于黄澤又東三百里曰彭毗之山其上無草木多金玉其下多水蚤林之水出焉音早東南流注于河肥水出焉而南流注于牀水其中多肥遺之蛇又東百八十里曰小侯之山明漳之水出焉南流注于黄澤有鳥焉其狀如烏而白文名曰鴣姑習二音食之不灂不灂爾雅或作音又東三百七十里曰泰頭之山共水出焉音恭南注于虖池呼佗二音下同其上多金玉其下多竹箭又東北二百里曰軒轅之山其上多銅其下多竹有鳥焉其狀如梟而白首其名曰黄鳥其鳴自詨食之不妬又北二百里曰謁戾之山今在上黨郡涅縣其上多松栢有金玉沁水出焉南流注于河至榮陽縣東北入河或出穀述縣羊頭山也其東有林焉名曰丹林丹林之水出焉南流注于河嬰侯之水出焉北流注于汜水東三百里曰沮洳之山詩云彼汾沮洳無草木有金玉濝水出焉音其南流注于河今淇水出汲郡隆慮縣大號山東過河内縣南爲白溝又北三百里曰神囷之山音如倉囷之囷其上有文石其下有白蛇有飛蟲黄水出焉而東流注于洹洹水出汲郡林慮縣東北至魏郡長樂入清水洹音丸滏水出焉而東流注于歐水滏水今出臨水縣西滏口山經鄴西北至列人縣入于漳其水熱又北二百里曰發鳩之山今在上黨郡長子縣西其上多柘木有鳥焉其狀如烏文首白喙赤足名曰精衛其鳴自詨是炎帝之少女名曰女娃炎帝神農也娃惡佳反語誤或作階女娃遊于東海溺而不返故爲精衛常銜西山之木石以堙于東海堙塞也音因漳水出焉濁漳音章東流注于河或曰出長子縣鹿谷山而東至鄴入清漳又東北百二十里曰少山今在樂平郡沾縣沾縣故屬上黨其上有金玉其下有銅清漳之水出焉東流于濁漳之水清漳出少山大繩谷至武安縣南暴宫邑入于濁漳或曰東北至邑城入于大河也又東北二百里曰錫山其上多玉其下有砥牛首之水出焉而東流注于滏水又北二百里曰景山有美玉景水出焉東南流注于海澤又北百里曰題首之山有玉焉多石無水又北百里曰繡山其上有玉青碧其木多栒木中枚也音荀其草多芍藥芎藭芍藥一名辛夷亦香草屬洧水出焉而東流注于河其中有鱯鱯似鮎而大白色也黽黽似蝦蟆小而青或曰蠖黽一物名耳又北百二十里曰松山陽水出焉東北流注于河又北百二十里曰敦與之山其上無草木有金玉溹水出于其陽音悉各反而東流注于泰陸之水大陸水今鉅鹿北廣平澤即其水泜水出于其隂音抵肆也而東流注于彭水今泜水出中丘縣西窮泉谷東注于堂陽縣入于漳水槐水岀焉而東流注于泜澤又北百七十里曰柘山其陽有金玉其隂有鐵歷聚之水岀焉而北流注于洧水又北三百里曰維龍之山其上有碧玉其陽有金其隂有鐵肥水出焉而東流注于臯澤其中有壘石未詳也音雷或作壘磈壘大石貌或曰石名敞鐵之水出焉而北流注于大澤又北百八十里曰白馬之山其陽多石玉其隂多鐵多赤銅木馬之水出焉而東北流注于虖池呼佗二音又北二百里曰空桑之山無草木上已有此山疑同名也冬夏有雪空桑之水出焉東注于虖池又北三百里曰泰戲之山無草木多金玉有獸焉其狀如羊一角一曰目在耳後其名曰䍶䍶音屋棟之棟其鳴自訆虖池之水出焉今虖池水出鴈門鹵成縣南武夫山而東流注于漊水音樓液女之水出于其陽南流注于沁水液音液懌之懌又北三百里曰石山多藏金玉濩濩之水出焉濩音尺蠖之蠖而東流注于虖池鮮于之水出焉而南流注于虖池又北二百里曰童戎之山臯涂之水出焉而東流注于漊液水又北三百里曰高是之山今在北地靈丘縣滋水出焉音慈而南流注于虖池其木多㯶其草多條滱水出焉音寇東流注于河過博陵縣南又東北入于易水又北三百里曰陸山多美玉𨜰水出焉或作郯水而東流注于河又北二百里曰沂山音祈般水出焉音盤而東流注于河北百二十里曰燕山多嬰石言石似玉有符彩嬰帶所謂燕石者燕水出焉東流注于河又北山行五百里水行五百里至于饒山是無草木多瑶碧其獸多橐駝其鳥多鶹未詳或曰鶹鵂鶹也歷虢之水出焉而東流注于河其中有師魚食之殺人未詳或作鯢又北四百里曰乾山無草木其陽有金玉其隂有鐵而無水有獸焉其狀如牛而三足其名曰獂音元其鳴自詨又北五百里曰倫山倫水出焉而東流注于河有獸焉其狀如麋其川在尾上川竅也其名曰羆九又北五百里曰碣石之山水經曰臨淪山今在遼西碣石縣南水中或曰在右北平驪城縣海邊山繩水出焉而東流注于河其中多蒲夷之魚未詳其上有玉其下多青碧又北水行五百里至于鴈門之山無草木鴈門山即北陵西隃鴈之所出因以名云在高柳北又北水行四百里至于泰澤其中有山焉曰帝都之山廣圓百里無草木有玉金又北五百里曰錞于母逢之山北望鷄號之山其風如䬅䬅急風貌也音戾或云飄風也西望幽都之山浴水出焉浴即黑水也是有大蛇赤首白身其音如牛見則其邑大旱凡北次三經之首自太行之山以至干無逢之山凡四十六山萬二千三百五十里其神狀皆馬身而人面者廿神其祠之皆用一藻茞瘞之藻聚藻茞香草蘭之類青昌代反其十四神狀皆彘身而載玉其祠之皆玉不瘞不埋所用玉也其十神狀皆彘身而八足蛇尾其祠之皆用一璧瘞之大凡四十四神皆用稌糈米祠之此皆不火食右此經之山志凡八十七山二萬三千二百三十里北山經圖讚水馬馬寔龍精爰出水類渥洼之駿是靈是瑞昔在夏后亦有何駟儵魚涸和損平莫慘於憂詩詠萱草帶山則儵壑焉遺岱聊以盤遊臞疏獸鵸䳜鳥何羅魚厭火之獸厥名䑏疏有鳥自化號曰鵸䳜一頭十身何羅之魚孟槐孟槐似貆其豪則赤列象畏獸凶邪是辟氣之相勝莫見其迹鰼鰼魚鼓翮一揮十翼翩飜厥鳴如鵲鱗在羽端是謂怪魚食之辟燔橐駝駝惟奇畜肉鞍是被迅鶩流沙顯功絶地潜識泉源微乎其智耳鼠蹠實以足排虚以羽翹尾飜飛奇哉耳鼠厥皮惟良百毒是禦幽頞幽頞似猴俾愚作智觸物則笑見人佯睡好用小慧終是嬰繫寓鳥孟極足訾獸鼠而傅翼厥聲如羊孟極似豹或倚無良見人則呼號曰足訾鵁鳥毛如雌雉朋翔羣下飛則籠日集則蔽野肉驗鍼石不勞補寫諸犍獸白鵺竦斯鳥諸犍善吒行則銜尾白鵺竦斯厥狀如雉見人則跳頭文如繡磁石磁石吸鐵瑇瑁取芥氣有潜感數亦冥會物之相投出乎意外旄牛牛充兵機兼之者旄冠于旌鼓爲軍之標匪肉致災亦毛之招長蛇長蛇百尋厥鬛如彘飛羣走類靡不吞噬極物之惡盡毒之厲山𤟤山𤟤之獸見人歡謔性善厥投行如矢激是惟氣精出則風作窫窳諸懷獸䲃魚肥遺蛇翼窳諸懷是則害人䲃之爲狀羊鱗黑文肥遺之蛇一頭兩身鮆魚陽鑒動日土蛇致宵微哉鮆魚食則不驕物在所感其用無褾狍鴞狍鴞貪惏其目在腋食人未盡還自齦割圖形妙鼎是謂不若狕閭𩣡馬獨𤞞有獸如豹厥文惟縟閭善躍嶮𩣡馬一角虎狀馬尾號曰獨𤞞𪄀𪃑禦暍之鳥厥名𪄀𪃑昏明是互晝隱夜覿物貴應用安事鸞鵠居暨獸囂鳥三桑居暨豚鳴如彙赤毛四翼一目其名曰囂三桑無枝厥樹唯高䮝獸䮝獸四角馬尾有距涉歷歸山騰嶮躍岨厥貌惟奇如是旋舞天馬龍馮雲遊騰蛇假霧未若天馬自然凌翥有理懸運天機潜御鶌居前鶋鶌居如烏青身黃足食之不飢可以辟穀内厥唯珍配彼丹木飛鼠或以尾翔或以髯凌飛鼠鼓翰翛然背騰用無惟神是馮䴅象蛇䱤父魚有鳥善驚名曰䴅䴅象蛇似雉自生子孫䱤父魚首厥體如豚酸與景山有鳥禀形殊類厥狀如蛇脚二翼四見則邑恐食之不醉鴣𪄶黄鳥鴣𪄶之鳥食之不瞧爰有黄鳥其鳴自叫婦人是服矯情易操精衛炎帝之女化爲精衛沈所東海靈爽西邁乃銜木石以堙波海䍶䍶羆九獸大蛇䍶䍶似羊眼在耳後竅生尾上號曰羆九幽都之山大蛇牛呴山海經卷之三
