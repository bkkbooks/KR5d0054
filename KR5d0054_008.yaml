front:
  text: 山海經卷之八竟七
  hash: sha256:b019d7679c702c2a6d45ea35b7bae2f3f145109b450dd9a8074a4398eccf3cb2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_HFL_008-001a, image: hfl/0676/0676-114.png}
body:
  text: 郭璞傳海外北經海外自東北陬至西北陬者無之國音啓或作綮在長股東為人無䏿䏿肥腸也其人穴居食土無男女死即埋之其心不朽死百二十歲乃復更生鍾山之神名曰燭隂燭龍也是燭九隂因名云視為晝瞑為夜吹為冬呼為夏不飲不食不息息為風息氣息也身長千里在無之東其為物人面蛇身赤色居鍾山下淮南子曰龍身一足一目國在其東一目中其面而居一曰有手足柔利國在一目東為人一手一足反膝曲足居上一腳一手反卷曲也一云留利之國人足反折共工之臣曰相柳氏共工霸九州者九首以食于九山頭各自食一山之物言貪暴難饜相柳之所抵厥為澤溪抵觸厥掘也音橛禹殺相柳其血腥不可以樹五穀種禹厥之三仞三沮掘塞之而上三沮滔言其血膏浸潤壤也乃以為衆帝之臺言地潤濕唯可積土以為臺觀在崑崙之北此崑崙山在海外者柔利之東相柳者九首人面蛇身而青不敢北射畏共工之臺臺在其東臺四方隅有一蛇虎色首衝南方衝猶向也深目國在其東為人舉一手一目一作曰在共工臺東無腸之國在深目東一作南其為人長而無腸為人長大腹內無腸所食之物直通過聶耳之國在無腸國東使雨文虎為人兩手聶其耳言耳長行則以手攝持之也音諾頰切縣居海水中縣猶邑也及水所出入奇怪物言盡規有之兩虎在其東夸父與日逐走入日言及日於將人也逐音胄渴欲得飲飲於河渭河渭不足北飲大澤未至道渴而死弃其杖化為鄧林夸父者蓋神人之名也其能及日景而傾河渭豈以走飲哉寄用於走飲耳幾乎不疾而速不行而至者矣此以一體為萬殊存亡代謝寄鄧林而遁形惡得尋其靈化哉博父國在聶耳東其為人大右手操青蛇左手操黃蛇鄧林在其東二樹木一曰博父禹所積石之山在其東河水所入河出崑崙而潜行地下至葱嶺復出注鹽澤從鹽澤復行南出於此山而為中國河遂注于海也書曰導河積石言時有壅塞故導利以通之拘纓之國在其東一手把纓言其人常以一手持冠纓也或曰纓宜作癭一曰利纓之國尋木長千里在拘纓南生河上西北跂音企踵國在拘纓東其為人大兩足亦大其人行腳跟不著地也孝經鈞命訣曰焦僥跂踵重譯款塞也一曰大踵歐絲之野在大踵東一女子跪據樹歐絲言噉桑而吐絲蓋蠶類也三桑無枝在歐絲東其木長百仞無枝言皆長百仞也范林方三百里在三桑東洲環其下洲水中可居者環繞也務隅之山帝顓頊葬于陽顓頊號為高陽冢今在濮陽故帝丘也一曰頗丘縣城門外廣陽里中九嬪葬于隂嬪婦一曰爰有熊羆文虎離朱鴟久視肉平丘在三桑東爰有遺玉遺玉玉石青馬視肉楊柳甘伹其樹枝幹皆赤黃華白葉黑實吕氏春秋曰其山之東有甘柤焉音如柤梨之柤甘華亦赤枝幹黃華百果所生在兩山夾上谷二大丘居中名曰平丘北海內有獸其狀如馬名曰騊駼陶塗兩音見爾雅有獸焉其名曰駮狀如白馬鋸牙食虎豹周書曰義渠兹白茲白若白馬鋸牙食虎豹按此二說與爾雅同有素獸焉狀如馬名曰蛩蛩即蛩蛩巨虛也一走百里見穆天子傳音卭有青獸焉狀如虎名曰羅羅北方禺疆人面烏身珥兩青蛇踐兩赤蛇宇玄冥水神也莊周曰禺疆立於北極一曰禹京一本云北方禺疆黑身手足乘兩龍海外北經圖讚無臂國萬物相傳非子則根無臂因心構肉生魂所以能然尊形者存燭龍天缺西北龍衝火精氣為寒暑眼作昏明身長千里可謂至神一目國蒼四不多此一不少于野冥瞽洞見無表形遊逆旅所貴維眇柔利國柔利之人曲腳反肘子求之容方此無醜所貴者神形於何有共工臣相柳共工之臣號曰相柳禀此奇表蛇身九首恃力桀暴終禽夏后深目國深目類胡但絶縮軒轅道降款塞歸服穿胸長腳同會異族聶耳國聶耳之國海渚是縣雕虎斯使奇物畢見形有相須手不離面夸父神哉夸父難以理尋傾河逐曰遁形鄧林觸類而化應無常心尋木眇眇尋木生于河邊竦枝千里上干雲天垂隂四極下蓋虞淵跂踵國厥形雖大斯腳則企跳步雀踴踵不閎地應德而臻款塞歸義歐絲野女子鮫人體近蠶蚌出珠非甲吐絲匪蛹化出無方物豈有種無腸國無腸之人厥體維洞心實靈府餘則外用得一自全理無不共平丘兩山之間丘號曰平爰有遺玉駿馬維青視肉甘華奇果所生騊駼騊駼野駿産自北域交頸相摩分背翹陸雖有孫陽絡不能服北方禺彊禺彊水神面色黧黑乘龍踐蛇淩雲附冀靈一玄冥立于北極山海經卷之八
