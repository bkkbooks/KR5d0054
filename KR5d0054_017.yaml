front:
  text: 山海經卷之十七
  hash: sha256:356933de6ad5f0461c308242cd1cb8a769ca60d0b224a82ba6f20ae0ae4e44c8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_HFL_017-001a, image: hfl/0676/0676-188.png}
body:
  text: 郭璞傳大荒北經東北海之外大荒之中河水間附禺之山帝顓頊與九嬪葬焉此盖殊俗義所作冢爰有𩿨乆文貝離俞鸞鳥鳳鳥大物小物言備有也青鳥琅鳥玄鳥黄鳥虎豹熊羆黄蛇視肉璿瑰瑶碧皆出衛於山在其邊也丘方圓三百里丘南帝俊竹林在焉大可爲舟言舜林中竹一節可以爲船也竹南有赤澤水水色赤也名曰封淵封赤大也有三桑無枝皆南百仞丘西有沉淵顓頊所俗有胡不與之國一國後名耳今胡夷小語通皆然也列姓黍食大荒之中有山名曰不咸有肅愼之國今肅愼國去遼東三千餘里穴居無衣衣猪皮冬以膏塗體厚數分用却風寒其人皆工彤弓長四尺勁强箭以楛木爲之長尺八寸青石爲鏑此春秋時集陳侯遲所得矢也晋太興二年平州剌史崔昆遣别駕高會使來獻肅愼氏之弓矢箭鏃有鉗骨作者問之云轉内國通得因此今名之爲挹靈國出好貂赤玉豈從外海從來至此後漢書謂挹樓國是也有蜚蛭四翼蜚窒兩音有蟲獸首蛇身名曰琴蟲亦蛇類也有人名曰丈人有丈人之國釐姓黍食有大青蛇黄頭食鹿今南方蚺蛇食鹿鹿亦麀類也有榆山有玄鮌攻程州之山皆因其事以名山也大荒之中有山名曰衡天有先民之山有槃音盤木千里有叔歜國音作感切一音觸也顓頊之子黍首使四鳥虎豹熊羆有黑蟲如熊狀名曰猎猎或作狼音夕有齊之國姜姓使虎豹熊羆大荒之中有山名曰光檻大逢之山河濟所入海北注焉河濟注海巳後出海外此山中也其西北名曰禹所積石青陽山者有順山者順水出焉有始州之國有丹山此山純出丹朱也竹書曰和甲征得丹一山今所出亦有丹山出土穴中也有大澤方千里羣鳥所解穆天子傳曰此至廣原之野飛鳥之所解其羽乃於此獵鳥獸絶群載羽百車竹書亦曰穆天子北征行流沙千里積羽千里皆謂此澤有毛民之國其人面體皆生毛也姓依食黍使四鳥禹生均國均國生役來役來生循鞈音單祫也循鞈殺綽人綽名帝念之灊之爲國潜宻用之作國是此毛民有儋耳之國任姓其人耳大垂下儋在肩上朱雀儋耳鏤盡耳亦以效今人也禺號子食穀北海海渚中言在海島中種粟給食謂禺强也有神人面鳥身珥兩青蛇踐兩赤蛇名曰禺强大荒之中有山名曰北極天樻音遺海水北注焉有神九首人面鳥身名曰九鳳又有神銜蛇操蛇其狀虎首人身四蹄長肘名曰强良亦在畏獸中也大荒之中有山名曰成都載天有人珥兩黄蛇提兩黄蛇名曰夸父后土生信信生夸父夸父不量力欲追日景逮之於隅谷隅淵日所令入也今作虞將飲河而弗足也將走大澤未至死于此渴死應龍已殺蚩尤又殺夸父上云夸父不量力與日競而死今此復云爲應龍所殺死無定名觸事而寄明其變化無方不可得測揆之也乃去南方處故南方多雨言龍水物以類相感故也有無腸之國是任姓爲人長也無繼子食魚繼亦作啓謂膊腸也共工臣名曰相繇相柳也語聲轉身九首蛇身自環言蟠旋也食于九山言貪殘也其所在尼尼啞猶噴吒尼止也即爲源澤言多氣力之也不幸乃苦言氣酷烈百獸莫能處言畏之也禹湮洪水殺相繇禹塞洪水浩大因以溺也殺之其血腥臭不可生穀其地多水不可居言膏血滂流成淵也禹湮之三仞三沮言禹坐土塞也蛇陷壤也乃以爲池地羣帝是因以爲臺地下宜積止故衆帝因來在此共作臺也在崑崙之北有嶽之山尋竹生焉大竹大荒之中有山名曰不句海水北入焉有係昆之山者有共工之臺射者不敢北鄉言畏之也有人衣著青衣名曰黄帝女魃音旱魃也蚩尤作兵伐黄帝黄帝乃令應龍攻之冀州之野冀州中土也黄帝亦教虎豹熊羆以與炎帝戰於阪泉之野而滅之見史記應龍蓄水蚩尤請風伯雨師從大風雨黄帝乃下天女曰妭雨止遂殺蚩尤妭不得復上所居不雨旱氣在也叔均言之帝後置之赤水之北遠徙之也叔均乃爲田祖主田之詩曰田祖有神也妭時亡之也畏見逐也所欲逐之者令田祖北行向水位也先除水道决通溝瀆言逐之必得雨故先利水道今之逐魃是也有人方食魚名曰深目民之國盻姓食魚亦胡類但服絶深黄帝時至也有鍾山者有女子衣青衣名曰赤水女子獻神女也大荒之中有山名曰融父山順水入焉有人名曰犬戎黄帝生苗龍苗龍生融吾融吾生卞明卞明生白犬白犬二犬有牝牡言自相配合也是爲犬戎害食有赤獸焉狀無首名曰戎宣王尸犬戎之神名也有山名曰齊州山蠶山音潛鮮野山魚山有人一目當面中生一曰是威姓少昊子食黍有繼無繼無民無任姓無骨子食氣魚言有無骨人尸子曰徐偃王有筋無骨也西北海外流沙之東有國曰中輪顓頊之子食黍有國名曰賴丘有犬戎國有神人面獸身名曰犬戎西北海外黑水之北有人有翼名曰苗民三苗之民也顓頊生讙頭讙頭生苗民苗民釐姓視苗民有山名曰章山大荒之山衡石山九隂山灰野之山上有赤樹青牛名曰苦术在崑崙西極其葉光赤照下地也有牛黎之國有人無骨儋耳子儋耳人生無骨子也西北海之外赤水之北有章尾山有神人面蛇身而赤身長千里者也直目正乘直目縱也正乘未聞其瞑乃晦其視乃明言視爲晝瞑爲夜也不食不寢不息風雨是謁言能請致風雨是燭九隂照九隂之幽隱也是爲燭龍離騷經曰日安不到燭龍何燿詩含神務曰天下不足西北無隂陽消息故有龍銜火精往照天門之中者矣山海經卷之十七
