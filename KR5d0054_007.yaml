front:
  text: 山海經卷之七
  hash: sha256:3e225c2c6e9df71dbc36b02bc866920d1f9f8f07cb7cf070c60daa3262d17826
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_HFL_007-001a, image: hfl/0676/0676-102.png}
body:
  text: 郭璞傳海外西經海外自西南陬至西北陬者滅蒙鳥在結胸國北為鳥青赤尾大運山高三百仞在滅蒙鳥北大樂之野夏后啓於此儛九代九代馬名儛謂盤作之令儛也乘兩龍雲蓋三層層猶重也左手操翳羽葆幢也右手操環玉空邊等為環佩玉璜半璧曰璜在大運山北歸藏鄭母經曰夏后啓筮御飛龍登乎天吉明啓亦仙也一曰大遺之野大荒經云大穆之野三身國在夏后啓北一首而三身一臂國在其北一臂一目一鼻孔有黃馬虎文一目而一手竒肱之國或作引奇音羈在其北其人一臂三目有隂有陽乘文馬隂在上陽在下文馬即吉白也有鳥焉兩頭赤黃色在其旁其人善為機巧以取百禽能作飛車從風遠行湯時得之於豫州界中即壞之不以示人後十年西風至復作遣之形天與帝至此爭神帝斷其首葬之常羊之山乃以乳為目以臍為口操干戚以舞干盾戚斧也是為無首之民女祭女戚在其北居兩水間戚操魚䱉鱓魚屬祭操俎肉几䳐鳥𪆻鳥次瞻兩音其色青黃所經國亡此癘禍之鳥即今梟鴸鶹之類在女祭北䳐鳥人面居山上一曰維鳥青鳥黃鳥所集丈夫國在維鳥北其為人衣冠帶劎敖帝大戊使王孟採藥從西王母至北絶糧不能進食木實衣木皮終身無妻而生二子從形中出其父即死是為丈夫民女丑之尸生而十日灸殺之在丈夫北以右手障其面蔽面十日居上女丑居山之上巫咸國在女丑北右手操青蛇左手操赤蛇在登葆山羣巫所從上下也採藥往來并封在巫咸東其狀如彘前後皆有首黑今弩弦蛇亦此類也女子國在巫咸北兩女子居水周之有黃池婦人入浴出即懷妊矣若生男子三歲輒死周猶繞也離騷曰水周於堂下也一曰居一門中軒轅之國在此窮山之際其不壽者八百歲其國在山南邊也大荒經云岷山之南在女子國北人面蛇身尾交首上窮山在其北不敢西射畏軒轅之丘言敬畏黃帝威靈故不敢向西而射也在軒轅國北其丘方四蛇相繞繚繞樛纏此諸夭之野夭音沃鸞鳥自歌鳳鳥自舞鳳凰卵民食之甘露民飲之所欲自從也言滋味無不有所願得自在此謂沃野也百獸相與羣居在四蛇北其人兩手操卵食之兩鳥居前導之龍魚陵居在其北狀如狸或曰龍魚似狸一角一曰蝦音遐即有神聖乘此以行九野九域之野一曰鱉魚在夭野北其為魚也如鯉鱉音猶也白民之國在龍魚北白身被髮言其人體洞白有乘黃其狀如狐其背上有角乘之壽二千歲周書曰白民乘黃似狐背上有兩角即飛黃也淮南子曰天下有道飛黃伏皂肅愼之國在白民北有樹名曰雄或作雒常先入代帝於此取之其俗無衣服中國有聖帝代立者則此木生皮可衣也長股之國在雄常北被髮國在赤水東也長臂人身如中人而臂長二丈以類推之則此人腳過三丈矣黃帝時至或曰長腳人常負長臂人入海中捕魚也一曰長腳或曰有喬國今伎家喬人蓋象此身西方蓐收左耳有蛇乘兩龍金神也人面虎爪白毛執鉞見外傳海外西經圖讚夏后啓筮御飛龍果儛九代雲融是揮玉璜是佩對楊帝德禀天靈誨三身國一臂國品物流形以散混沌增不為多減不為損厥變難原請尋其本竒肱國妙哉工巧奇肱之人因風構思制為飛輪淩頽遂軌帝湯是賔形天爭神不勝為帝所戮遂厥形夭臍口乳目仍揮干戚雖化不服女祭女戚彼姝者子誰氏二女曷為水間操魚持俎厥儷安在離羣逸處䳐鳥𪆻鳥有鳥青黃號曰𪆻䳐與妖會合所集會至類則梟鶹厥狀難媚丈夫國隂有偏化陽無産理丈夫之國王孟是始感靈所通桑石無子女丑尸十日並熯女丑以斃暴于山阿揮袖自翳彼美誰子逢天之厲巫咸羣有十巫巫咸所統經技是搜術藝是綜採藥靈山隨時登降并封龍過無頭并封連載物狀相乖如驥分背數得自通尋之愈閡女子國簡狄有吞姜嫄有履女子之國浴于黃水乃娠乃字生男則死軒轅國軒轅之人承天之祐冬不襲衣夏不扇暑猶氣之和家為彭祖乘黃飛黃奇駿乘之難老揣角輕騰忽若龍矯實鑒有德乃集厥早滅蒙鳥大運山雄常樹青質赤尾號曰滅蒙大運之山百仞三重雄常之樹應德而通龍魚龍魚一角似狸處陵俟時而出神聖被乘飛鶩九域乘龍上升西方蓐收蓐收金神白毛虎爪珥蛇執鉞專司無道立號西阿恭行天討山海經卷之七
