front:
  text: 山海經卷之十六竟十
  hash: sha256:39f5534ec704f5c350a162f5ecf01f2bd54f50d58da87448f2bc8c00b00c97f3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_HFL_016-001a, image: hfl/0676/0676-176.png}
body:
  text: 郭璞傳大荒西經西北海之外大荒之隅有山而不合曰不周負子淮南子曰昔共工與顓頊爭為帝怒而觸不周之山天維絶地柱折故今此山缺不周匝也有兩黃獸守之有水曰寒暑之水水西有濕山水東有幕音莫山有禹攻共工國山言攻其國殺其臣相抑於此山啓筮曰共工人面蛇身朱髮也有國名曰淑士顓頊之子言亦出自高陽氏也有神十人名曰女媧之腸化為神處栗廣之野女媧古神女而帝者也人面蛇身一日之中七十變其腸化為此神栗廣野名也媧音瓜橫道而處言斷道也有人名曰石夷來風曰韋來或亦作本也處西北隅以司日月短長主察日月晷度之節也有五采之鳥有冠名狂鳥爾雅云往夢即此也有大澤之長山有白民之國西北海之外赤水之東有長脛之國腳步五尺有西周之國姬姓食穀有人方耕名曰叔均帝俊生稷俊且為嚳嚳第二妃生后稷也稷降以百穀稷之弟曰台音胎璽生叔均叔均是代其父及稷播百穀始作耕有赤國妻氏有雙山西海之水大荒之中有方山者上有青樹名曰匱格之松木名音矩日月所出入西海之外赤水之西有先民之國食穀使四鳥有北狄之國黃帝之孫始均始均生北狄有芒山有桂山有榣山此山多桂及榣木因名之其上有人名曰太子長琴顓頊生老童世本云顓頊娶于騰墳氏謂之女祿産老童也老童生祝融即重黎也為高辛氏火正號曰祝融祝融生太子長琴是處榣山始作樂風創樂制風曲也有五采鳥三一名曰鳳鳥一名曰鸞鳥一名曰鳳凰有蟲狀如菟胸以俊者裸不見言皮色青故不見其裸露處也其如猿狀猿又似猿也大荒之中有山名曰豐沮玉門日月所入有靈山巫咸巫即巫盻巫彭巫姑巫真巫杞巫巫謝巫羅十巫從此升降百藥爰在言群巫上下此山采之有西王母之山海山壑山皆郡太虛之山名也有沃之國言其土沃饒也沃民是處沃野鳳鳥之卵是食甘露是飲凡其所欲其味盡存其所願滋味無所不欲在爰其有甘華甘柤白柳視肉三騅璿瑰瑶碧璿瑰亦玉名穆天子傳曰收斯璿瑰板因兩音也白木琅玗樹色正白今南方文木亦黑木也白丹青丹又有黑丹孝經爰神嬰曰王者德至山陵而黑丹出然則者别是采石名亦猶白皆云黑也銀鐵鸞鳥自歌鳳鳥自舞爰有百獸相羣是處是謂沃民之野有三青鳥赤首黑目一名曰大和鳥一名曰少黎皆西王母所使也有軒轅之臺射者不敢西鄉畏軒轅之臺敬難帝也大荒之中有龍山日月所入有三渾水名曰三淖昆吾之所食穆天子傳曰滔水濁融繇氏之所食亦此類也有人衣青以袂蔽面袂袖也音執名曰女王之尸有女子之國王侯至沃沮國盡東界問其耆老又云國人嘗船捕魚遭風見吹數十日東見一國在大海中張女無男即此國者也有桃山有虻山有桂山有干土山有丈夫之國其國無婦人也有弇州之山五采之鳥叩天張口噓天名曰鳴鳥爰有百樂歌舞之風言有百種伎樂歌舞皆有風曲者也有軒轅之國其人人面蛇身江山之南棲為吉即窮山之際也山居為棲者言無凶妖也壽者乃八百歲壽者則數千年西海渚中神人人面鳥身珥兩青蛇踐兩赤蛇名曰弇兹大荒之中有山名日月山天極吳姬天門日月所入有神人面無臂兩足反屬於頭上名曰噓言噓啼也顓頊生老童老童生重及黎世本云老童娶于根水氏謂之驕福重産及黎者也帝令重獻上天令黎卭下地古者人神雜擾無顓頊乃命南正司天以屬神命大正黎司地以屬氏重實上天黎實司地獻印未詳也下地是生噎處於西極以行日月百之行次言察日月星辰依之度數次舍有人反臂名曰天虞赤尸虞也有女子方浴月帝俊妻常羲生月十有二此始浴之義與羲和浴日月有玄丹之山者出黑丹也有五采之鳥人面有髮爰有青鳥黃鳥驁音敖鳥青黃其集者其國亡有池名孟冀之攻顓頊之池孟冀人姓名大荒之中有山名曰鏖鏊音敖巨日月所入者有獸左右有首名曰屏逢即并封也語有輕轉山巫山者有壑山者金門之山有人名曰黃姬之尸比翼之鳥有白鳥青翼黃尾玄喙奇鳥有赤犬名曰天犬其所下者有兵周書曰天狗所止地蓋餘光飛天為流星長數十丈其疾如風其聲如雷其光如電吳楚七國及時吠過梁分曲野也西海之中南流沙之濱赤水之後黑水之前有山名曰崑崙之丘有神人面虎身有文有尾皆白處之言其尾以白為點駮者也其下有弱水之淵環之其水不勝鴻毛也其外有炎火之山沒物輒然今去扶南東萬里有耆薄國去耆薄東五千至許有火山國其山雖雷雨常然火中有白鼠時出在山邊求食人捕得之以其毛作布今之火浣布是也即此火山之類也有人戴稱虎齒有尾穴處名曰西王母河圖玉板亦曰西王母居崑崙山山西經曰西王母居玉山穆天子傳曰乃紀名迹于弇山之石曰西王母之山也然則西王母雖以崑崙為宫亦有離室别窟遊息之處不專住於一山也故記事者各舉其所見雨言之此山萬物盡有大荒之中山名曰常陽之山日月所入有寒荒之國有二人曰女祭女戌持鱓戌持俎之也壽麻之國吕氏春秋曰西服壽麻北懷闒茸也有二人曰南嶽取州名曰女虔女虔生季格季格生壽麻壽麻是正立無景疾呼無響言其稟形氣有異於人也列仙傳曰玄俗元景也爰有大暑不可以往言熱灸殺人也有人無首操戈盾立名曰憂耕之尸亦形天尸之類也故成湯伐夏桀于章山剋之于章山名斬耕厥前頭亦在前之也耕既元首立走厥咎逃避罪也乃降于巫山自竄於巫山巫山今在建平巫縣也有人名曰吳回子奇子奇右是無右臂即奇肱也吳回祝融弟赤為火正也有蓋山之國有樹赤皮支幹青葉名曰朱木或作三戚木也有一臂民北極下亦有一腳人有見河圖玉板大荒之中有山名曰大荒之山日月所入有人三面是顓頊子三面一臂奇名無右臂三面之人不死言人頭三邊各有面也玄菟太守王傾主沃沮國問其耆長云復有一破船隨波出沒在海岸邊有一人項中復面與語不相解了不食而死此復是兩面人也吕氏春秋曰一臂三面之鄉是也是謂大荒之野西南海之外赤水之南流沙之西有人珥兩青蛇乘兩龍名曰夏后關關上三嬪于天嬪婦也言獻美於天帝也得九辨九歌以下皆天帝樂名也啓登天而竊以下用之啓筮曰昔彼九冥是與帝辨于同宫之序是為九歌又曰不可竊與九歌以國于下義具見歸藏也此天穆之野高二千仞竹書曰瑞産百鮌是惟若陽居天穆陽阪者也開焉得始歌九韶竹書曰夏后啓舞九韶也有丘人國人面魚身炎帝之孫炎帝神農是也名曰靈恝音券契也靈恝生氏人是能上下于天言能乘雲雨也有魚偏枯名曰魚婦顓頊死即復蘇言其能變化也風道此來天乃大水泉風果溢出道猶徙也韓非曰玄鶴二八道南方來也蛇乃化魚是謂魚婦顓頊死即復蘇淮南子曰后稷龍在建木西其人死復蘇其半乃為魚蓋謂此也有青鳥黃頭身赤足六首名曰鸀音觸鳥有大巫山者有金之山西大荒之隅有偏句常羊之山山海經卷之十六
