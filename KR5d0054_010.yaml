front:
  text: 山海經卷之十十一同卷竟八
  hash: sha256:340219ad0a0f4849993628740fdab10ffa52e9f2db83a4e7a0def203e9ae1f54
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_HFL_010-001a, image: hfl/0676/0676-136.png}
body:
  text: 郭璞傳海内南經海内東南陬以西者從南頭起之也甌居海中今臨海永寧縣即東甌在岐海中也音區閩在海中音旻其西北有山閩越即西甌今建安郡是也亦在岐海中一曰閩中山在海中三天子鄣山音章在閩西海北今在新安歙縣東今謂之三王山浙江出其邊也張氏士地記曰東陽永康縣南四里有石城山上有小石城云黄帝曾遊此即三天子都也一曰在海中桂林八樹在番隅東八樹而成林言其大也番隅今番隅縣伯慮國未詳離耳國鎪離其耳分令下垂以爲餘即儋耳也在朱崖海渚中不食五穀但噉蚌及藷藇也彫題國黔涅其面畫體形爲鱗采即鮫人也北朐國未詳音劬皆在鬱水南鬱水出湘陵南山一曰相慮梟陽國在北朐之西其爲人人面長唇黑身有毛反踵見人笑亦笑左手操管周書曰州靡髣髴者人身反踵自笑笑則上唇掩其面爾雅亦云髣髴大傳曰周書成王時州糜國獻之海内經謂之贛臣人今交州南康郡深山中皆有此物也長丈許脚跟反向健走被髮好笑雌者能作汁洒中人即病土俗呼爲山都南康今有贛水以有此人固以名水猶大荒說地有域人人因號其山爲域山亦此類也兕在舜葬東湘水南其狀如牛蒼黑一角蒼梧之山帝舜葬于陽即九疑山也禮記亦曰舜葬蒼梧之野也帝丹朱葬于隂今丹陽縣復有丹朱冢也竹書亦曰后稷放帝朱于丹水與此義符丹朱稱帝者猶漢山陽公死加獻帝之謚也汜林方三百里在狌狌東或作猩猩字同耳狌狌知人名其爲獸如豕而人面周書曰鄭郭狌狌者狀如黄狗而人面頭如雄雞食之不眯今交阯封溪出狌狌土俗人說云狀如豚而復似狗聲如小兒啼也在舜葬西狌狌西北有犀牛其狀如牛而黑犀牛似水牛猪頭在狌狌知人名之西北庳脚三角夏后啓之臣曰孟涂是司神于巴人聽其獄訟爲之神主請訟于孟涂之所令斷之也其衣有血者乃執之不直者則血見于衣是請生言好生也居山上在丹山西丹山在丹陽南丹陽居屬也今建平郡丹陽城秭歸縣東七里即孟涂所居也窫窳龍首居弱水中在狌狌知人名之西其狀如龍首食人窫窳本蛇身人面爲貳負臣所殺復化而成此物也有木其狀如牛河圖玉版說芝草横生或如車馬或如龍蛇之狀亦此類也引之有皮若纓黄蛇言牽之皮剥如人冠纓及黄蛇狀也其葉如羅如綾羅也其實如欒欒木名黄本赤枝青葉生雲雨山或作卯或作麻音欒其木若蓲蓲亦木名未詳其名曰建木在窫窳西弱水上建木青葉紫莖黑花黄實其下聲無響立無影也氐人國氐音觸抵之抵在建木西其爲人人面而魚身無足盡胷以土人胷以下魚也巴蛇食象三歲而出其骨君子服之無心腹之疾今南方蟒蛇吞鹿鹿已爛自絞於樹腹中骨皆穿鱗甲間出此其類也楚詞曰有蛇吞象厥大何如說者云長千尋其爲蛇青黄赤黑一曰黑蛇青首在犀牛西旄馬其狀如馬四節有毛穆天子傳所謂豪馬者亦有旄牛在巴蛇西北高山南匈奴一曰獫狁開題之國音提列人之國並在西北三國並在旄馬西北海内南經圖讚梟陽髴髴怪獸被髮操竹獲人則笑唇蔽其目終亦號咷反爲我戮狌狌狌狌之狀形乍如犬厥性識往爲物警辯以酒招災自貽纓罥夏后啓臣孟涂孟涂司巴聽訟是非厥理有曲血乃見衣所請靈斷嗚呼神微建木爰有建木黄實紫柯皮如蛇纓葉有素羅絶蔭弱水義人則過氐人炎帝之苗寔生氐人死則復蘇厥身爲鱗雲南是託浮游天津巴蛇象實巨獸有蛇吞之越出其骨三年爲期厥大何如屈生是疑山海經卷之十
