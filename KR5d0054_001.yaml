front:
  text: 山海經卷之一
  hash: sha256:dffad597425940c8579d70ef50665ced3adf18face94a1ccbcc13d59cf384842
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_HFL_001-001a, image: hfl/0675/0675-016.png}
body:
  text: 郭璞傳南山經南山經之首曰䧿山其首曰招搖之山臨于西海之上在蜀伏山山南之西頭濱西海也多桂桂葉似枇杷長二尺餘廣數寸味辛白花叢生山峰冬夏常青間無雜木吕氏春秋曰招搖之桂多金玉有草焉其狀如韭曰韭音九爾雅云蜀山亦多之而青花其名曰祝餘或作桂茶食之不飢有木焉其狀如穀而黑理穀楮也皮作紙名者以其也其華四照言有光焰也若木華赤其光照亦此類也見離騷經其名曰迷穀佩之不迷有獸焉其狀如禺而白耳禺而大赤目長山中多有說者不了此物名禺牛亦牛形或作猴皆失之也伏行人走其名曰狌狌食之善走生獸狀如猿伏行交足見京房易麗𪊨之水出焉音而西流注于海其中多育沛未詳佩之無瘕疾瘕也又東三百里曰堂一作常庭之山多棪木棪别名連其子似奈而赤可食音剡多白猿今猿似獼猴而大臂腳長便捷色有黑有黃鳴其聲哀多水玉水玉今水精也相如上林賦曰水玉磊砢赤松子所服見列仙傳多黃金又東三百八十里曰猿翼之山其中多怪獸水多怪魚凡言怪者皆謂貌狀倔奇不常也尸子曰徐偃王好怪沒深水而得怪魚入深山而得怪獸者多列於庭多白玉多蝮蟲蝮蟲色如綬文鼻上有針大者百餘斤一名反鼻蟲古虺字多怪蛇多怪木不可以上又東三百七十里曰杻陽之山音組其陽多赤金銅也其隂多白金銀也見爾雅山南高陽山北為隂有獸焉其狀如馬而白首其文如虎而赤尾其音如謡如人歌聲其名曰鹿蜀佩之宣子孫佩謂帶其皮尾怪水出焉而東流注于憲翼之水其中多玄龜其狀如龜而鳥首虺尾虺鋭其名曰旋龜其音曰判木如破木聲佩之不聾可以為底為猶治也外傳曰不為一作底猶病愈也東三百里曰柢山多水無草木有魚焉其狀如牛陵居蛇尾有翼其羽在魼下亦作脅其音如留牛莊子曰之狗謂此牛也穆天子傳曰天子之狗執虎豹其名曰鯥音六冬死而夏生此亦蟄類也謂之死者言其蟄無所知如死耳食之無腫疾又東四百里曰亶爰之山亶音蟬多水無草木不可以上言崇峭也有獸焉其狀如狸而有髦其名曰類類或作沛髦或作髮自為牝牡食者不妬莊子亦曰類自為雌雄而化今貆猪亦自為雌雄又東三百里曰基山其陽多玉其隂多怪木有獸焉其狀如羊九尾四耳其目在背其名曰猼訑博施二音施一作施佩之不畏不知恐畏有鳥焉其狀如雞而三首六目六足三翼其名曰𪁺𪂄急性尚付廠乎二音食之無卧又東三里曰青丘之山亦有青丘國在海外水經云即上林賦云秋田於青丘其陽多玉其隂多青𩇥𩇥黝屬音瓠有獸焉其狀如狐而九尾即九尾狐其音如嬰兒能食人食者不蠱噉其肉令人不逢妖邪之氣或曰蠱蠱毒有鳥焉其狀如鳩其音若呵如人相呵呼聲名曰灌灌或作灌𤄀佩之不惑英水出焉南流注于即翼之澤其中多赤鱬音儒其狀如魚而人面其音如鴛鴦食之不疥一作疾又東三百五十里曰箕尾之山其尾踆于東海多沙石踆古蹲字言臨海上音存汸水出焉音芳而南流注于淯音育其中多白玉凡䧿山之首自招搖之山以至箕尾之山凡十山二千九百五十里其神狀皆鳥身而龍首其祠之禮毛言擇生取其毛色也周官曰陽祀用騂牲之毛用一璋玉瘞半圭為漳瘞埋也糈用稌米糈祀神之米名先吕反今江東音所一音壻稌稻也他覩反糈或作疏非也一璧稻米白菅為席菅茅屬也音間南次二經之首曰櫃山音矩西臨流黃北望諸毗東望長右皆山名英水出焉西南流注于赤水其中多白玉尸子曰水方折者有玉員折者有珠多丹粟細丹砂如粟也有獸焉其狀如豚有距其音如狗吠其名曰狸力見則其縣多土功有鳥焉其狀如鴟而人手其腳如人手鴟音處脂反其音如痺末詳其名曰鴸音株其鳴自號也見則其縣多放士放放逐或作效也東南四百五十里曰長右之山無草水多水有獸焉其狀如禺而四耳其名長右以山出此獸因以名之其音如吟如人呻吟聲見則其郡縣大水又東三百四十里曰堯光之山其陽多玉其隂多金有獸焉其狀如人而彘鬛穴居而冬蟄其名曰猾褱滑懷兩音其音如斫木如人斫木聲見則縣有大繇謂作役也或曰其縣亂又東三百五十里曰羽山今東海祝其縣西南有羽山即鯀所殛處計此道里不相應似非也其下多水其上多雨無草木多蝮蟲蚖也又東三百七十里曰瞿父之山音劬無草木多金玉又東四百里曰句縣之山無草木多金玉今在會稽餘姚縣南句章縣北故兹二縣因此為名云見張氏地里志又東五百里曰浮玉之山北望具區具區今吳縣西南太湖也尚書謂之震澤東望諸毗水名有獸焉其狀如虎而牛尾其音如吠犬其名曰彘是食人苕水出于其隂北流注于具區其中多鮆魚鮆魚狹薄而長頭大者尺餘太湖中今饒之一名刀魚音禪啓反又東五百里曰成山四方而三壇形如人築壇相纍也成亦重耳其上多金玉其下多青䨼䦠水出焉音涿而南流注于一作流注于西呼勺呼音呼勺或作多下同其中多黃金今永昌郡水出金如粃在沙中尸子曰清水出黃金王英又東五百里曰會稽之山四方今在會稽郡山隂縣南上有禹冢及井其上多金玉其下多砆石砆碔跌石似玉今長沙臨湘出之赤地白文色籠葱不分明勺水出焉而南流注于湨音鵙又東五百里曰夷山無草木多砂石湨一作水出焉而南流注于列塗又東五百里曰僕勾一作夕之山其上多金玉其下多草木無鳥獸無水又東五百里曰咸隂之山無草木無水又東四百里曰洵一作旬山其陽多金其隂多玉有獸焉其狀如羊而無口不可殺也禀氣自然其名曰䍺音還或音患洵水出焉音恂而南流注于閼之澤音遏其中多芘羸又東四百里曰呼勺之山其上多梓柟梓山楸也柟大木葉似桑今作楠音南爾雅以為柟其下多荆杞杞茍杞也子赤滂水出焉音滂沱之滂而東流注于海又東五百里曰區吳之山無草木多砂石鹿水出焉而南流注于滂水又東五百里曰鹿吳之山上無草木多金石澤更之水出焉而南流注于滂水水有獸焉名曰蠱雕蠱或作纂其狀如雕而有角其音如嬰兒之音是食人東五百里曰漆吳之山無草木多博石無玉可以為博基石處于海東望丘山其光載出載入神光之所潜耀是惟日次是日景所次會凡南次二經之首自拒山至于漆吳之山凡十七山七千二百里其神狀皆龍身而鳥首其祠毛用一璧瘞糈用稌稍廣也南次三經之首曰天虞之山其下多水不可以上東五百里曰禱過之山其上多金玉其下多犀兕犀似水牛猪頭庳腳似象有三蹄大腹黑色三角一在頭上一在額上一在鼻上在鼻上者小而不墮食角也好噉口中常灑血沫兕亦似水牛青色二角重三千斤多象象獸之最大者長鼻大者牙長一丈性妬不畜淫子有鳥焉其狀如鵁鵁似鳧而小腳近尾音骹箭之骹而白首三足或作手人面其名曰瞿如音劬其鳴自號也泿水出焉音銀而南流注于海其中有虎蛟蛟似蛇四足龍屬其狀魚身而蛇尾其音如鴛鴦食者不腫可以已痔又東五百里曰丹穴之山其上多金玉丹水出焉而南流注于渤海渤海海岸曲崎頭也有鳥焉其狀如雞五采而文名曰鳳皇首文曰德翼文曰義背文曰禮膺文曰仁腹文曰信是鳥也飲食自然自歌自舞見則天下安寧漢時鳳鳥數出高五六尺五采莊周說鳳文字與此有異廣雅云鳳雞頭鵝頷蛇頸龜背魚尾雌曰凰雄曰鳳又東五百里曰發爽之山無草木多水多白猿泛水出焉而南流注于渤海又東四百里至于旄山之尾其南有谷曰育遺或作隧多怪鳥廣雅曰朋爰居雀皆怪鳥之屬也凱風自是出凱風南風又東四百里至于非山之首其上多金玉無水其下多蝮蟲又東五百里曰陽夾之山無草木多水又東五百里曰灌湘之山上多木無草多怪鳥無獸一作𤄬湖射之山又東五百里曰雞山其上多金其下多丹雘雘赤色者或曰臒美丹也見尚書音尺蠖之蠖黑水出焉而南流注于海其中有鱄魚音團扇之團其狀如鮒而彘毛其音如豚見則天下大旱又東四百里曰令丘之山無草木多火其南有谷焉曰中谷條風自是出東北風為條風記曰條風至出輕繫督逋留有鳥焉其狀如梟人面四目而有耳其名曰顒音娛其鳴自號也見則天下大旱又東三百七十里曰侖者之山音論說之論一音倫其上多金玉其下多青䨼有木焉其狀如穀而赤理其汁如漆其味如飴食者不飢可以釋勞其名曰白䓘或作睪蘇睪蘇一名白䓘見廣雅音羔可以血玉血謂可用染玉作光彩又東五百八十里曰禺槀之山多怪獸多大蛇東五百八十里曰南禺之山其上多金玉其下多水有穴焉水春輒入夏乃出冬則閉佐水出焉而東南流注于海有鳳皇鵷雛亦鳳屬凡南次三經之首自天虞之山以至南禺之山凡一十四山六千五百三十里其神皆龍身而人面其祠皆一白狗祈祈請禱也糈用稌右南經之山志大小凡四十山萬六千三百八十里南山經圖讚桂桂生南裔枝華岑嶺廣莫熙葩凌霜津穎氣王百藥森然雲挺迷穀爰有奇樹産自招搖厥華流光上映垂霄佩之不惑潜有靈標狌狌前作生狌狌似猴走立行伏欀木挺力少辛明目飛廉迅足豈食斯肉水玉水玉沐浴潜映洞淵赤松是服靈蛻乘煙吐納六氣升降九天白猿白猿肆巧由基撫弓應吁而號神有先中數如循環其妙無窮鹿蜀鹿蜀之獸馬質虎文驤首吟鳴矯足騰羣佩其皮毛子孫如雲鯥魚號曰鯥處不在水厥狀如牛鳥翼蛇尾隨時隱見倚乎生死類類之為獸一體兼二近取諸身用不假器窈窕是佩不知妬忌猼𧦧猼𧦧似羊眼反在背視之則奇推之無怪若欲不恐厥皮可佩祝荼草旋龜𪁺𩿧魚祝荼嘉草食之不飢鳥首蚖尾其名旋龜𪁺𩿧六足三翅並翬灌灌鳥赤鱬厥聲如訶厥形如鳩佩之辨惑出自青丘赤鱬之物魚身人頭鴸鳥彗星橫天鯨魚死浪鴸鳴于邑賢士見放厥理至微言之無况猾褱猾褱之獸見則興役膺政而出匪亂不適天下有道幽形匿迹長右彘長右四耳厥狀如猴實為水祥見則橫流彘虎其身厥尾如牛會稽山禹徂會稽爰朝羣臣不虔是討乃戮長人玉贑表夏玄石勒秦患前作䍺有獸無口其名曰患害氣不入厥體無間至理之盡出乎自然犀犀頭似猪形兼牛質角則併三分身互出鼓鼻生風壯氣隘溢兕兕推壯獸似牛青黑力無不傾自焚以革皮充武備角助文德象象實魁梧體巨貌詭肉兼十牛目不踰豕望頭如尾動若丘徙纂雕瞿如鳥虎蛟纂雕有角聲若兒號瞿如三手厥狀似鵁魚身蛇尾是謂虎蛟鳳鳳皇靈鳥實冠羽羣八象其體五德其文羽翼來儀應我聖君育隧谷前作育遺育隧之谷爰含凱風青陽既謝氣應祝融炎氛是扇以散鬱隆鱄魚顒鳥顒鳥栖林鱄魚處淵俱為旱徵災延普天測之無象厥數推玄白䓘自䓘睪蘇其汁如飴食之辟穀味有餘滋逍遙忘勞窮生盡期山海經卷之一
