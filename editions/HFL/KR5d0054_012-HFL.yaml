front:
  text: 山海經卷之十二十三同卷竟九
  hash: sha256:54daab31fab51069f212e50d991e00d946c0035f9e8194266671de25bf1a673f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_HFL_012-001a, image: hfl/0676/0676-154.png}
body:
  text: 郭璞傳海内北經海内西北陬以東者蛇巫之山上有人操杯而東向立一曰龜山杯或作棓字同西王母梯几而戴勝杖梯謂憑也其南有三青鳥爲西王母取食又有三足鳥主給使在崑崙墟北有人曰大行伯把戈其東有犬封國昔盤瓠殺戎王高辛以美女妻之不可以訓乃浮之會稽東南海中得三百里地封之生男爲狗女爲美人是爲狗封之民也貳負之尸在大行伯東犬封國曰犬戎國黄帝之後卞明生白犬二頭自相牝牡遂爲此國狀如犬言狗國也有一女子方跪進杯食與狗食也有文馬縞身朱鬛色白如縞目若黄金名曰吉量或作良乘之壽千歲周書曰犬戎文馬赤鬣白身目若黄金名曰吉黄之乘成王時獻之六韜曰文身朱鬣眼若黄金頭若雞尾名曰雞斯之乘大傳曰駮身朱鬣雞目山海經亦有吉黄之乘壽千歲者惟名有不同說有小錯其實一物耳今博舉之以廣異聞也鬼國在貳負之尸北爲物人面而一目一曰貳負神在其東爲物人面蛇身蜪犬如犬青音陶食人從首始或作蚼蚼首鉤窮奇狀如虎有翼毛如蝟食人從首始所食被髮在陶犬北一曰從足帝堯臺帝嚳臺帝丹朱臺帝舜臺各二臺臺四方在崑崙東北此蓋天子巡狩所經過夷狄慕聖人恩德陬共爲築立臺觀以標顯其遺跡也一本云所殺相柳地腥臊不可種五穀以爲衆帝之臺故耳大蠭其狀如螽朱蛾其狀如蛾蛾蚍蜉也楚辭曰玄蜂如壺赤𧊕如象謂此也蟜其爲人虎文脛有言脚有膊腸也音橋在窮奇東一曰狀如人崑崙墟北所有此目上物事也闒非人面而獸身青色音榻據比一云椽比之尸其爲人折頸被髮無一手環拘其爲人獸首人身一曰蝟狀如狗黄色祙其爲物人身黑首從目祙即魅也戎其爲人人首三角林氏國有珍獸大若虎五彩畢具尾長於身名曰騶吾乘之日行千里六韜云紂囚文王閎夭之徒詣林氏國求得此獸獻之紂大說乃釋之周書曰夾林酋耳酋耳若虎尾參於身食虎豹大傳謂之侄獸吾宜作虞也崑崙墟南所有氾林方三百里從極之淵深三百仞維冰夷恒都焉冰夷馮夷也淮南云馮夷得道以潜大淵即河伯也穆天子傳所謂河伯無夷者竹書作馮夷字或作冰也冰夷人面乘兩龍畫四面各乘靈車駕二龍一曰忠極之淵陽汙之山河出其中淩門之山河出其中皆河之枝源所出之處也王予夜之尸兩手兩股胷首齒皆斷異處此蓋形解而神連貌乖而氣合合不爲宻離不爲疏舜妻登比氏生宵明燭光即二女字也以能光照因名云處河大澤澤河邊溢浸處也二女之靈能照此所方百里言二女神光所燭及者方百里一曰登北氏蓋國在鉅燕南倭北倭屬燕倭國在帶方東大海内以女爲王其俗露紒衣服無針功以丹朱塗身不妬忌一男子數十婦也朝鮮在列陽東海北山南列陽屬燕朝鮮今樂浪縣箕子所封也列亦水名也今在帶方帶方有列口縣列姑射在海河洲中山名也山有神人河洲在海中河水所經者莊子所謂藐姑射之山也姑射國在海中屬列姑射西南山環之大蟹在海中蓋千里之蟹也陵魚人面手足魚身在海中大鯾居海中鯾即魴魚也音鞭明組邑居海中音祖蓬萊山在海中上有仙人宫室皆以金玉爲之鳥獸盡白望之如雲在渤海中也大人之市在海中海内北經圖讚吉良金精朱鬛龍行駿跱拾節鴻鶩塵下及起是謂吉黄釋聖牖里蛇巫山鬼神蜪大羣帝臺大蜂朱蛾蛇巫之山有人操杯鬼神蜪大主爲妖災大蜂朱蛾羣帝之臺闒非據比尸祙戎人面獸身是謂闒非被髮折頸據比之尸戎三其角祙堅立眉騶虞怪獸五彩尾參於身矯足千里儵忽若神是謂騶虞詩歎其仁氷夷禀華之精練食石八乘龍隱淪往來海若是謂水仙號曰河伯王予夜尸予夜之尸體分成七離不爲疏合不爲宻苟以神御形歸於一宵明燭光水有佳人宵明燭光流燿河湄禀此奇祥維舜二女别處一方列姑射山大蟹陵魚姑射之山寔西神人大蟹千里亦有陵鱗曠哉溟海含怪藏珍蓬萊山蓬萊之山玉碧構林金臺雲館皜哉獸禽實維靈府玉主甘心山海經卷之十二
