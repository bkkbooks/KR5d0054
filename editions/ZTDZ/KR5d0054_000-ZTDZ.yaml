body:
  text: 總五萬一千二百六十九字南山經第一本三千五百四十七字注二千一百七字西山經第二本五千六百七十二字注三千二百二字北山經第三本五千七百四十六字注二千三百八十二字東山經第四本二千四十字注三百七十五字中山經第五本四千七百一十八字注三千四百八十五字海外南經第六本五百一十一字注六百二十二字海外西經第七本五百三十七字注四百五十二字海外北經第八本五百八十四字注四百九十三字海外東經第九本四百四十二字注五百九十五字海内南經第十本三百六十四字注七百九字海内西經第十一本四百三十九字注六百九十五字海内北經第十二本五百九十四字注四百九十五字海内東經第十三本六百二十四字注一千四百九十五字大荒東經第十四本八百六十四字注八百一十三字大荒南經第十五本九百七十二字注五百九十八字大荒西經第十六本一千二百八十二字注一千二百三字大荒北經第十七本一千五十六字注七百六十七字海内經第十八本一千一百十一字注九百六十七字此海内經及大荒經本皆進在外侍中奉車都尉光禄大夫臣秀領校祕書言校祕書太常屬臣望所校山海經凡三十二篇今定爲一十八篇已定山海經者出於唐虞之際昔洪水洋溢漫衍中國民人失據崎嶇於丘陵巢於樹木鯀既無功而帝堯使禹繼之禹乗四載隨山刊木定高山大川蓋與伯翳主驅禽獸命山川類草木别水土四嶽佐之以周四方遠人跡之所希至及舟輿之所罕到内别五方之山外分八方之海紀其珍寳奇物異方之所生水土草木禽獸昆蟲麟鳳之所止禎祥之所隱及四海之外絶域之國殊類之人禹别九州任土作貢而益等類物善惡著山海經皆賢聖之遺事古文之著明者也其事質明有信孝武皇帝時嘗有獻異鳥者食之百物所不肯食東方朔見之言其鳥名又言其所當食如朔言問朔何以知之即山海經所出也孝宣皇帝時擊磻石於上郡陷得石室其中有反縛盜械人時臣秀父向爲諫議大夫言此貳負之臣也詔問何以知之亦以山海經對其文曰貳負殺窫窳帝乃梏之䟽屬之山桎其右足反縛兩手上大驚朝士由是多竒山海經者文學大儒皆讀學以爲竒可以考禎祥變怪之物見遠國異人之謡俗故易曰言天下之至嘖而不可亂也博物之君子其可不惑焉臣秀昧死謹上
