front:
  text: 山海經卷之十八
  hash: sha256:f1296d1c0928891a22e1670c33462493b152f3d2c188f81b58481c719c263551
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_SJB_018-210842c, image: sjb/21/210842c.png}
body:
  text: 郭璞傳海内經東海之内北海之隅有國名曰朝鮮天毒其人水居朝鮮今樂浪郡也天竺國貴道德有文書金銀錢貨浮圖出此國中晋太興四年天竺王來朝獻偎人愛人偎亦愛也音隈西海之内流沙之中有國名曰市音赤西海之内流沙之西有國名曰氾葉音氾濫也流沙之西有鳥山者三水出焉三水同岀一山有黄金有璿瑰丹貨銀皆出此水言其水中有珍奇也又有淮山好水出焉流沙之東黑水之西有朝雲之國司彘之國黄帝妻雷祖生昌意世本云黄帝娶于西陵氏之子謂之雷祖生青陽昌意也昌意降處若水生韓流竹書曰昌意降居若水乾帝帝荒荒即韓流韓流帝顓頊也韓擢首謹耳擢首長咽謹耳未聞人面豕喙麟身渠豚止止足也渠車網言跡脚也大傳曰大如車渠者也取淖子曰河女生顓世本曰顓頊母濁山氏之子名昌樤也流沙之東黑水之間有山名不死之山即負丘也華山青水之東有山名曰肇山有人栢于高栢高仙人栢高上下於此至于天言翱翔雲天來此山西南海黑水之間有山名不死之山亦負五也華山青水之東有山名曰肇山有人栢于高再稱栢高栢高上下於此至于天已上四十字似重復西南海黑水之間有都廣之野后稷葬焉其城方三百里蓋天地之中素女所出也離騷曰絶都廣野而直栢號也有膏菽膏稻膏黍膏稷言好米滑如膏外傳曰高梁之子菽豆百穀自生冬夏播播琴播猶播植方俗言也鸞鳥自歌鳳鳥自舞靈壽實華靈壽木名似竹有枝節草木所聚在此聚值爰處有百獸相羣爰於此羣聚此草也冬夏不死南海之内黑水青水之間有木曰若木樹赤葉青若水焉有禺中之國有列襄之國靈山有赤蛇在其木上名曰蝡蛇木食不食禽獸也音耎弱有監長之國有人焉鳥首名曰鳥氏今仙書中有此人鳥夷有九丘以水繞之名曰陶唐之丘陶堯號也有叔得之丘孟盈之丘昆吾之丘此丘多金也尹子曰昆吾之金黑白之丘赤望之丘參衛之丘武夫之丘此山山名美也神即之丘言上有神人也有木青葉紫莖玄花黄實名曰建木百仞無枝上有九欘枝咫曲也音斤屬也下有九拘根盤錯也淮南子曰木大則根拳也其實如麻似麻子也其葉如芒芒木似棠梨也大暉爰過言庖羲氏於此經過其下也黄帝所爲言治讓也有窫窳龍首食人首有弱水中有青獸人面名曰猩猩能言語也西南有巴國今三巴是太皥生咸焉咸焉生乘釐乘釐生後照後照是始爲巴人爲之始祖有國名曰流黄辛氏即酆氏也其城中方三百里出塵土言殷盛也有巴遂山澠水出焉又有朱卷之國有黑蛇青首食象即巴蛇也南方有贛巨人即梟楊也音感人面長臂身黑有毛及踵見人笑亦笑脣蔽其面因可逃也又有黑人虎身鳥足兩手持蛇方㗖之有贏音盈鳥足有封豕大猪也羿射殺有人曰苗民三苗氏也有神焉人首蛇身如轅如大車轂澤神左右有首歧頭衣紫衣冠旃冠名曰延維委蛇人主見而饗之霸天下齊桓公出田於澤見之遂霸諸侯見莊周作朱冠也有鸞自歌舞也鳳鳥首文曰順膺文曰仁背文曰義見天下和平又有青狩如兔名曰菌犳有翠鳥有孔雀鳥南海之内有衡山南嶽有菌桂或云衡山有菌桂員似竹見本草有山名曰三天子之鄣山南方蒼梧之淵其中有九嶷山舜之所葬長沙零陵界中出今在零陵營道縣南其山有九溪皆似故九嶷古者通總名其地爲蒼梧也北海之内蛇山者蛇水出焉東入于海有五采之鳥飛蔽一郷漢宣帝元康七年五色鳥以萬數飛過屬縣即是此鳥也名曰翳鳥鳳屬離騷云駟玉蛇而乘翳也有不距之山巧倕葬其西倕堯工巧也音垂北海之内有反縛盜械常戈常倍之佐名曰相顧之尸亦貳負臣危之類也伯夷父生西先龍先龍是始生互羌互羌乞姓伯夷顓頊師也今互羌是苗裔北海之内有山名幽都之山黑水出焉其上玄鳥玄蛇玄豹玄虎黑虎名儵玄狐蓬尾蓬叢也說苑云蓬叢狐文豹文皮也有太玄之山有玄丘之民言丘山物盡黑有大幽之國即幽民也穴居無衣有赤脛之民膝已下赤色也有釘靈之國其下從膝以下毛馬蹄善走詩含神務曰馬蹄自鞭其脚日行三百里炎帝之孫伯陵伯陵同吴權之妻阿女縁婦同猶通同言濟之吴權人姓名也縁婦鍾世本云毋句作罄倕作鍾也爲樂風作樂之曲制山黄帝生駱明駱明生白馬白馬是爲鯀即禹父也世本云黄帝生昌意昌意生顓頊顓頊生鯀也帝俊生禺號禺號生滛梁滛梁生番禺是爲舟世本云共鼓貨狹作舟番禺生奚仲奚仲生吉光吉光是始以木爲車世本云奚仲作車此言吉光明其父子共創作意是以互稱也少皥生音斑是始爲弓矢世本云牟夷作矢擇作弓矢一物而又作於義有疑此言蹕作之帝俊賜羿彤弓素矰彤弓朱矰矢以石白羽羽之外傳曰白羽之矰望之如茶音也以扶下國言今羿以射道除患扶助下國者也羿是始去恤下地之百難謂殺鑿齒封豕之屬也有窮羿篡射故效此名帝俊生晏龍晏龍始爲琴瑟世本云伏羲作琴神農作瑟帝俊有子八人始爲歌舞帝俊生身身生義均義均始爲巧倕是始作下民百巧后稷是播百穀稷之孫曰叔均始作牛耕大此赤隂或作音字是始爲國得封爲國禹鯀始布土均定九州布猶敷也書曰禹敷土定高山大川炎帝之妻赤水之子聽訞生炎居炎居生節並節並生戲器戲器生祝融祝融高辛氏火正號祝融降處江水生共工共工生術器術器首方頭項平也是復土壤以處江水復祝融之所也共工生后土后土生噎音咽鳴噎鳴生歲十有二生十二子以歲爲名洪水滔天鯀竊帝之息壤以堙洪水息壤者言土爲息長息無限故可以塞洪水也謹案啓筮曰滔滔洪水無所至極鯀乃以息壤填以洪水漢元帝時臨淮徐縣地踊長六里高一丈即息土之類是也不待帝命帝令帝祝融殺鯀于羽郊羽郊山之郊鯀復生禹啓筮曰鯀死三年不腐剖之以吴刃化爲黄能帝乃令禹卒布以定九州鯀勣用不成故復令禹給其功也山海經卷之十八
