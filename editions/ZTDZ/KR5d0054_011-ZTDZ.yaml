front:
  text: 山海經卷之十一
  hash: sha256:233ff05eb88bd253b4bef5dc93b23b40a3a02e29e60fbb4865fa1da2244e7519
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_SJB_011-210833c, image: sjb/21/210833c.png}
body:
  text: 郭璞傳海内西經海内西南陬以北者貳負之臣曰危危與貳負殺窫窳帝乃梏之䟽屬之山梏猶繫縛也音活桎其右足桎械反縛兩手與髮并髮合縛之也繫之山上木在開題西北漢宣帝使人上郡發磐石石室中得一人徒裸披髮反縛械一足以問羣臣莫能知劉子政案此言對之宣帝大驚於是時人爭學山海經矣論者多以爲是其尸象非眞體也意者以靈怪變化論難以理測物禀異氣出於不然不可以常運推不可以近數揆矣魏時有人發故周王冢者得殉女子不死不生數日時有氣數月而能語狀如廿許人送詣京師郭太后愛養之恒在左右十餘年太后崩此女哀思哭泣十日餘而死即此類也大澤方百里羣鳥所生及所解百鳥於此生乳解氄毛羽在鴈門北鴈門山鴈出其間在高柳北高柳在代地反稷之葬山水環之在廣都之野在氐國西流黄酆氏之國中方三百里言國城内有塗四方中有山塗道至后稷葬西流沙出鐘山西行又南行崑崙之墟西南入海黑水之山今西海居廷澤尚書所謂流沙者形如月生五日也東胡在大澤東夷人在東胡東貊國在漢水東北今扶餘國即濊貊故地在長城北去玄菟千里出名馬赤玉貂皮大珠如酸果也地近于燕滅之孟鳥亦鳥名也在貊國東北其鳥文黄青東鄉海内崑崙之墟在西北言海内者明海外復有崑崙山帝之下都崑崙之墟方八百里高萬仞皆謂其虚基廣輪之高庳耳自此以上二千五百餘里上有醴泉華池去蒿高五萬里蓋天地之中也見禹本紀上有木禾長五尋大五圍木禾穀類也生黑水之阿可食見穆天子傳面有九井以玉爲檻檻欄面有九門門有開明獸守之百神之所在在八隅之巖在巖間也赤水之際非仁羿莫能上岡之巖言非仁人及有才藝如羿者不能得登此山之岡嶺巉巖也羿嘗請藥西王母亦言其得道也羿或作聖赤水出東南隅以行其東北西南流注南海厭火東河水出東北隅以行其北西南又入渤海又岀海外即西而北入禹所導積石山禹治水復决䟽出之故云導河積石洋水音翔黑水岀西北隅以東東行又東北南入海羽民南弱水青水出西南隅以東又北又西南過畢方鳥東西域傳鳥弋國去長安萬五千餘里西行可百餘日至條枝國臨西海長老傳聞有弱水西王母云東夷傳亦曰長城外數千里亦有弱水皆所未見也淮南子云弱水出窮石窮石今之西郡那冉蓋其派别之源耳崑崙南淵深三百仞靈淵開明獸身大類虎身或作直而九首皆人面東嚮立崑崙上天獸也銘曰開明爲獸禀資乾精瞪視崑崙威震百靈開明西有鳳凰鸞鳥皆戴蛇踐蛇膺有赤蛇開明北有視肉珠樹文玉樹五彩玉樹玗琪樹玗琪赤玉屬也吴天璽元年臨海郡吏伍曜在海水際得石樹高三尺餘莖葉紫色喆曲傾靡有光彩即玉樹之類也于其兩音不死樹言常生也鳳凰鸞鳥皆載瞂盾也音戈又有離朱木禾栢樹甘水即醴泉也聖木食之令人智聖也曼兌未詳一曰挺木互交淮南作琁樹琁玉類也開明東有巫彭巫抵巫陽巫履巫凡巫相皆神醫也世本曰巫彭作醫楚詞曰帝告巫陽夾窫窳之尸皆操不死之藥以距之爲距却死氣求更生窫窳者蛇身人面貳負臣所殺也服常樹其上有三頭人伺琅玕樹服常木未詳琅玕子似珠爾雅曰西北之美者有崑崙之琅玕焉莊周曰有人三頭遞卧遞起以伺琅玕與玗琪子謂此人也開明南有樹鳥六首蛟蛟似蛇四脚龍類也蝮蛇蜼豹鳥秩樹木名未詳於表池樹木言列樹以表池即華池也誦鳥鳥名形未詳也鶽雕也穆天子傳曰爰有白鶽青雕音竹筍之筍視肉海内西經圖讚貳負臣危漢擊磐石其中則危劉生是識羣臣莫知可謂博物山海乃奇流黄酆氏國城圍三百連河比棟動是塵昏烝氣霧重焉得遊之以敖以縱大澤方百里地號積羽厥方百里羣鳥雲集鼓翅雷起穆王旋軫爰榮騄耳流沙天限内外分以流沙經帶西極頽溏委蛇注于黑水永溺餘波木禾崑崙之陽鴻鷺之阿爰有嘉穀號曰木禾匪植匪藝自然靈播開明開明天獸禀兹金精虎身人面表此桀形瞪視崑山威懾百靈文玉玗琪樹文玉玗琪方以類叢翠葉猗萎丹柯玲瓏玉光爭焕彩豔火龍不死樹萬物暫見人生如寄不死之樹壽蔽天地請藥西姥烏得如羿甘水聖木醴泉璿木養齡盡性增氣之和祛神之冥何必生知然後爲聖窫窳窫窳無罪見害貳負帝命羣巫操藥夾守遂淪溺淵變爲龍首服常琅玕樹服常琅玕崑山奇樹丹實珠離緑葉碧布三頭是伺遞望遞顧山海經卷之十一
