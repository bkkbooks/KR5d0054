front:
  text: 山海經卷之六七同卷竟六
  hash: sha256:65fb38884e6cb25fd811da1ab0d9d3337f1a3ec86682f3cc9fe97b9c9e8603f1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_SJB_006-210824c, image: sjb/21/210824c.png}
body:
  text: 郭璞傳海外南經地之所載六合之間四方上下爲六合也四海之内照之以日月經之以星辰紀之以四時要之以太歲神靈所生其物異形或夭或壽唯聖人能通其道言自非窮理盡性者則不能原極其情變海外自西南陬至東南陬者陬猶隅也音騶結匈國在其西南其爲人結匈臆前胅出如人結喉也南山在其東南自此山來蟲爲蛇蛇號爲魚以蟲爲蛇以蛇爲魚一曰南山在結匈東南比翼鳥在其東其爲鳥青赤似鳧兩鳥比翼一曰在南山東羽民國在其東南其爲人長頭身生羽能飛不能遠卵生畫似仙人也一曰在比翼鳥東南其爲人長頰啓筮曰羽民之狀鳥喙赤目而白首有神人二八連臂爲帝司夜於此野晝隱夜見在羽民東其爲人小頰赤肩當胛上正赤也盡十六人疑此後人所增益語耳畢方鳥在其東青水西其爲鳥人面一脚一曰在二八神東讙頭國在其南其爲人人面有翼鳥喙能捕魚讙兜堯臣有罪自投南海而死帝憐之使其子居南海而祠之畫亦似仙人也一曰在畢方東或曰讙朱國厭火國在其國南獸身黑色生火出其口中言能吐火畫似獼猴而黑色也一曰在讙朱東三株樹在厭火北生赤水上其爲樹如栢葉皆爲珠一曰其爲樹若彗如彗星狀三苗國在赤水東其爲人相隨昔堯以天下讓舜三苗之君非之帝殺之有苗之民叛入南海爲三苗國一曰三毛國臷國在其東音秩亦音替其爲人黄能操弓射蛇大荒經云此國自然有五穀衣服一曰臷國在三毛東貫匈國在其東其爲人匈有竅尸子曰四夷之民有貫匈者有深目者有長肱者黄帝之德嘗致之異物志曰穿匈之國去其衣則無自然者益似效此貫匈人也一曰在臷國東交脛國在其東其爲人交脛言脚脛曲戾相交所謂雕題交趾者也或作頸其爲人交頸而行也一曰在穿匈東不死民在其東其爲人黑色壽不死有員丘山上有不死樹食之乃壽亦有赤泉飲之不老一曰在穿匈國東歧舌國在其東其人舌皆歧或云支舌也一曰在不死民東崑崙墟在其東墟四方墟山下基也一曰在歧舌東爲墟四方羿與鑿齒戰於壽華之野羿射殺之在崑崙墟東羿持弓矢鑿齒持盾鑿齒亦人也齒如鑿長五六尺因以名云一曰戈未詳三首國在其東其爲人一身三首一曰在鑿齒東周饒國在其東其爲人短小冠帶其爲人長三尺穴居能爲機巧有五穀也一曰焦僥國在三首東外傳云焦僥民長三尺短之至也詩含神霧曰從中州以東四十萬里得焦僥國人長一尺五寸也長臂國在其東捕魚水中兩手各操一魚舊說云其人手下垂至地魏黄初中玄菟太守王須討高句麗王宫窮追之過沃沮國其東界臨大海近日之所出問其耆老海東復有人否云嘗在海中得一布褶身如中人衣兩袖長三尺即此長臂人衣也一曰在焦僥東捕魚海中狄山帝堯葬于陽吕氏春秋曰堯葬榖林今陽城縣西東阿縣城次鄉中赭陽縣湘亭南皆有堯冢帝嚳葬于隂嚳堯父號高辛今冢在頓丘縣城南臺隂野中也嚳音酷爰有熊羆文虎彫虎也尸子曰中黄伯余左執大行之獶而右搏雕虎也蜼豹蜼獼猴類離朱木名也見莊子今圖作赤鳥視肉聚肉形如牛肝有兩目也食之無盡尋獲更生如故吁咽所之詳也文王皆葬其所今文王墓在長安鄗東社中案木王冢墓皆有定處而山海經往往復見之者盖以聖人乆於其位仁化廣及恩洽鳥獸至於殂亡四海若喪考妣無思不哀故絶域殊俗之人聞天子崩各自立坐而祭醊哭泣起土爲冢是以所在有焉亦猶漢氏諸遠郡國皆有天子廟此其遺象也一曰湯山一曰爰有熊羆文虎蜼豹離朱𩿨乆𩿨乆鴝鶹之屬視肉虖交所未詳也其范林方三百里言林木汛濫布衍也南方祝融獸身人面乘兩龍火神也海外南經圖讚自此山來蟲爲蛇蛇號爲魚賤無定貢貴無常珍物不自物自物由人萬事皆然豈伊蛇鱗羽民國鳥喙長頰羽生則卵矯翼而翔龍飛不遠人維倮屬何狀之反神人二八羽民之東有神司夜二八連臂自相羈駕晝隱宵出詭時淪化讙頭國讙國鳥喙行則杖羽潜于海濱維食𥝗秬實維嘉穀所謂濡黍厭火國有人獸體厥狀怪譎吐納炎精火隨氣烈推之無竒理有不熱三珠樹三珠所生赤水之際翹葉栢竦美壯若彗濯彩丹波自相霞映臷國不蠶不絲不稼不穡百獸率儛羣鳥拊翼是號臷民自然衣食貫匈交脛支舌國鑠金洪爐灑成萬品造物無私各任所禀歸於曲成是見兆朕不死國有人爰處員丘之上赤泉駐年神木養命禀此遐齡悠悠無竟鑿齒鑿齒人類實有傑牙猛越九嬰害過長蛇堯乃命羿斃之壽華三首國雖云一氣呼吸異道觀則俱見食則皆飽物形自周造化非巧焦僥國羣籟舛吹氣有萬殊大人三丈焦僥尺餘混之一歸此亦僑如長臂國雙肱三尺體如中人彼曷爲者長臂之民脩脚是負捕魚海濱狄山帝堯葬于陽帝嚳葬于隂聖德廣被物無不懷爰乃殂落封墓表哀異類猶然矧乃華黎視肉聚肉有眼而無腸胃與彼馬勃頗相髣髴奇在不盡食人薄味南方祝融祝融火神雲駕龍驂氣御朱明正陽是舍作配炎帝列位于南山海經卷之六
