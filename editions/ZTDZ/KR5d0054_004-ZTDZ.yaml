front:
  text: 山海經卷之四竟四
  hash: sha256:bb3403778b730c06c49336ac797346d88ac6cbcedcdfb63141cf9aa84d4b3cf0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_SJB_004-210806b, image: sjb/21/210806b.png}
body:
  text: 郭璞傳東山經東山經之首曰樕𧑤之山速株二音北臨乾昧亦山名也音妹食水出焉而東北流注于海其中多鱅鱅之魚音容其狀如犂牛牛似虎文者其音如彘鳴又南三百里曰藟山音誄其上有玉其下有金湖水出焉東流注于食水其中多活師科斗也爾雅謂活東又南三百里曰栒狀之山其上多金玉其下多青碧石有獸焉其狀如犬六足其名曰從從其鳴自詨有鳥焉其狀如鷄而鼠毛其名曰䖪鼠音咨見則其邑大旱𣲵水出焉音枳而北流注于湖水其中多箴魚其狀如儵其喙如箴出東海今江東水中亦有之食之無疫疾又南三百里曰勃齊之山無草木無水又南三百里曰番條之山無草木多沙減水出焉音同減損之減北流注于海其中多轗魚一名黄頰音感又南四百里曰姑兒之山其上多漆其下多桑柘姑兒之水出焉北流注于海其中多轗魚又南四百里曰高氏之山其上多玉其下多箴石可以爲砥針治癰腫者諸繩之水出焉東流注于澤其中多金玉又南三百里曰嶽山其上多桑其下多樗濼水出焉音櫟東流注于澤其中多金玉又南三百里曰犲山其上無草木其下多水其中多堪㐨之魚未詳音序有獸焉其狀如夸父而彘毛其音如呼見則天下大水又南三百里曰獨山其上多金玉其下多美石末塗之水出焉而東南流注于沔其中多䖺䗤條容二音其狀如黃蛇魚翼出入有光見則其邑大旱又南三百里曰泰山即東岳岱宗也今在泰山高縣西北從山下至頂四十八里三百步也其上多玉其下多金有獸焉其狀如豚而有珠名曰狪狪音如吟恫之恫其名自訆環水出焉東流注于江一作海其中多水玉又南三百里曰竹山錞于江一作涯無草木多瑶碧激水出焉而東南流注于娶檀之水其中多茈羸凡東山經之首自樕𧑤之山以至于竹山凡十二山三千六百里其神狀皆人身龍首祠毛用一犬祈䎶用魚以血塗祭爲䎶也公羊傳云蓋叩其鼻以䎶杜音釣餌之餌東次二經之首曰空桑之山此山出琴瑟材見周禮也北臨食水東望沮吴南望沙陵西望湣澤音民有獸焉其狀如牛而虎文其音如欽或作吟其名曰軨軨音零其鳴自叫見則天下大水又南六百里曰曹夕之山其下多榖而無水多鳥獸又西南四百里曰嶧臯之山音亦其上多金玉其下多白堊嶧臯之水出焉東流注于激女之水其中多蜃珧蜃蚌也珧玉珧亦蚌屬腎遥兩音又南水行五百里流沙三百里至于葛山之尾無草木多砥礪又南三百八十里曰葛山之首無草木灃水出焉音禮東流注于余澤其中多珠蟞魚音鼈其狀如肺而有曰六足有珠其味酸甘食之無癘無時氣病也吕氏春秋曰澧水之魚名曰朱蟞六足有珠魚之美也又南三百八十里曰餘峨之山其上多梓柟其下多荆芑雜余之水出焉東流注于黄水有獸焉其狀如兔而鳥喙鴟目蛇尾見人則眠言佯死也名曰犰狳仇餘二音其鳴自訆見則螽蝗爲敗螽蝗類也言傷敗田苗音終又南三百里曰杜父之山無草木多水又南三百里曰耿山無草木多水碧亦水玉類多大蛇有獸焉其狀如狐而魚翼其名曰朱獳音儒其鳴自叫見則其國有恐又南三百里曰盧其之山無草木多沙石沙水出焉南流注于涔水其中多鷙鵬音黎其狀如鴛鴦而人足其鳴自訆見則其國多土功今鵜胡足頗有似人脚形狀也又南三百八十里曰姑射之山無草木多水又南水行三百里流沙百里曰北姑射之山無草木多石又南三百里曰南姑射之山無草木多水又南三百里曰碧山無草木多大蛇多碧水玉又南五百里曰緱氏之山無草木多金玉原水出焉東流注于沙澤一曰俠氏之山又南三百里曰姑逢之山無草木多金玉有獸焉其狀如狐而有翼其音如鴻鴈其名曰𤢄𤢄音斃見則天下大旱又南五百里曰鳧麗之山其上多金玉其下多箴石有獸焉其狀如狐而九尾九首虎爪名曰蠪姪龍蛭二音其音如嬰兒是食人又南五百里曰䃌山音一眞反南臨䃌水東望湖澤有獸焉其狀如馬而羊首四角牛尾其音如獋狗其名曰峳峳音攸見則其國多狡客狡狡猾也有鳥焉其狀如鳧而鼠尾善登木其名曰絜鈎見則其國多疫凡東次二經之首自空桑之山至于䃌山凡十七山六千六百四十里其神狀皆獸身人面載觡糜鹿屬角爲觡音格其祠毛用一鷄祈嬰用一璧瘞又東次三經之首曰尸胡之山北望𦍙山音詳其上多金玉其下多棘有獸焉其狀如麋而魚目名曰妴胡音婉其鳴自訆又南水行八百里曰岐山其木多桃李其獸多虎又南水行五百里曰諸鈎之山無草木多沙石是山也廣員百里多寐魚即鮇魚音味又南水行七百里曰中父之山無草木多沙又東水行千里曰胡射之山無草木多沙石又南水行七百里曰孟子之山其木多梓桐多桃李其草多菌蒲未詳音晅之其獸多糜鹿是山也廣員百里其上有水出焉名曰碧陽其中多鱣鮪鮪即鱏也似鱣而長鼻體無鱗甲别名䱎鰽名鱑也又南水行五百里曰流沙行五百里有山焉曰跂踵之山跂音企廣員二百里無草木有大蛇其上多玉有水焉廣員四十里皆涌今河東汾隂縣有瀵水源在地底濆沸涌出其深無限即此類也其名曰深澤其中多蠵龜蠵觜蠵大龜也甲有文彩似毒瑁而薄音遺知及有魚焉其狀如鯉而六足鳥尾名曰鮯鮯之魚音蛤其鳴自叫又南水行九百里曰踇隅之山音敏字其上有草木多金玉多赭有獸焉其狀如牛而馬尾名曰精精其鳴自叫又南水行五百里流沙三百里至于無臯之山南望幼海即少海也淮南子曰東方大渚曰少海東望榑木扶桑二音無草木多風是山也廣員百里凡東次三經之首自尸胡之山至于無臯之山凡九山六千九百里其神狀皆人身而羊角其祠用一牡羊米用黍是神也見則風雨水爲敗又東次四經之首曰北號之山臨于北海有木焉其狀如楊赤華其實如棗而無核其味酸甘食之不瘧食水出焉而東北流注于海有獸焉其狀如狼赤首鼠目其音如豚名曰猲狙葛苴二音是食人有鳥焉其狀如鷄而白首鼠足而虎爪其名曰鬿音祈雀亦食人又南三百里曰旄山無草木蒼體之水出焉而西流注于展水其中多鱧魚今蝦鰌字亦或作鱃秋音其狀如鯉而大首食者不疣又南三百二十里曰東始之山上多蒼玉有木焉其狀如楊而赤理其汁如血不實其名曰芑音起可以服馬以汁塗之則馬調良泚水出焉而東北流注于海其中多美貝多芘魚其狀如鮒一首而十身其臭如麋蕪食之不䊧孚謂反止失氣也又東南三百里曰女烝之山其上無草木石膏水出焉而西注于鬲水其中多薄魚其狀如鱣魚而一曰其音如歐如人嘔吐聲也見則天下大旱又東南二百里曰欽山多金玉而無石師水出焉而北流注于臯澤其中多鱃魚多文貝有獸焉其狀如豚而有牙其名曰當康其鳴自叫見則天下大穰又東南二百里曰子桐之山子桐之水出焉而西流注于餘如之澤其中多鰐魚音滑其狀如魚而鳥翼出入有光其音如鴛鴦見則天下大旱又東北二百里曰剡山多金玉有獸焉其狀如彘而人面黄身而赤尾其名曰合腴音庾其音如嬰兒是獸也食人亦食蟲蛇見則天下大水又東二百里曰大山上多金玉楨木女楨也葉冬不凋有獸焉其狀如牛而白首一目而蛇尾其名曰蜚音如翡翠之翡行水則竭行草則死見則天下大疫言其體含災氣也其銘曰蜚之爲名體似無害所經枯竭甚於鳩厲萬物斯懼思爾遐逝鈎水岀焉而北流注于勞水其中多鰌魚凡東次四經之首自北號之山至于大山凡八山一千七百二十里右東經之山志凡四十六山萬八千八百六十里東山經圖讚鯖鱅魚從從獸䖪鼠魚號鯖鱅如牛虎駮𤡆𤡆之狀似狗六脚䖪鼠如鷄見則旱涸䖺䗤䖺䗤蛇狀振翼灑光憑波騰逝出入江湘見則歲旱是維火祥狪狪蚌則含珠獸胡不可狪狪如豚被褐懷禍患難無由招之自我堪㐨魚軨軨獸堪㐨軨軨殊氣同占見則洪水天下昏墊豈伊妄降亦應牒讖珠蟞魚灃水之鮮形如浮肺體兼三才以貨賈害厥用既多何以自衛犰狳犰狳之獸見人佯眠與災恊氣出則無年此豈能爲歸之於天狸力獸鷙胡鳥狸力鷙胡或飛或伏是惟土祥出興功築長城之役同集秦域朱獳朱獳無奇見則邑駭通感靡誠維數所在因事而作未始無待𤢄𤢄蠪蚳獸絜鈎鳥𤢄𤢄如狐有翼不飛九尾虎爪號曰蠪蚳鈎絜似鳧見則民悲峳峳治在得賢亡由夫人峳峳之來乃致狡賔歸之冥應誰見其津蠵龜水圓四十潜源溢沸靈龜爰處掉尾養氣莊生是感揮竿傲貴妴胡精精獸鮯鮯魚妴胡之狀似麋魚眼精精如牛以尾自辨鮯鮯所潜厥深無限猲狙獸鬿雀猲狙狡獸鬿雀惡鳥或狼其體或虎其爪安用甲兵擾之以道芑木馬維剛駿塗之芑汁不勞孫陽自然閑習厥術無方理有潜執芘魚薄魚有魚十身麋蕪其臭食之和體氣不下溜薄之躍淵是維災候合窳猪身人面號曰合窳厥性貪殘物爲不咀至隂之精見則水雨當康獸䱻魚當康如豚見則歲穰鰐魚鳥翼飛乃流光同出殊應或災或祥蜚蜚則災獸跂踵厲深會所經涉竭水槁林禀氣自然體此殃淫山海經卷之四
