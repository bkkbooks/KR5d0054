front:
  text: 山海經卷之十三
  hash: sha256:42f90102f866f74c3f47d3c97f54d544db7badef3e3e30fe549bb9fccc52a008
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_SJB_013-210837a, image: sjb/21/210837a.png}
body:
  text: 郭璞傳海内東經海内東北陬以南者鉅燕在東北陬國在流沙中者埻端音敦璽㬇音唤或作繭蝡在崑崙墟東南一曰海内之郡不爲郡縣在流沙中國在流沙外者大夏大夏國城方二三百里分爲數十國地和混宜五穀堅沙居繇音遥月支之國月支國多好馬美果有大尾羊如驢尾即羬羊也小月支天竺國皆附庸云西胡白玉山在大夏東蒼梧在白玉山西南皆在流沙西崑崙墟東南崑崙山在西胡西皆在西北地理志崑崙山在臨羌西又有西王母祠也雷澤中有雷神龍身而人頭鼓其腹在吴西今城陽有堯冢靈臺雷澤在北也河圖曰大迹在雷澤華胥履之而生伏羲都州在海中一曰郁州今在東海朐縣界世傳此山自蒼梧從南徙來上皆有南方物也郁音鬱琅瑘臺在渤海間琅瑘之東今琅瑘在海邊有山嶕嶢特起狀如高臺此即琅瑘臺也琅瑘者越王勾踐入霸中國之所都其北有山一曰在海間韓鴈在海中都州南始鳩在海中轅厲南國名或曰鳥名也會稽山在大楚南岷三江首大江出汶山今江岀汶山郡升遷縣崑山東南經蜀郡犍爲至江陽東北經巴東建平宜都南郡江夏弋陽安豐至廬江南界東北經淮南下邳至廣陵郡入海北江出曼山南江出高山高山在城都西入海在長州南浙江出三天子都在其東按地理志浙江出新安黟縣南蠻中東入海今錢唐浙江是也黟即歙也浙音折在閩西北入海餘暨南餘暨縣屬會稽今爲永興縣廬江出三天子都入江彭澤西彭澤今彭蠡也在尋陽彭澤縣一曰天子鄣淮水出餘山餘山在朝陽東義鄉西入海淮浦北今淮水出義陽平氏縣桐栢山山東北經汝南汝隂淮南譙國下邳至廣陵縣入海朝陽縣今屬新野湘水出舜葬東南陬西環之環繞也今湘水出零陵營道縣陽朔山入江入洞庭下洞庭地穴也在長沙巴陵今吴縣南大湖中有包山下有洞庭穴道潜行水底云無所不通號爲地脉一曰東南西澤漢水出鮒魚之山書曰嶓冢導漾東流爲漢案水經漢水出武都沮縣東狼谷經漢中魏興至南鄉東經襄陽至江夏安陸縣入江别爲沔水又爲滄浪之水帝顓頊葬于陽九嬪葬于隂四蛇衛之言有四蛇衛守山下濛水出漢陽西入江聶陽西漢陽縣屬朱提温水出崆峒崆峒山在臨汾南入河華陽北今温水在京兆隂盤縣水常温也臨分縣屬平陽潁水出少室少室山在雍氏南入淮西鄢北今潁水出河南陽城縣乾山東南經潁川汝隂至淮南下蔡入淮鄢今鄢陵縣屬潁川一曰緱氏縣屬河南音鉤汝水出天息山在梁勉鄉西南入淮極西北今汝水出南陽魯陽縣大孟山東北至河南梁縣東南經襄城潁川汝南至汝隂褒信縣入淮淮極地名一曰淮在期思北期思縣屬弋陽涇水出長城北山山在郁郅長垣北皆縣名也郅音桎北入渭戲北今涇水出安定朝那縣西开頭山東南經新平扶風至京兆高陵縣入渭戲地名今新豐縣也渭水出鳥鼠同穴山東注河入華隂北鳥鼠同穴山今在隴西首陽縣渭水出其東經南安天水略陽扶風始平京兆引農華隂縣入河白水出蜀而東南注江色微白濁今在梓潼白水縣源從臨洮之西西傾山來經沓中東流通隂平至漢壽縣入潜入江州城下江州縣屬巴郡沅水出象郡鐔城之西象郡今日南也鐔城縣今屬武陵音淫入東注江入下隽西下隽縣今屬長沙音昨兖反合洞庭中水經曰沅水出䍧牱具蘭縣又東北至鐔城縣爲沅水又東過臨沅縣南又東至長沙下隽縣贛水出聶都東山今贛水出南康南野縣西北音感也東北注江入彭澤西泗水出吴東北而南西南過湖陵西而東南注東海入淮隂北今泗水出魯國卞縣西南至高平湖陸縣東南經沛國彭城下邳至臨淮下相縣入淮鬱水出象郡而西南注南海入須陵東南肄水出臨晋西南音如肄習之肄而東南注海入番禺西番禺縣屬南海越之城下也潢水出桂陽西北山音黄東南注肄水入敦浦西洛水出洛西山東北注河入成臯之西書曰道洛自熊耳案水經洛水今出上洛冢領山東北經弘農至河南鞏縣入河成臯縣亦屬河南也汾水出上窳北音愈而西南注河入皮氏南今汾水出太原晋陽故汾陽縣東南經晋陽西南經西河平陽至河東汾隂入河皮氏縣屬平陽沁水出井陘山東東南注河入懷東南懷縣屬河内懷内北有井陘山濟水岀共山南東丘共與恭同絶鉅鹿澤絶猶截度也鉅鹿今在高平注渤海入齊琅槐東北今濟水自榮陽卷縣東經陳留至潜隂北東北至高平東北經濟南至樂安博昌縣入海今碣石也諸水所出又與水經違錯以爲凡山川或有同名而異實或同實而異名或一實而數名似是而非似非而是且歷代乆遠古今變易語有楚夏名號不同未得詳也潦水岀衛臯東出塞外衛臯山玄菟高句驪縣有潦山亦潦水所出西河注大潦音遼東南注渤海入潦陽潦陽縣屬潦東虖池水出晋陽城南而西至陽曲北而東注渤海經河間樂城東北注渤海也晋陽陽曲縣晋屬太原入越章武北章武郡名漳水出山陽東東注渤海入章武南新城汴隂縣亦有漳水建平元年四月丙戌待詔太常屬臣望校治侍中光禄勳臣龔侍中奉車都尉光禄大夫臣秀領主省海内東經圖讚郁州南極之山越處東海不行而至不動而改維神所運物無常在韓鴈始鳩雷澤神琅瑘臺韓鴈始鳩在海之州雷澤之神鼓腹優游琅瑘嶕嶢邈若雲樓堅沙居繇埻端璽㬇國堅沙居繇埻端璽㬇沙漠之鄉絶地之館或羈于秦或賔于漢大江北江南江浙江廬淮湘漢濛温潁汝涇渭白沅贛泗鬱肄潢洛汾沁濟潦虖池漳水川瀆交錯涣瀾流帶通潜潤下經營華外殊出同歸混之東會山海經卷之十三卷十四十五原缺
