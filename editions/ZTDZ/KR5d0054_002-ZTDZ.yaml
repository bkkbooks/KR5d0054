body:
  text: 郭璞傳西山經西山經華山之首曰錢來之山其上多松其下多洗石澡洗可以磢體去垢圿磢初兩反有獸焉其狀如羊而馬尾名曰羬羊今大月氏國有大羊如驢而馬尾爾雅云羊六尺爲羬謂此羊也羬音針其脂可以已腊治體皴腊音昔西四十五里曰松果之山濩水出焉北流注于渭其中多銅有鳥焉其名曰䳋渠䳋音彤弓之彤其狀如山鷄黑身赤足可以已𦢊謂皮破起也音叵駮反又西六十里曰太華之山即西岳華隂山也今在弘農華隂縣西南削成而四方今山形上大下小峭峻也其高五千仞其廣十里仞八尺也上有明星玉女持玉漿得上服之即成仙道險僻不通詩含神霧云鳥獸莫居有蛇焉名曰肥𧔥六足四翼見則天下大旱湯時此蛇見於陽山下復有肥遺蛇疑是同名又西八十里曰小華之山即少華山其木多荆杞其獸多㸲牛今華隂山中多山牛山羊肉皆千斤牛即此牛也音昨其隂多磬石可以爲樂石其陽多㻬琈之玉㻬琈玉名所未詳也浮兩音鳥多赤鷩赤鷩山鷄之屬胷腹洞赤冠金背黄頭緑尾中有赤毛彩鮮明音作蔽或作鼈可以禦火其草有萆荔萆荔香草也蔽戾兩音狀如烏韭而生於石上亦縁木而生烏韭在屋者曰昔邪在墻者曰垣衣食之已心痛又西八十里曰符禺之山其陽多銅其隂多鐵其上有木焉名曰文莖其實如棗可以已聾其草多條其狀如葵而赤華黃實如嬰兒舌食之使人不惑符禺之水出焉而北流注于渭其獸多葱聾其狀如羊而赤鬛其鳥多鴖音旻其狀如翠赤喙翠似燕而紺色也可以禦火畜之辟火災也又西六十里曰石脆之山其木多㯶枬㯶樹高三丈許無枝條葉大而圓岐生梢頭實皮相裹上行一皮者爲一節可以爲繩一名栟櫚音馬𩦲之𩦲其草多條其狀如韭而白華黑寳食之已疥其陽多㻬琈之玉其隂多銅灌水出焉而北流注于禺水其中有流赭赭赤土以塗牛馬無病今人亦以朱塗牛角云以辟惡馬或作角又西七十里曰英山其上多杻橿杻似棣而細葉一名土橿音組橿木中車林音姜其隂多鐵其陽多赤金禺水出焉北流注于招水音韶其中多鮮魚音同蚌蛤之蚌其狀如鼈其音如羊其陽多箭䉋今漢中郡出䉋竹厚裏而長節根深筍冬生地中人掘取食之䉋音媚其獸多㸲牛羬羊有鳥焉其狀如鶉黄身而赤喙其名曰肥遺食之已癘癘疫病也或曰惡創韓子曰癘人憐主可以殺蟲又西五十二里曰竹山其上多喬木枝上竦者音橋其隂多鐵有草焉其名曰黄雚其狀如樗其葉如麻白華而赤實其狀如赭紫赤色浴之已疥又可以已胕治胕腫也音符竹水出焉北流注于渭其陽多竹箭箭篠也多蒼玉丹水出焉今所在有丹所東南流注于洛水其中多水玉多人魚如䱱魚四脚有獸焉其狀如豚而白毛大如笄而黑端笄簪屬名曰毫彘狟猪也夾髀有麄豪長數尺能以脊上豪射物亦自爲牝牡狟或作猳吴楚呼爲鸞猪亦此類也又西百二十里曰浮山多盼木音美目盻兮之盻枳葉而無傷枳刺針也能傷人故名云木蟲居之在樹之中有草焉名曰薰音訓草麻葉而方莖赤華而黑實臭如靡蕪蘼蕪香草易曰其臭如蘭眉無兩音佩之可以已癘又西七十里曰羭次之山音臾漆水出焉今漆水出岐山北流注于渭其上多棫橿棫白桵也音域其下多竹箭其隂多赤銅其陽多嬰垣之玉或作短或作根或作埋傳寫謬錯未可得詳有獸焉其狀如禺而長臂善投其名曰囂亦在畏獸畫中似獼猴投擲也有鳥焉其狀如梟人面而一足曰橐𩇯音肥冬見夏蟄服之不畏雷著其毛羽令人不畏天雷也或作災又西百五十里曰時山無草木逐或作遂水出焉北流注于渭其中多水玉又西百七十里曰南山上多丹粟丹水出焉北流注于渭獸多猛豹猛豹似熊而小毛淺有光澤能食蛇食銅鐵出蜀中豹或作虎鳥多尸鳩尸鳩布穀類也或曰鶘鸇也鳩或作丘又西百八十里曰大時之山上多穀柞柞櫟下多杻橿隂多銀陽多白玉涔水出焉音潜北流注于渭清水出焉南流注于漢水今河内修武縣縣北黑山亦出清水又西三百二十里曰嶓冢之山今在武都氐道縣南嶓音波漢水出焉而東南流注于沔至江夏安陸縣江即沔水囂水出焉北流注於湯水或作陽其上多桃枝鈎端鈎端桃枝屬獸多犀兕熊羆羆似熊而黃白色猛憨能扳樹鳥多白翰赤鷩白翰白鵫也亦名鵫雉又曰白雉有草焉其葉如蕙蕙香草蘭屬也或以蕙薰葉失之其本如桔梗本根也黑華而不實名曰蓇蓉爾雅釋草曰榮而不實謂之蓇音骨食之使人無子又西三百五十里曰天帝之山上多㯶柟下多菅蕙菅茅類也有獸焉其狀如狗名曰谿或作谷邊或作遺席其皮者不蠱有鳥焉其狀如鶉黑文而赤翁翁頭下毛音汲甕之甕名曰櫟音沙礫之礫食之已痔有草焉其狀如葵其臭如蘼蕪名曰杜衡香草也可以走馬帶之令人便馬或曰馬得之而健走食之已癭西南三百八十里曰臯塗之山薔音色或作蕢又作葍水出焉西流注于諸資之水塗水出焉南流注于集獲之水其陽多丹粟其隂多銀黄金其上多桂木有白石焉其名曰礜可以毒鼠今礜石殺鼠音豫蠶食之而肥有草焉其狀如槀茇稾茇香草其葉如葵而赤背名曰無條可以毒鼠有獸焉其狀如鹿而白尾馬足人手前兩脚似人手而四角名曰𤣎如音猥𤣎之嬰有鳥焉其狀如鴟而人足名曰數斯食之已癭或作癇又西百八十里曰黄山今始平槐里縣有黄山上故有宫漢惠帝所起疑非此無草木多竹箭盼水出焉音美目盻兮之盻西流注于赤水其中多玉有獸焉其狀如牛而蒼黑大目其名曰𤛎音敏有鳥焉其狀如鴞青羽赤喙人舌能言名曰鸚鸚䳇舌似小兒舌脚指前後各兩扶南微外出五色者亦有純赤白者大如鴈也又西二百里曰翠山其上多㯶柟其下多竹箭其陽多黄金玉其隂多旄牛麝似羊而大角細食好在山崖間麝似𪋛而小有香其鳥多鸓音壘其狀如鵲赤黑而兩首四足可以禦火又西二百五十里曰騩山音巍一音隗囂之隗是錞于西海錞猶是蜳也音章閏反無草木多玉淒水出焉或作浽西流注于海其中多采石黄金采石石有彩色者今雌黄空青緑碧之屬多丹粟凡西經之首自錢來之山至于騩山凡十九山二千九百五十七里華山冢也冢者神鬼之所舍也其祠之禮太牢牛羊豕爲太牢羭山神也祠之用燭或作煬齋百日以百犧牲純色者爲犧瘞用百瑜瑜亦美玉名音臾湯或作温其酒百樽温酒令熱嬰以百珪百璧嬰謂陳之以環祭也或曰嬰即古罌字謂盂也徐州云穆天子傳曰黄金之嬰之屬也其餘十七山之屬皆毛牷用一羊祠之牷謂牲體全具也左傳曰牷牲肥腯者也燭者百草之末灰白席采等純之純縁也五色縱之等差其文綵也周禮莞席紛純西次二經之首曰鈐山音髠鉗之鉗或作冷又作塗其上多銅其下多玉其木多杻橿西二百里曰泰或作秦冒之山其陽多金其隂多鐵浴水出焉東流注于河其中多藻玉藻玉玉有符彩者或作柬音練多白蛇水螭又西一百七十里曰數歷之山其上多黄金其下多銀其木多杻橿其鳥多鸚楚水出焉而南流注于渭其中多白珠今蜀郡平澤出青珠尸子曰水圓折者有珠又西百五十里曰高山其上多銀其下多青碧碧亦玉類也今越嶲會稽縣東山出碧雄黄晋大興三年高平郡界有山崩其中出數千斤雄黄其木多㯶其草多竹涇水出焉音經而東流注于渭今涇水出空定朝郡縣西井頭山至京兆高陵縣入渭也其中多磬石書曰泗濱浮磬是也青碧西南三百里曰女牀之山其陽多赤銅其隂多石涅即礬石也楚人名爲涅石秦名爲羽涅也本草經亦名曰石涅也其獸多虎豹犀兕有鳥焉其狀如翟而五彩文翟似雉而大長尾或作𪇱鵰屬也名曰鸞鳥現則天下安寧舊說鸞似雞形瑞鳥也周成王時西戎獻也又西二百里曰龍首之山其陽多黄金其隂多鐵苕水出焉而東南流注于涇水其中多美玉又西二百里曰鹿臺之山今在上郡其上多白玉其下多銀其獸多㸲牛羬羊白豪豪貆猪也有鳥焉其狀如雄雞而人面名曰鳧徯其名自叫也見則有兵西南二百里曰鳥危之山其陽多磬石其隂多檀楮楮即穀木其中多女牀未詳鳥危之水出焉西流注于赤水其中多丹粟又西四百里曰小次之山其上多白玉其下多赤銅有獸焉其狀如猿而白首赤足名曰朱厭見則大兵一作見則有六起焉一作見則爲兵又西三百里曰大次之山其陽多堊堊似土色甚白音惡其隂多碧其獸多㸲牛麢羊又西四百里曰薰吴之山無草木多金玉又西四百里曰底陽之山音㫖其木多稷柟豫章稷似松有刺細理音即豫章大木似楸葉冬夏青生七年而後復可知也其獸多犀兕虎犳㸲牛犳音之藥反又西二百五十里曰衆獸之山其上多㻬琈之玉其下多檀楮多黄金其獸多犀兕又西五百里曰皇人之山其上多金玉其下多青雄黃即雌黄也或曰空青曾青之屬皇水出焉西流注于赤水其中多丹粟又西三百里曰中皇之山其上多黄金其下多蕙棠彤棠之屬也蕙或作羔又西三百五十里曰西皇之山其陽多金其隂多鐵其獸多糜鹿㸲牛麋大如小牛鹿屬也又西三百五十里曰萊山其木多檀楮其鳥多羅羅是食人羅羅之鳥所未詳也凡西次二經之首自鈐山至于萊山凡十七山四千一百四十里其十神者皆人面而馬身其七神皆人面牛身四足而一臂操杖以行是爲飛獸之神其祠之毛用少牢羊猪爲少牢也白菅爲席其十輩音背神者其祠之毛一雄鷄鈐而不糈鈐所用祭器名所未詳也或作思訓祈不糈祠不以米毛采言用雜色雞也西次三經之首曰崇吾之山在河之南北望冢遂山名南望之澤音遥西望帝之搏獸之丘搏或作簿東望䗡音於然反淵有木焉圓葉而白柎今江東人呼草木子房爲柎音府一曰柎花下鄂音丈夫字或作柎音符赤華而黑理其實如枳食之宜子孫有獸焉其狀如禺而文臂豹虎而善投名曰舉父或作夸父有鳥焉其狀如鳧而一翼一目相得乃飛名曰蠻蠻比翼鳥也色青赤不比不能飛爾雅作鶼鶼鳥也見則天下大水西北三百里曰長沙之山泚水出焉音紫北流注于泑水烏交反又音黝水色黑也無草木多青雄黄又西北三百七十里曰不周之山此山形有缺不周匝處因名云西北不周風自此山出北望諸毗之山臨彼嶽崇之山東望泑澤河水所潜也其源渾渾泡泡河南出崑崙潜行地下至葱嶺出于闐國復分流歧出合而東流注泑澤已復潜行南出于積石山而爲中國河也名泑澤即蒲澤一名蒲昌海廣三四百里其水停冬夏不增減去玉門關三百餘里即河之重源所謂潜行也渾渾泡泡水漳涌之聲也衮泡兩音爰有嘉果其實如桃其葉如棗黄華而赤柎食之不勞又西北四百二十里曰峚山音宻其上多丹木圓葉而赤莖黄華而赤實其味如飴食之不飢丹水出焉西流注于稷澤后稷神所溺因名云其中多白玉是有玉膏其源沸沸湯湯玉膏涌出之貌也河圖玉版曰少室山其上有白玉膏一服即仙矣亦此類也沸音拂黄帝是食是饗所以得登龍於鼎湖而龍蜕也是生玄玉言玉膏中凡出黑玉也玉膏所出以灌丹木丹木五歲五色乃清言光鮮也五味乃馨言滋香也黄帝乃取峚山之玉榮謂玉華也離騷曰懷琬琰之榮英又曰登崑崙兮食玉英汲冢書所謂苕華之玉而投之鍾山之陽以爲玉種瑾瑜之玉爲良言最善也或作食覲臾兩音堅粟精宻說玉理也禮記曰瑱宻似粟粟或作栗玉有粟文所謂穀璧也濁澤有而光濁謂潤厚五色發作言符彩互映也王子靈符應曰赤如雞冠黄如蒸粟白如割肪黑如醇漆玉之符彩也以和柔剛言玉恊九德也天地鬼神是食是饗玉所以祈祭者言能動天地感鬼神君子服之以禦不祥今徼外出金剛石石屬而似金有光彩可以刻玉外國人帶之云辟惡氣亦此類也自峚山至于鍾山四百六十里其間盡澤也是多音鳥怪獸奇魚皆異物焉又西北四百二十里曰鍾山其子曰鼓此亦神名名之爲鍾山之子耳其類皆見歸藏啓筮其狀如人面而龍身啓筮曰麗山之子青羽八面馬身亦似此狀也是與欽䲹音邳殺葆江于崑崙之陽葆或作祖帝乃戮之鍾山之東曰音遥崖欽䲹化爲大鶚鶚鵰屬也音𨺨其狀如鵰而黑文白首赤喙而虎爪其音如晨鵠晨鵠鶚屬猶云晨鳧耳說苑曰縣吠犬比奉晨鳧也見則有大兵鼓亦化爲鵕鳥音俊其狀如鴟赤足而直喙黄文而白首其音如鵠見即其邑大旱穆天子傳云鍾山作春字音同耳穆王北外此山以望四野曰鍾山是惟天下之高山也百獸之所聚飛鳥之栖也爰有赤豹白虎白鳥青鵰執犬羊食豕鹿穆王五日觀于鍾山乃爲銘迹於縣圃之上以詔後世又西百八十里曰泰器之山觀水出焉西流注于流沙是多文魚音遥狀如鯉魚魚身而鳥翼蒼文而白首赤喙常行西海遊於東海以夜飛其音如鸞鷄鸞雞鳥名未詳也或作欒其味酸甘食之已狂見則天下大穰豐穰收熟也韓子曰穰歲之秋又西三百二十里曰槐江之山丘時之水出焉而北流注于泑水其中多蠃母即䗱螺也其上多青雄黄多藏琅玕黄金玉琅玕石似珠者藏猶隱也郞干兩音其陽多丹粟其隂多采黄金銀實惟帝之平圃即玄圃也穆天子傳曰乃爲銘迹於玄圃之上謂刊石紀功德如秦皇漢武之爲者也神英招司之司主也音韶其狀馬身而人面虎文而鳥翼徇于四海徇謂周行也其音如榴音霤或作籕所未詳也南望崑崙其光能熊其氣魂魂其光氣炎盛之貌西望大澤后稷所潜也后稷生而靈極及其潜化形遯此澤而爲之神騎箕尾也其中多玉其隂多搖木之若揺木大木也言其上復生若木大木之奇靈者爲若子國語曰揺木不北望諸毗山名槐鬼離侖居之離侖其神名鷹鸇之所宅也鸇亦鴟屬也莊周曰鴟鴉甘鼠穆天子傳云鍾山上有白鳥青鵰皆此族類也東望恒山四成成亦重也爾雅云再成曰英也有窮鬼居之各在一搏搏猶脅也言羣鬼各以類聚處山四脅有窮其總号耳搏三作摶爰有滛水其清洛洛水流下之貌也滛音遥也有天神焉其狀如牛而八足二首馬尾其音如勃皇勃皇未詳見則其邑有兵西南四百里曰崑崙之丘是實惟帝之下都夭帝都邑之在下者也穆天子傅曰吉日辛酉天子升于崑崙之丘以觀黄帝之宫而封豐隆之葬以詔後世言增封於崑崙山之上神陸吾司之即肩吾也莊周曰肩吾得之以處大山也其神狀虎身而九尾人面而虎爪是神也司天之九部及帝之圃時主九城之部界天帝苑圃之時飾也有獸焉其狀如羊而四角名曰土螻是食人有鳥焉其狀如蜂大如鴛鴦名曰欽原欽或作友或作至也蠚鳥獸則死蠚木則枯有鳥焉其名曰鶉鳥是司帝之百服服器服也一曰服事也或作有木焉其狀如棠棠梨也黄華赤實其味如李而無核名曰沙棠可以禦水食之使人不溺言也沙棠爲木不可吕氏春秋曰果之美者沙棠之實銘曰沙棠刻以爲舟汎彼滄海以遨以遊有草焉名曰𦿜草音頻其狀如葵其味如葱食之已勞吕氏春秋曰菜之美者崑崙之𦿜可水出焉出山東北隅也而南流東注于無達山名赤水出焉出山東南隅也而東南流注于氾天之水氾天亦山名赤水所窮也邊天子傳曰遂宿于崑崙之側赤水之陽陽水北也氾浮劎反洋水出焉出山西北隅或作洧而西南流注于醜塗之水醜塗亦山名也皆在南極穆天子傳曰戊辰濟洋水又曰觴天子洋水也黑水出焉亦出西北隅也而西流于大杅山名也穆天子傳曰乃封長肱于黑水之西河是惟崑崙鴻鷺之上以爲周室主杆音于是多怪鳥獸謂有一獸九首有一鳥六首之屬也又西三百七十里曰樂游之山桃水出焉西流注于稷澤是多白玉其中多䱻魚音淯其狀如蛇而四足是食魚西水行四百里曰流沙二百里至于赢母之山神長乗司之是天之九德也九德之氣所生其神狀如人而犳之藥反尾其山上多玉其下多青石而無水又西三百五十里曰玉山是西王母所居也此山多玉石因以名云穆天子傳謂之羣玉之山見其山河無險四徹中繩先王之所謂策府寡草木無鳥獸穆王於是攻其玉石取玉石版三乗玉器服物載玉萬隻以歸雙玉爲㲄半㲄爲隻西王母其狀如人豹尾虎齒而善嘯蓬髪戴勝蓬頭亂髮勝玉勝也音龐是司天之厲及五殘主知災厲五刑殘殺之氣也穆天子傳曰吉日甲子天子賔于西王母執亥圭白璧以見西王母獻綿組百純紺三百純西王母再拜受之乙丑天子觴西王母于瑶池之上西王母爲天子謡曰白雲在天山陵自出道里悠遠山川間之將子無死尚復能來天子畣之曰予還東土和理諸夏萬民均平吾顔見汝比及三年將復而野西王母又爲天子吟曰徂彼西土爰居其所虎豹爲羣鳥鵲與處嘉命不遷我惟帝女彼何世民又將去子吹笙鼓簧甲心翱翔世民之子惟天之望天子遂驅升于奄山乃紀迹于奄山之石而樹之槐眉曰西王母之山奄山即崦嵫山也案竹書穆王五十七年西王母來見賔于昭宫舜時西王母遺使獻玉環見禮三朝有獸焉其狀如犬而豹文其角如牛或作羊或名曰狡其音如吠犬見則其國大穰晋太康十年邵陵扶夷縣檻得一獸狀如豹文有兩角無前兩脚時人認之狡疑非此有鳥焉其狀如翟而赤名曰胜遇亭姓是食魚其音如録音緑義未詳見則其國大水又西四百八十里曰軒轅之丘無草木黄帝居此丘娶西陵氏女因號軒轅丘洵水出焉音詢南流注于黑水其中多丹粟多青雄黃又西三百里曰積石之山其下有石門河水冒以西流冒猶覆也積石山名在金城河門關西南羌中河水行東入塞内是山也萬物無不有焉水經引山海經云積石山在鄧林山東河所入也又西二百里曰長留之山其神白帝少昊居之少昊金天氏帝摯之號也其獸皆文尾或作長其鳥皆文首文或作長是多文玉石實惟員神磈氏之宫音隗是神也主司反景日西入則景反東照主司察之又西二百八十里曰章莪之山無草木多瑶碧碧亦玉屬所爲甚怪多有非常之物有獸焉其狀如赤豹五尾一角其音如擊石其名曰狰京氏易義曰音如石相擊音靜也有鳥焉其狀如鶴一足赤文青質而白喙名曰畢方其鳴自叫也見則其邑有譌火譌亦妖訛字又西三百里曰隂山濁浴之水岀焉而南流注于蕃澤其中多文貝之類也見爾雅有獸焉其狀如狸或作豹而白首名曰天狗其音如榴榴或作猫猫可以禦凶又西二百里曰符惕之山音陽其上多㯶柟下多金玉神江疑居之是山也多怪雨風雲之所出也又西二百二十里曰三危之山今在燉煌郡尚書云竄三苗于也危是也三青鳥居之是山也廣員百里三青鳥主爲西王母取食者别自遊息於此山也竹書曰穆王西征至于青鳥所解也其上有獸焉其狀如牛白身四角其毫如披蓑蓑辟雨草衣也音催其名曰𢕟𤝱𢕟壹兩音是食人有鳥焉一首而三身其狀如𪇱其名曰鴟𪇱似鵰黑文赤頸音洛下句或云扶狩則死扶本則枯應在上飲原下脫錯在此耳又西一百九十里曰騩山其上多玉而無石神耆童居之耆童老童顓頊之子其音常如鍾磬其下多積蛇又西三百五十里曰天山多金玉有青雄黄英水出焉而西南流注于湯谷有神焉其狀如黄囊赤如丹火體色黃而精光赤也六足四翼渾敦無面目是識歌舞實惟帝江也夫形無全者則神自然靈照精無見者則闇與理會其帝江之謂乎莊生所云中央之帝混沌爲儵忽所鑿七竅而死者蓋假此以寓言也又西二百九十里曰泑山泑音黝黑之黝神蓐收居之亦金神也人面虎爪白尾執鈛見外傳云其上多嬰短之玉未詳其陽多瑾瑜之玉其隂多青雄黄是山也西望日之所入其氣圓日形圓故其氣象亦圓也神紅光之所司也未聞其狀西水行百里至于翼望之山或作土翠山無草木多金玉有獸焉其狀如狸一曰而三尾名曰讙讙音歡或作原其音如𡙸百聲言其能作百種物聲也或曰𡙸百物名亦所求詳是可以禦凶服之已癉黄癉病也音旦有鳥焉其狀如烏三首六尾而善笑名曰鵸䳜待餘兩音服之使人不厭不厭夢也周書曰厭者不眯音莫禮反或曰眯眯目也又可以禦凶凡西次三經之首崇吾之山至于翼望之山凡二十三山六千七百四十四里其神狀皆羊身人面其祠之禮用一吉玉瘞玉加彩色者也尸子曰吉玉大龜糈用稷米西次四經之首曰隂山上多穀無石其草多𦭘蕃𦭘葵也蕃青蕃似莎而大𦭘煩兩音隂水出焉西流注于洛北五十里曰勞山多芘草一名茈荑中染紫也弱水出焉而西流注于洛西五十里曰罷父之山洱水出焉音耳而西流注于洛其中多芘碧北百七十里曰申山其上多穀祚其下多杻橿其陽多金玉區水出焉而東流注于河北二百里曰鳥山其上多桑其下多楮其隂多鐵其陽多玉辱水出焉而東流注于河又北百二十里曰上申之山上無草木而多硌石硌磊硌大石貌也音洛下多榛楛榛子似栗而小味美楛木可以爲箭詩云榛楛濟濟榛枯兩音獸多白鹿其鳥多當扈或作户其狀如雉以其髯飛髯咽下須毛也食之不眴目音眩湯水出焉東流注于河又北百八十里曰諸次之山諸次之水出焉而東流注于河是山也多木無草鳥獸莫居是多衆蛇又北百八十里曰號山其木多漆㯶漆樹似樗也其草多葯䖀芎藭葯白芷别名䖀香草也芎藭一名江蘺葯音鳥較反多泠石泠或音金未詳端水出焉而東流注于河又北二百二十里曰盂山音于其隂多鐵其陽多銅其獸多白狼白虎外傳曰周穆王伐犬戎得四白狼白虎虎名甝其鳥多白雉白翟或作白翠生水出焉而東流注于河西二百五十里曰白於之山上多松栢下多櫟檀櫟即柞其獸多㸲牛羬羊其鳥多鴞鴞似鳩而青色洛水出于其陽而東流注于渭夾水出于其隂東流注于生水西北三百里曰申首之山無草木冬夏有雪申水出于其上潜于其下是多白玉又西五十五里曰涇谷之山或無之山二字涇水出焉或以此爲今涇水未詳東南流注于渭是多白金白玉又西百二十里曰剛山多柴木多㻬琈之玉剛水出焉北流注于渭是多神𩳁𩳁亦魑魅之類也音耻回又或作𩲫其狀人面獸身一足一手其音如欽欽亦吟字假音又西二百里至剛山之尾洛水出焉而北流注于河其中多蠻蠻其狀鼠身而鼈首其音如吠犬又西三百五十里曰英鞮之山上多漆木下多金玉鳥獸盡白涴水出焉涴或作音寃枉之寃而北注于陵羊之澤是多冉遺之魚魚身蛇首六足其目如馬耳食之使人不眯可以禦凶又西三百里曰中曲之山其陽多玉其隂多雄黄白玉及金有獸焉其狀如馬而白身黑尾一角虎牙爪音如鼓音其名曰駮是食虎豹爾雅說駮不道有角及虎爪駮亦在長狩晝中可以禦兵養之辟兵刃也有木焉其狀如棠而圓葉赤實實大如木瓜木瓜如小瓜名曰懷木音懷食之多力尸子曰木食之人多爲仁者名爲若水此之類又西二百六十里曰邽山音圭其上有獸焉其狀如牛蝟毛名曰窮奇如獋狗是食人或云似虎蝟毛有翼銘曰窮竒之獸厥形甚醜馳逐妖邪莫不犇走是以一名號曰神狗濛水出焉音蒙南流注于洋水其中多黄貝貝甲蟲内如科斗但有頭尾耳蠃魚音螺魚身而鳥翼音如鴛鴦見則其邑大水又西二百二十里曰鳥鼠同穴之山今在龍西首陽縣西南山有鳥鼠同穴鳥名曰䳜鼠名曰如人家鼠而短尾似燕而黄色穿地入數尺鼠在内鳥在外而共處孔氏尚書傳曰共爲雌雄張氏地理記云不爲牡牝也其上多白虎白玉渭水出焉而東流注于河出山東至弘農華隂縣入河其中多鰠魚音騷其狀如鱣魚鱣魚大魚也口在頜下體有連甲也或作鮎鯉動則其邑有大兵或脫無從動則以下語者濫水出于其西音檻西流注于漢水多𩶯魮之魚如毗兩音其狀如覆銚鳥首而魚翼魚尾音如磬石之聲是生珠玉亦珠母蚌類而能生出之西南三百六十里曰崦嵫之山日没所入山也見離騷奄兹兩音其上多丹木其葉如榖其實大如瓜赤符而黑理食之已癉可以禦火其陽多龜其隂多玉苕或作若水出焉而西流注于海禹大傳曰洧盤之水出崦嵫山其中多砥礪磨石也精爲砥麤爲礪也有獸焉其狀馬身而鳥翼人面蛇尾是好舉人喜抱舉人名曰孰湖有鳥焉其狀如鴞而人面蜼身犬尾蜼獼猴屬也音贈遺之遺一音誅見中山經尾或作背其名自號也或作設設亦呼耳疑此脫誤見則其邑大旱凡西次四經自隂山以下至于崦嵫之山凡十九山三千六百八十里其祠祀禮皆用一白雞祈糈以稻米白菅爲席右西經之山凡七十七山一萬七千五百一十里西山經圖讚羬羊月氏之羊其類甚野厥高六尺尾赤如馬何以審之事見爾雅太華山華嶽靈峻削成四方爰有神女是挹玉漿其誰由之龍駕雲裳肥遺蛇肥遺爲物與災合契鼓翼陽山以表亢厲桑林既禱倏忽潜逝䳋渠赤鷩鳥文莖木鴖鳥䳋渠已殃赤鷩辟火文莖愈聾是則嘉果鴖亦衛災厥形惟麽流赭沙則潜流亦有運赭干以求鐵趍在其下蠲牛之癘作采于社豪彘剛鬛之族號曰豪彘毛如攢錐中有激矢厥體兼資自爲牝牡黃雚草肥遺鳥囂獸浴疾之草厥子赭赤肥遺似鶉其肉已疫囂獸長臂爲物好擲橐𨛬有鳥人面一脚孤立性與時反冬出夏蟄帶其羽毛迅雷不入桃枝嶓冢美竹厥号桃枝叢薄幽藹從容鬱猗簟以安寢杖以扶危杜衡狌狌犇人杜衡走馬理固須因體亦有假足駿在感安事御者蓇容草邊谿獸櫟鳥前作蓇蓉前作谿邊有華無實蓇容之樹邊谿類狗皮厭妖蠱黑文赤翁鳥愈隱痔鸚䳇慧鳥青羽赤喙譽石禀氣方殊件錯理微譽石殺鼠蠶食而肥性雖反齊之一歸𤣎如𤣎如之獸鹿狀四角馬足人手其尾則白貌兼三形攀木縁石鸚䳇鸚䳇慧鳥栖林喙桑四指中分行則以觜自貽伊籠見幽坐趾數斯鳥𤛎獸鸓鳥數斯人脚厥狀似鴟𤛎獸大眼有鳥名鸓兩頭四足翔若合飛鸞鳥鸞翔女牀鳳出丹穴拊翼相和以應聖哲擊石靡詠韶音其絶鳧徯鳥朱厭獸鳧徯朱厭見則有兵類異感同理不虚行推之自然厥數難明蠻蠻比翼之鳥似鳧青赤雖云一形氣同體隔延頸離鳥翻飛合翮丹木玉膏丹木煒燁沸沸玉膏黄軒是服遂攀龍豪眇然升遐羣下烏號瑾瑜玉鍾山之寳爰有玉華符彩流映氣如虹霞君子是佩象德閑邪鍾山之子鼓欽䲹欽䲹及鼓是殺祖江帝乃戮之崑崙之東二子皆化矯翼亦同鰩魚見則邑穰厥名曰鰩經營二海矯翼閑霄唯味之奇見歎伊巵神英招槐江之山英招是主巡遊四海撫翼雲儛實惟帝囿有謂玄圃揺木揺惟靈樹爰生若木重根增駕流光旁燭食之靈化榮名仙録崑崙丘崑崙月精水之靈府惟帝下都西老之宇嶸然中峙号曰天柱神陸吾肩吾得一以處崑崙開明是對司帝之門吐納靈氣熊熊魂魂土螻獸欽原鳥土螻食人四角似羊欽原類蜂大如鴛鴦觸物則斃其銳難當沙棠安得沙棠制爲龍丹汎彼滄海眇然遐遊聊以逍遥任波去留鶉鳥沙棠實𦿜草司帝百服其鳥名鶉沙棠之實惟果是珍爰有奇菜厥号曰𦿜神長乗九德之氣是生長乗人狀犳尾其神則凝妙物自潜世無得稱西王母天帝之女蓬髮虎顔穆王執贄賦詩交歡韻外之事難以具言積石積石之中實出重河夏后是導石門涌波珍物斯備比奇崑阿白帝少昊少昊之帝號曰金天磈氏之宫亦在此山是司日入其景則圓狰章莪之山奇怪所宅有獸似豹厥色惟赤五尾一角鳴如擊石畢方畢方赤文離精是炳旱則高翔鼓翼陽景集乃流災火不炎正文貝先民有作龜貝爲貨貝以文彩賈以大小簡則易從犯而不過天狗乾麻不長天狗不大厥質雖小攘災除害氣之相王在乎食帶三青鳥山名三危青鳥所解往來崑崙王母是隸穆王西征旋軫斯地江疑獓𤝱獸𪇱鳥江疑所居風雲是潜獸有獓𤝱毛如披蓑𪇱鳥一頭厥身則兼神耆童顓頊之子嗣作火正鏗鎗其鳴聲如鍾磬處于騩山唯靈之盛帝江質則混沌神則旁通自然靈照聽不以聦强爲之名曰在帝江獂獸鵸鵌鳥鵸鵌三頭獂獸三尾俱禦不祥消凶辟眯君子服之不逢不韙當扈鳥飛以翼當扈則鬚廢多任少沛然有餘輪運於轂至用在無白狼矯矯白狼有道則遊應符變質乃銜靈鈎惟德是適出殷見周白虎甝之虎仁而有猛其質載皓其文載炳應德而擾止我交境駮駮惟馬類實畜之英騰髦驤首噓天雷鳴氣無馮凌吞虎辟兵神𩲫蠻蠻髯遺魚前作冉遺其音如吟一脚人面鼠身鼈頭厥號曰蠻目如馬耳食厭妖變欀木欀之爲木厥形似槤若能長服拔樹排山力則有之壽則宜然鳥鼠同穴山䳜鼵二蟲殊類同歸聚不以方或走或飛不然之然難以理推𩶯魮魚形如覆銚包玉含珠有而不積泄以尾閭闇與道會可謂竒魚丹木爰有丹木生彼淆盤厥實如瓜其味甘酸蠲痾辟火用竒桂蘭窮竒獸蠃魚孰湖獸窮竒如牛蝟毛自表濛水之蠃匪魚伊鳥孰湖之獸見人則抱鰠魚物以感應亦有數動壯士挺劎氣激白虹鰠魚潜淵出則邑悚山海經卷之二
