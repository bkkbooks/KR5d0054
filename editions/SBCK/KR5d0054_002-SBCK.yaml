  text: 西山經第二
  hash: sha256:085dd6e0028ecffca62b4c372882b6d459d319749ce0db7de9013a16d34c6086
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_SBCK_001-10a}
body:
  text: 郭氏傳西山經華山之首曰錢來之山其上多松其下多洗石垢圿磢初兩反藻洗可以磢體去有獸焉其狀如羊而馬尾名曰羬羊尾爾雅云羊六尺為羬謂此羊今大月氐國有大羊如馿而馬音針也羬其脂可以已腊腊音昔治軆皴西四十五里曰松果之山濩水出焉北流注于渭其中多銅有鳥焉其名曰䳋渠弓之彤䳋音彤其狀如山雞黑身赤足可以已音叵駮反謂皮皺起也又西六十里曰太華之山在農華陰縣西南即西岳華隂山也今削成而四方下小峭峻也今山形上大其髙五千仭其廣十里服之即成仙道險僻不通時含神霧云仭八尺也上有明星玉女持玉漿得上鳥獸莫居有蛇焉名曰肥六足四翼見則天下大旱復有肥遺蛇疑是同名湯時此蛇見於陽山下又西八十里曰小華之山華山即小其木多荆其獸多㸲牛皆千斤牛即此牛也音昨今華隂山中多山牛山羊肉其隂多磬石樂石可以為其陽多㻬琈之玉詳也浮两音㻬琈玉名所未鳥多赤鷩頭緑尾中有赤毛彩鮮明音作蔽或赤鷩山雞之属胷腹洞赤冠金皆黄鼈作可以禦火其草有萆荔蔽戾兩音萆荔香草也狀如烏韭而生於石上亦緣木而生邪在墻者曰垣衣烏韭在屋者曰昔食之已心痛又西八十里曰符禺之山其陽多銅其隂多鐡其上有木焉名曰文莖其實如可以已聾其草多條其狀如葵而赤花黄實如嬰兒舌食之使人不惑符禺之水出焉而北流注于渭其獸多葱聾其狀如羊而赤鬛其鳥多鴖旻音其状如翠而赤喙紺色也翠似燕而可以禦火火灾也畜之辟又西六十里曰石脆之山其木多椶柟三丈許椶樹髙皮者為一節可以為繩一名栟櫚音馬駿之駿無枝條葉大而員枝生梢頭實皮相裹上行一其草多條其狀如韭而白華黑實食之已疥其陽多㻬琈之玉其隂多銅灌水出焉而北流注于禺水其中有流赭土赭赤以牛馬無病亦以今人辟惡馬或作角朱牛角云以又西七十里曰英山其上多杻橿葉一名土橿杻似棣而細車材音姜音紐橿木中其隂多鐡其陽多赤金禺水出焉北流注于招水韶音其中多䰷魚蛤之蚌音同蚌其狀如鼈其音如羊其陽多箭䉋裏而長節根深筍冬今漢中郡出䉋竹厚食之䉋音媚生地中人掘取其獸多㸲牛羬羊有鳥焉其状如鶉黄身而赤喙其名曰肥遺食之已癘病也癘疫曰癘人憐主或曰惡創韓子可以殺蟲又西五十二里曰竹山其上多喬木者音橋枝上竦其隂多鐡有草焉其名曰黄雚其状如樗其葉如麻白花而赤實其状如赭色紫赤浴之已疥又可以已胕也音符治胕腫竹水出焉北流注于渭其陽多竹箭也箭篠多蒼玉丹水出焉有丹水今所在東流注于洛水其中多水玉多人魚四脚如䱱魚有獸焉其状如豚而白毛大如笄而黑端属笄簮名曰毫彘亦自為牝牡狟或作假吳楚呼為鸞猪亦此狟猪也夾髀有麄豪長數尺以脊上毫射物也又西百二十里曰浮山多盼木之眄音羙目盻枳葉而無傷傷人故名云枳剌針也能木蟲居之之中在樹有草焉名曰薰訓音草麻葉而方莖赤華而黑實臭如蘼蕪臭如蘭眉無两音蘼蕪香草易曰其佩之可以已癘又西七十里曰羭次之山音漆水出焉出岐山今漆水北流注于渭其上多棫橿也音域棫白桵其下多竹箭其隂多赤銅其陽多嬰垣之玉根或作埋傳寫垣或作短或作可得詳謬錯未有獸焉其狀如禺而長臂善投其名曰囂似猕猴投擲也亦在畏獸中有鳥焉其狀如梟人面而一足曰槖肥音冬見夏蟄服之不畏雷令人不畏著其毛羽或作灾天雷也又西百五十里曰時山無草木逐遂或作水出焉北流注于渭其中多水玉又西百七十里曰南山上多丹粟丹水出焉北流注于渭獸多猛豹澤能食蛇食銅鐡出蜀中猛豹似熊而小毛淺有光作虎豹或鳥多尸鳩鶘鸇也鳩或作丘尸鳩布谷也或曰又西百八十里曰大時之山上多榖柞櫟柞下多杻橿隂多銀陽多白玉涔水岀焉潜音北流注于渭清水出焉南流注于漢水北黑山亦出清水今河内武縣縣又西三百二十里曰嶓冡之山縣南嶓音波今在武都氐道漢水出焉而東南流注于沔縣江即沔水至江夏安陸水出焉北流注于湯水陽或作其上多桃枝鈎端枝属鈎端桃獸多犀兕熊羆色猛憨能㧞樹羆似熊而黄白鳥多白翰赤鷩雉又曰白雉白翰白鵫也亦名有草焉其葉如蕙蕙為薰葉失之音惠蕙香草蘭属也或以其本如桔梗也本根黑華而不實名曰蓇蓉不實謂之蓇音骨爾雅釋草曰榮而食之使人無子又西三百五十里曰天帝之山上多㯶柟下多菅蕙也菅茅有獸焉其状如狗名曰谿谷或作邊遺或作席其皮者不蠱有鳥焉其状如鶉黑文而赤翁汲甕之甕翁頭下毛音名曰櫟之礫音沙礫食之已痔有草焉其状如葵其臭如蘼蕪名曰杜衡也香草可以走馬曰馬得之而徤走帶之令人便馬或食之已癭西南三百八十里曰皐塗之山薔蕢又作富音色或作水出焉西流注于諸資之水塗水出焉南流注于集獲之水其陽多丹粟其隂多銀黄金其上多桂木有白石焉其名曰礜可以毒鼠豫蚕食之而肥今礜石殺鼠音有草焉其状如槀苃香草槀茇其葉如葵而赤背名曰無條可以毒鼠有獸焉其状如鹿而白尾馬足人手似人手前两脚而四角名曰如之嬰音猳有鳥焉其状如鴟而人足名曰數斯食之已癭癎或作又西百八十里曰黄山有宫漢惠帝所起疑非此今始平槐里縣有黄山上故無草木多竹箭盼水出焉之眄音羙目眄西流注于赤水其中多玉有獸焉其状如牛而蒼黑大目其名曰敏音有鳥焉其状如鴞青羽赤喙人舌言名曰鸚䳇外出五色者其亦有純赤白者大如鴈也鸚䳇舌似小兒舌脚指前後各兩扶南徼又西二百里曰翠山其上多㯶枏其下多竹箭其陽多黄金玉其隂多旄牛麢麝在山崖間麝似獐而小麢似羊而大角細食好香有其鳥多鸓壘音其状如鵲赤黑而西首四足可以禦火又西二百五十里曰騩山隗之隗音巍一音是錞于西海猶錞章閏反堤埻也音無草木多玉淒水出焉浽或作西流注于海其中多采石黄金雌黄空青緑碧之属采石石有采色者今多丹粟凡西經之首自錢來之山至于騩山凡十九山二千九百五十七里華山冢也之所舍也冢者神其祠之禮太牢為太牢牛羊豕羭山神也祠之用燭或作齋百日以百犧純牲為犧色者瘞用百瑜名音瑜亦羙王湯温或作其酒百樽令温酒嬰以百珪百璧謂盂也徐州云穆天子傳曰黄金之嬰嬰謂陳之以環祭也或曰嬰即古字也之属其餘十七山之属皆毛牷用一羊祠之具也左傳曰牷謂牲体全腯者也牷牲肥燭者百草之未白蒂采等純之色純之等純緣也五禮莞席紛純差其文綵也周西次二經之首曰鈐山作冷又作塗音髠鉗之鉗或其上多銅其下多玉其木多杻橿西二百里曰㤗秦或作冐之山其陽多金其隂多鐡浴水出焉東流注于河其中多藻玉者或作柬音練藻玉玉有符彩多白蛇蛇水又西一百七十里曰數歴之山其上多黄金其下多銀其木多杻橿其鳥多鸚䳇楚水出焉而南流注于渭其中多珠子曰水員折者有珠今蜀郡平澤出青珠尸又西百五十里曰髙山其上多銀其下多青碧玉碧亦縣東山出碧也今越嶲㑹稽雄黄山崩其中出數千斤雄黄大興三年髙平郡界有其木多㯶其草多竹涇水出焉經音而東流注于渭出安定今涇水京兆髙陵縣入渭也朝那縣西井頭山至其中多磬石浮磬是也書曰泗濵青碧西南三百里曰女牀之山其陽多赤銅其隂多石羽也本草經亦名曰石也即楚石也楚人名為石秦名為其獸多虎豹犀兕有鳥焉其状如翟而五彩文或作鵰属也翟似雉而大長尾名曰鸞鳥見則天下安寧周成王時西戎獻之舊鵉似鷄瑞鳥也又西二百里曰龍首之山其陽多黄金其隂多鐡苕水出焉東南流注于涇水其中多羙玉又西二百里曰鹿臺之山上郡今在其上多白玉其下多銀其獸多㸲牛羬羊白豪猪也豪貆有鳥焉其状如雄雞而人面名曰鳬徯其名自呌也見則有兵西南二百里曰鳥危之山其陽多磬石其隂多檀楮榖木楮即其中多女牀詳未鳥危之水出焉西流注于赤水其中多丹粟又西四百里曰小次之山其上多白玉其下多赤銅有獸焉其状如猿而白首赤足名曰朱厭見則大兵焉一作見則為兵一作見則有兵起又西三百里曰大次之山其陽多堊甚白音惡堊似土色其隂多碧其獸多㸲牛麢羊又西四百里曰薰吳之山無草木多金玉又西四百里曰陽之山音其木多稷柟豫章松有稷似冬夏青生七年而後復可知也剌細理音即豫章大木似楸葉其獸多犀兕虎豹㸲牛樂反犳音之又西二百五十里曰衆獸之山其上多㻬琈之玉其下多檀楮多黄金其獸多犀兕又西五百里曰皇人之山其上多金玉其下多青雄黄空青曽青之属即雌黄也或曰皇水出焉西流注于赤水其中多丹粟又西三百里曰中皇之山其上多黄金其下多棠或作羔彤棠之属也又西三百五十里曰西皇之山其陽多金其隂多鐡其獸多麋鹿㸲牛牛鹿属也麋大如小又西三百五十里曰萊山其木多檀楮其鳥多羅羅是食人所未詳也羅羅之鳥凡西次二經之首自鈐山至于萊山凡十七山四千一百四十里其十神者皆人靣而馬身其七神皆人靣牛身四足而一臂操杖以行是為飛獸之神其祠之毛用少牢少牢也羊猪為白菅為席其十軰背音神者其祠之毛一雄鷄鈐而不糈作思訓祈不糈祠不以米鈐所用祭噐名所未詳也或毛采色鷄也言用雄西次三經之首曰崇吾之山在河之南北望冡遂名山南望䍃之澤遥音西望帝之獸之丘作薄或東望䗡於音反然淵有木焉員葉而白柎柎音府一曰柎花下鄂音今江東人呼草木子房為作柎音符丈夫字或赤華而黒理其實如枳食之宜子孫有獸焉其状如禺而文臂豹虎而善投名曰舉父夸父或作有鳥焉其状如鳬而一翼一目相得乃飛名曰蠻蠻翼比飛爾雅作鶼鶼鳥也鳥也色青赤不比不能見則天下大水西北三百里曰長沙之山泚水出焉紫音北流注于泑水黝水色黑也烏交反又音無草木多青雄黄又西北三百七十里曰不周之山匝處因名云西北此山形有缺不周此山出不周風自北望諸毗之山臨彼嶽崇之山東望泑澤河水所潜也其源渾渾泡泡至葱嶺出于闐國復分河南出崑崙潜行地下而為中國河也名泑減即蒲澤一名蒲昌海廣三四流歧出合而東流注泑澤已復潜行南出于積石山之重源所謂潜行也渾渾泡泡水濆湧之聲也衮咆百里其水停冬夏不增减去玉門三百餘里即河音二爰有嘉果其實如桃其葉如黄華而赤柎食之不勞又西北四百二十里曰峚宻音山其上多丹木員葉而赤莖黄華而赤實其味如飴食之不飢丹水出焉西流注于稷澤馮因名云后稷神所其中多白玉是有玉膏其源沸沸湯湯上有白玉膏一服即仙矣亦此也沸音玉膏涌出之貌也河圖王版曰少室山其拂黄帝是食是饗鼎湖而龍蛻也所以得登龍於是生玉中又出言玉膏也黑玉玉膏所出以灌丹木丹木五歲五色乃清鮮也言光五味乃馨香也言滋黃帝乃取峚山之玉榮騷曰懐琬琰謂玉華也離英汲冡書所謂苕華之玉之華英又曰登崑崙食玉而投之鍾山之陽玉種以為瑾瑜之玉為良食覲两音言最善也或作堅粟精密禮記曰瑱玉理也有粟文所謂榖璧也密似粟粟或作栗玉濁澤有而光潤厚濁謂五色發作符言蒸栗白如割肪黑如醇漆玉之符彩也彩互映色王子靈符應曰赤如鷄冠黄如以和柔剛九徳也言玉恊天地神是食是饗動天地感神玉所以祈祭者言君子服之以禦不祥彩可以刻玉外國人帶之云辟惡氣今徼外出金剛石石属而似金有光也亦此自峚山至于鍾山四百六十里其間盡澤也是多竒鳥怪獸竒魚皆異物焉又西北四百二十里曰鍾山其子曰皷之為鍾山之此亦神名名見㱕蔵啓筮子耳其皆其状如人靣而龍身青羽人靣馬身亦啓筮曰麗山之子状也似此是與欽䲹邳音殺葆江于崑崙之陽作祖葆或帝乃戮之鍾山之東曰遥音崖欽䲹化為大鶚也音鄂鶚鵰属其状如鵰而黑文白首赤喙而虎其音如晨鵠属猶云晨鵠鶚吠犬比奉晨鳬也晨鳬耳曰緤見則有大兵皷亦化為鵕鳥俊音其状如鴟赤足而直喙黄文而白首其音如鵠見即其邑大旱此山以望四野曰鍾山是惟天下之髙山也穆天子傳云鍾山作春字音同耳穆王北升執犬羊食豕鹿穆王五日觀于鍾山乃為銘迹於縣百獸之所聚飛鳥之栖也爰有赤豹白虎白鳥青鵰詔後世圃之上以又西百八十里曰㤗噐之山水出焉西流注于流沙是多文鰩魚遥音状如鯉魚魚身而鳥翼蒼文而白首赤喙常行西海遊於東海以夜飛其音如鸞雞雞鸞也或作欒鳥名未詳其味酸甘食之已狂見則天下大穰收熟豐穰穰嵗之秋也韓子曰又西三百二十里曰槐江之山丘時之水出焉而北流注于泑水其中多蠃母螺也即䗱其上多青雄黃多蔵琅玕黄金玉猶也郎干二音琅玕石似珠者蔵其陽多丹粟其隂多采黄金銀實惟帝之平圃為銘迹於圃之上謂刋即圃也穆天子傳曰乃漢武之為者也石紀功徳如秦皇神英招司之也司主其状馬身而人靣虎文而鳥翼徇于四海行也徇謂周其音如榴作籕此音留或詳也所未南望崑崙其光熊熊其氣魂魂相焜燿之貌皆光氣炎盛西望大澤后稷所潜也此澤而為之神亦猶傳箕后稷生而靈知及其終化形遯也尾其中多玉其隂多榣木之有若上復生若木大木榣木大木也言其國語曰榣木不生花也之竒靈者為若見尸子北望諸毗名山槐離侖居之神名離侖其鷹鸇之所宅也鼠穆天子傳云鍾山上有白鸇亦鴟属也莊周曰鴟鴉甘此族也鳥青雕皆東望怛山四成云成曰英也成亦重也爾雅有窮居之各在一四脅有窮其惣號耳一作猶脅也言群各以聚處山爰有水其清洛洛也音遥也水留下之貌有天神焉其状如牛而八足二首馬尾其音如勃皇未詳勃皇見則其邑有兵西南四百里曰崑崙之丘是實惟帝之下都邑之在天帝都以觀黃帝之宫而封豐隆之葬以詔後世言増封於下者也穆天子傳曰吉日辛酉天子升于崑崙之丘之上崑崙山神陸吾司之吾得之以處大山也即有吾也莊周曰肩其神状虎身而九尾人面而虎是神也司天之九部及帝之囿時帝苑圃之時節也主九城之部界天有獸焉其状如羊而四角名曰土螻是食人有鳥焉其状如蜂大如鴛鴦名曰欽原或作至也欽或作爰蠚鳥獸則死蠚木則枯有鳥焉其名曰鶉鳥是司帝之百服服事也或作蔵服噐服也一曰有木焉其状如棠也棠梨華黄赤實其味如李而無核名曰沙棠可以禦水食之使人不溺沉吕氏春秋曰果之羙者沙棠言体浮輕也沙棠為木不可得為舟汎彼滄海以遨以遊之實銘曰安得沙棠刻以有草焉名曰薲草頻音其状如葵其味如葱食之已勞羙者崑崙之蘋吕氏春秋曰菜之河水出焉北隅也出山東而南流東注于無逹名山赤水出焉南隅也出山東而東南流注于汜天之水穆天子傳曰遂宿于崑崙汜天亦山名赤水所窮也水北也汜浮劒反之側赤水之陽陽洋水出焉隅或作清出山西北而西南流注于醜塗之水戊辰濟洋水又曰觴天子洋水也醜塗亦山名也皆在南極穆天子傳曰黑水出焉北隅也亦出西而西流于大杅曰乃封長肱于黑山名也穆天子傳之上以為周室主杅音于水之西河是惟崑崙鴻鷺是多怪鳥獸首有一鳥六謂有一獸九属也首之又西三百七十里曰樂游之山桃水出焉西流注于稷澤是多白玉其中多滑魚其状如蛇而四足是食魚西水行四百里曰流沙二百里至于蠃母之山神長乗司之是天之九徳也氣所生九徳九其神状如人而犳藥之反尾其上多玉其下多青石而無水又西三百五十里曰玉山是西王母所居也玉石因此山多徹中繩先王之所謂䇿府寡草木無鳥獸穆王於是以名云穆天子傳謂之群玉之山見其山河無險四載玉萬隻以㱕双玉為㲄半㲄為隻攻其玉石取玉石版三乗玉噐服物西王母其状如人豹尾虎齒而善嘯蓬髮戴勝玉勝也音龐蓬頭亂髪勝是司天之厲及五殘曰吉日甲子賔于西王母執玄圭白璧主知灾厲五刑殘殺之氣也穆天子傳之乙丑天子觴西王母于瑶池之上西王母爲天子以見西王母獻錦組百縷金玉百斤西王母拜受無死尚復來天子畣之曰予縁東土和理諸夏萬謡曰白雲在天山陵自岀道里悠逺山川間之將子天子吟曰徂彼西土爰居其所處豹爲群鳥鵲與處民均平吾顧見汝比及三年將復而野西王母又爲中心翺翔世民之子惟天之望天子遂驅外于奄山嘉命不遷我惟帝女彼何世民又將去予吹笙皷簧山即崦嵫山也案竹書穆王五十七年西王母來見乃紀迹于奄山之石而樹之槐眉曰西王母之山奄遣使獻玉環見禮三朝賔于昭宫舜時西王母有獸焉其状如犬而豹文其角如牛羊或作其名曰狡其音如吠犬見則其國大穰文有二角無前两脚時人謂之狡疑非此晉太康七年邵扶夷縣檻得一獸状如豹有鳥焉其状如翟而赤名曰胜遇姓音是食魚其音如録義未音録詳見則其國大水又西四百八十里曰軒轅之丘無草木娶西氏女黄帝居此丘轅丘因號軒洵水出焉詢音南流注于黒水其中多丹粟多靑雄黄又西三百里曰積石之山其下有石門河水冐以西流西南羗中河水行塞外東入塞内冐猶覆也積石山今在金城河門関是山也萬物無不有焉在林山東河所入也水經引山海經云積石山又西二百里曰長留之山其神白帝少昊居之金天少昊之號也氏帝摯其獸皆文尾長或作其鳥皆文首作長文或是多文玉石實惟員神磈氏之宫隗音是神也主司反景入則日西主司察之景反東照又西二百八十里曰章莪之山無草木多瑶碧玉属碧亦所為甚怪常之物多有非有獸焉其状如赤豹五尾一角其音如擊石其名如狰石相擊音静也京氏易義曰音如有鳥焉其状如鶴一足赤文青質而白喙名曰畢方其鳴自呌也見則其邑有譌火訛字譌亦妖又西三百里曰隂山濁浴之水出焉而南流注于蕃澤其中多文貝也見爾雅餘泉蚳之有獸焉其状如狸豹或作而白首名曰天狗其音如榴榴猫猫或作可以禦凶又西二百里曰符愓之山陽音其上多㯶柟下多金玉神江疑居之是山也多怪雨風雲之所出也又西二百二十里曰三危之山三苗于三危是也今在燉煌郡尚書云三青鳥居之是山也廣員百里取食者别自棲息於三青鳥主為西王母征至于青鳥所觧也此山也竹書曰穆王西其上有獸焉其状如牛白身四角其毫如披蓑衣也音梭蓑辟雨之其名曰傲二音傲噎是食人有鳥焉一首而三身其状如其名曰鴟黒文赤似鵰則枯應在上欽原下脫錯在此耳頸音洛下句或云扶狩則短扶木又西一百九十里曰騩山其上多玉而無石神童居之顓頊之子童老童其音常如鍾磬其下多積蛇又西三百五十里曰天山多金玉有青雄黄英水出焉而西南流注于湯谷有神焉其状如黄囊赤如丹火精光赤也体色黄而六足四翼渾敦無靣目是識歌舞實惟帝江也與理㑹其帝江之謂乎莊生所云中央之帝夫形無全者則神自然靈照精無見者則闇死者盖假此以寓言也混沌爲儵忽所鑿七竅而又西二百九十里曰泑山黒之黝泑音黝神蓐居之神也亦金執見外傳云人靣虎白尾其上多嬰短之玉詳未其陽多瑾瑜之玉其隂多青雄黄是山也西望日之所入其氣員形日象亦然也員故其氣神紅光之所司也其状未聞西水行百里至于翼望之山翠山或作土無草木多金玉有獸焉其状如狸一目而三尾名曰讙或作原讙音歡其音如奪百聲曰奪百物名亦所未詳言其作百種物聲也或是可以禦凶服之已癉也音旦黄癉病有鳥焉其状如烏三首六尾而善名曰鵸䳜兩音猗餘服之使人不厭者不昩音莫禮反或不厭夣也周書曰服目也曰又可以禦凶凡西次三經之首崇吾之山至于翼望之山凡二十三山六千七百四十四里其神状皆羊身人靣其祠之禮用一吉玉瘞子曰吉玉大玉加采色者也尸糈用稷米西次四經之首曰隂山上多榖無石其草多茆蕃茆而大茆煩二音葵也畨青蕃似莎隂水出焉西流注于洛北五十里曰勞山多茈草中染紫也一名茈䓞弱水出焉而西流注于洛西五十里曰罷父之山洱水出焉耳音而西流注于洛其中多茈碧北百七十里曰申山其上多榖柞其下多杻橿其陽多金玉區水出焉而東流注于河北二百里曰鳥山其上多桑其下多楮其隂多鐡其陽多玊辱水出焉而東流注于河又北百二十里曰上申之山上無草木而多硌石磊硌也音洛硌大石貌下多榛楛為箭詩云榛楛濟濟臻怙两音蓀子似栗而小味羙楛木可以獸多白鹿其鳥多當扈户或作其状如雉以其髯飛咽髯毛也下須食之不眴目音湯水出焉東流注于河又北百八十里曰諸次之山諸次之水出焉而東流注于河是山也多木無草鳥獸莫居是多衆蛇又北百八十里曰號山其木多漆㯶樗也漆樹似其草多葯䖀芎藭藭一名江蘺葯音鳥較反葯白芷别名䖀香草也芎多汵石今未詳汵或音端水出焉而東流注于河又北二百二十里曰盂山于音其隂多鐡其陽多銅其獸多白狼白虎四白狼白虎虎名甝外傳曰周穆王伐犬戎得其鳥多白雉白翟白翠或作生水出焉而東流注于河西二百五十里曰白於之山上多松柏下多櫟檀即櫟柞其獸多㸲牛羬羊其鳥多鴞而靑色鴞似鳩洛水出于其陽而東流注于渭夾水出于其隂東流注于生水西北三百里曰申首之山無草木冬夏有雪申水出于其上潜于其下是多白玉又西五十五里曰涇谷之山山二字或無之涇水出焉為今涇或以此詳水未東南流注于渭是多白金白玉又西百二十里曰剛山多柒木多㻬琈之玉剛水出焉北流注于渭是多神音耻回反或作亦魑魅之也其状人靣獸身一足一手其音如欽字假音欽亦吟又西二百里至剛山之尾洛水出焉而北流注于河其中多蠻蠻其状鼠身而鼈首其音如吠犬又西三百五十里曰英鞮之山上多木下多金玉鳥獸盡白涴水出焉枉之涴或作音而北注于羊之澤是多冉遺之魚魚身蛇首六足其目如馬耳食之使人不眯可以禦凶又西三百里曰中曲之山其陽多玉其隂多雄黄白玉及金有獸焉其状如馬而白身黒尾一角虎牙爪音如皷音其名曰駮是食虎豹及虎駮亦在畏狩爾雅駮不道有角中可以禦兵兵刃也養之辟有木焉其状如棠而員葉赤實實大如木小木如名曰櫰木懷音食之多力木食之尸子曰為若木此之人多為仁者名又西二百六十里曰邽山圭音其上有獸焉其状如牛蝟毛名曰窮竒音如獋狗是食人翼銘曰窮竒之獸或云似虎蝟毛有奔走是以一名號曰神狗厥形甚醜馳逐妖邪莫不水出焉音南流注于洋水其中多黄貝斗但有頭尾耳貝甲虫肉如科蠃魚螺音魚身而鳥翼音如鴛鴦見則其邑大水又西二百二十里曰鳥鼠同穴之山縣西南山有鳥今在隴西首陽似燕而黃色穿地入數尺鼠在内鳥在外而共處孔鼠同穴鳥名曰䳜鼠名曰鼠鼵如人家鼠而短尾䳜氏地理記云不為牡牝也氏尚書傳曰共為雌雄張其上多白虎白玉渭水出焉而東流注于河華隂縣入河出山東至農其中多鰠魚騷音其状如鱣魚躰有連甲也或作鮎鯉鱣魚大魚也口在頷下動則其邑有大兵則以下語者或脫無從動濫水出于其西檻音西流注于漢水多魮之魚两音如玭其状如覆銚鳥首而魚翼魚尾音如磬石之聲是生珠玉而生出之亦珠母蚌西南三百六十里曰崦嵫之山離騷奄兹两音日没所入山也見其上多丹木其葉如榖其實大如赤符而黑理食之已癉可以禦火其陽多其隂多玉苕若或作水出焉而西流注于海之水出崦嵫山禹大傳曰㳙盤其中多砥礪精爲砥磨石也礪也麄為有獸焉其状馬身而鳥翼人靣蛇尾是好舉人舉人喜抱名曰孰湖有鳥焉其状如鴞而人面蜼身犬尾音誄見中山經尾又作眥蜼猕猴属也音贈遺之遺一其名自號也亦呼耳疑或作設設誤此脫見則其邑大旱凡西次四經自隂山以下至於崦嵫之山凡十九山三千六百八十里其祠祀禮皆用一白鷄祈糈以稲米白管為席右西經之山凡七十七山一萬七千五百一十七里
