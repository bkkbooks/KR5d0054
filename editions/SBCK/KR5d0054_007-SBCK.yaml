body:
  text: 海外西經第七郭氏傳海外自西南陬至西北陬者滅鳥在結匈國北為鳥青赤尾大運山高三百仭在滅鳥北大樂之野夏后啓於此儛九代盤作之今儛也九代馬名儛謂乘兩龍雲盖三層重也曾猶左手操翳也羽葆右手操環䓁為環玉空邊佩玉璜曰璜半璧在大運山北御飛龍登于天吉明啓亦歸蔵鄭母經曰夏后啓筮也仙一曰大遺之野大穆之野大荒經云三身國在夏后啓北一首而三身一臂國在其北一臂一目一鼻孔有黄馬虎文一目而一手竒肱之國竒音覊或作弘在其北其人一臂三目有隂有陽乘文馬文馬即吉良也隂在上陽在下有鳥焉兩頭赤黄色在其旁得之扵豫州界中即壊之不以示人後十年西風至其人善為機巧以取百禽能作飛車從風逺行湯時遣之復作形天與帝至此争神帝斷其首之常羊之山乃以乳為目以臍為口操干戚以舞為無首之民干盾戚斧也是女祭女戚在其北居兩水間戚操魚䱉屬鱓魚祭操爼几肉䳐鳥鳥兩音次瞻其色青黄所經國亡即今梟鵂鶹此應禍之鳥之在女祭北䳐鳥人面居山上一曰維鳥青鳥黄鳥所集丈夫國在維鳥北其為人衣冠帶劔孟採藥從西王殷帝太戊使王而生二子從形中出其父即死是為丈夫民母至此絶粮不能進食木實衣木皮終身無妻女丑之尸生而十日炙殺之在丈夫北以右手鄣其面面蔽十日居上女丑居山之上巫咸國在女丑北右手操青蛇左手操赤蛇在登葆山群巫所從上下也徃來採藥并封在巫咸東其狀如彘前後皆有首黑亦此也今弩弦蛇女子國在巫咸北兩女子居水周之浴出即懐姙矣有黄池婦人入也離騷曰水周於堂下也若生男子三歳輒死周猶繞一曰居一門中軒轅之國在此窮山之際其不壽者八百歳山南邊其國在岷山之南也大荒經曰在女子國北人靣蛇身尾交首上窮山在其北不敢西射畏軒轅之丘不敢向西而射也言敬畏黄帝威靈故在軒轅國北其丘方四蛇相繞樛纒繚繞此諸夭之野音夭妖鸞鳥自歌鳯鳥自舞鳯皇夘民食之甘露民飲之所欲自從也得自在此謂天野也言滋味無所不有所願百獸相與群居在四蛇北其人兩手操卵食之兩鳥居前導之龍魚居在其北狀如狸似狸一角或曰龍魚一曰鰕遐音即有神聖乘此以行九野之野九域一曰鼈魚在夭野北其為魚也如鯉横也鼈音惡白民之國在龍魚北白身被髪體洞白言其人有乘黄其狀如狐其背上有角乘之壽二千歳似狐背上有兩角周書曰白民乘黄天下有道飛黄伏皂即飛黄也淮南子曰肅慎之國在白民北有樹名曰雄雒或作常先入代帝於此取之立者則此木生皮可衣也其俗無衣服中國有聖帝代長股之國在雄常北被髪如中人而臂長二丈以類國在赤水東也長臂人身曰長脚人常長臂人入海中捕魚也推之則此人脚過三丈矣黄帝時至或一曰長脚曰或喬人盖此身有喬國今伎家西方蓐左耳有蛇乘兩龍白毛執見外傳金神也人靣虎
