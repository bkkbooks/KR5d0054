body:
  text: 海内經第十八東海之内北海之隅有國名曰朝鮮天毒其人水居銀錢貨浮屠出此國中也大興四年天竺胡王獻朝鮮今樂浪郡也天毒即天竺國嵮道徳有文書金寳珍偎人愛之音隈偎亦愛也西海之内流沙之中有國名曰壑市郝音西海之内流沙之西有國名曰汜葉濫之汜音如汜流沙之西有鳥山者三水出焉一山也三水同出爰有黄金璿瑰丹貨銀鐵皆流于此中珍竒寳也言其中有雜又有淮山好水出焉流沙之東黑水之西有朝雲之國司之國黄帝妻雷祖生昌意子謂之纍祖産青陽及昌意世本云黄帝娶于西氏之昌意降處若水生韓流荒乾荒即韓流也生帝顓頊竹書云昌意降居若水産帝乾韓流擢首謹耳謹耳未聞擢首長咽人靣豕喙麟身渠股脚也天傳曰渠車輞言跰車渠大如豚止足止取淖子曰阿女生帝顓頊母濁山氏之世本云顓頊昌僕子名流沙之東黒水之間有山名不死之山丘也即員華山青水之東有山名曰肇山有人名曰栢高仙者也栢子高栢高上下於此至于天徃來此山也言翺翔雲天西南黒水之間有都廣之野后稷葬焉里盖天下之其城方三百絶都廣野而直指號中素女所出也離騷曰爰有膏菽膏稻膏黍膏稷味言粢之子菽豆粢粟也好皆滑如膏外傳曰膏百榖自生冬夏播琴播殖方播琴猶耳俗言鸞鳥自歌鳯鳥自儛靈壽實華似竹有枝節靈壽木名也草木所聚殖也在此叢爰有百獸相群爰處羣聚於此此草也冬夏不死南海之内黒水青水之間有木名曰若木華青樹赤若水出焉有禺中之國有列襄之國有靈山有赤蛇在木上名曰蝡蛇木食音如耎弱之耎言不食禽獸也有鹽長之國有人焉鳥首名曰鳥氏人即鳥夷也今佛書中有此有九丘以水絡之繞也絡猶名曰陶唐之丘堯號陶唐有叔得之丘孟盈之丘昆吾之丘子曰昆吾之金此山出名金也尸黒白之丘赤望之丘參衛之丘武夫之丘美石此山出神民之丘神人言上有有木青葉紫莖玄華黄實名曰建木百仭無枝有九欘如斤斸之斸枝回曲也音下有九枸木大則根欋音劬根盤錯也淮南子曰其實如麻子也似麻其葉如芒棠梨也芒木似大皥爰過於此經言庖羲也過黄帝所爲之也言治䕶有窫窳龍首是食人水中在弱有青獸人靣名曰猩猩言西南有巴國巴是今三大皥生咸鳥咸鳥生乘釐乘釐生後照後照是始為巴人始祖為之有國名曰流黄辛氏鄷即也氏其域中方三百里其出是塵土盛也言殷有巴遂山澠水出焉又有朱卷之國有黑蛇青首食象蛇也即巴南方有贑巨人也音感即梟陽人靣長臂黑身有毛反踵見人笑亦笑唇蔽其靣因即逃也又有黑人虎首鳥足兩手持蛇方啗之有羸民鳥足盈音有封豕射殺之大猶也羿有人曰苖民民也二苖有神焉人首蛇身長如轅澤神也大如車轂左右有首頭岐衣紫衣冠旃冠名曰延維蛇委人主得而饗食之伯天下覇諸侯亦見莊周作朱冠齊桓公出田於大澤見之遂有鸞鳥自歌鳯鳥自儛鳯鳥首文曰德翼文曰順膺文曰仁背文曰義見則天下和平也言和又有青獸如莵名曰狗菌之音如朝有翠鳥有孔鳥也孔雀南海之内有衡山嶽南有山音芝有桂山有桂桂或云衡山見本草員似竹有山名三天子之都子之鄣山一本三天南方蒼梧之丘蒼梧之淵其中有九嶷疑音山舜之所葬在長沙零界中谿皆相似故云九疑古者總名山今在零營道縣南其山九蒼梧也其地為北海之内有蛇山者蛇水出焉東入于海有五彩之鳥飛蔽一郷以萬數過蜀都即此鳥也漢宣帝元康元年五色鳥名曰翳鳥駟玉虬而乘翳鳯属也離騷曰又有不距之山巧倕葬其西堯倕音瑞巧工也北海之内有反盗械帶戈常倍之佐名曰相顧之尸危之亦貳負臣伯夷父生西岳西岳生先龍先龍是始生氐羌氐羌乞姓氐羌其苖裔也伯夷父顓頊師今北海之内有山名曰幽都之山黑水出焉其上有玄鳥玄蛇玄豹玄虎見爾雅黑虎名儵玄狐蓬尾反說曰蓬蓬叢也阻留之皮狐文豹有大玄之山有玄丘之民物盡黑也言丘上人有大幽之國幽即居無衣民也穴有赤脛之民正赤色膝已下有釘靈之國其民從膝已下有毛馬蹄善走霧曰馬詩含神日行三百里蹄自鞭其蹄炎帝之孫伯伯同吳權之妻阿女縁婦言之同猶通人姓名也吳權縁婦孕三年身也孕懐是生延殳始為侯名也三子殊殳音延是始為鍾作罄倕作鍾世本云母句為樂風曲制作樂之黄帝生駱明駱明生白馬白馬是為鯀本曰黄帝生即禹父也世頊顓頊生鯀昌意昌意生顓帝俊生禺號禺號生梁梁生番禺是始為舟貨狄作舟世本云共皷番禺生奚仲奚仲生吉光吉光是始以木為車其父子共創作意是以互稱之世本云奚仲作車此言吉光明少皥生般班音般是始為弓矢弓弓矢一噐作者兩人世本云牟夷作矢揮作言般之作是於義有疑此帝俊賜羿彤弓素矰以白羽羽之外傳彤弓朱弓矰矢名之如荼也白羽之矰望以扶下國除患扶助下國言令羿以射道羿是始去恤下地之百艱窮后羿慕羿射故號此名也言射殺鑿齒封豕之属也有帝俊生晏龍晏龍是為琴瑟琴神農作瑟世本云伏羲作帝俊有子八人是始為歌儛帝俊生三身三身生義均義均是始為巧倕是始作下民百巧后稷是播百榖稷之孫曰叔均是始作牛耕犂也始用牛大比赤隂音或作是始為國為國得封禹鯀是始布土均定九州敷土定高山大川布猶敷也書曰禹炎帝之妻赤水之子聽訞生炎居炎居生節並節並生戯噐生祝融氏火正號祝融髙辛祝融降處于江水生共二共工生術噐術噐首方顚平也頭頂是復土穰以處江水祝復所也融之共工生后土后土生噎鳴噎鳴生歳十有二十生名之故云然二子皆以歳名洪水滔天也滔漫鯀竊帝之息壤以堙洪水筮曰滔滔洪水無所止極伯鯀乃以息石息壤息壤者言土自長息無限故可以塞洪水也開長五六里髙二丈即息壤之也以塡洪水漢元帝時臨淮徐縣地踊不待帝命帝令祝融殺鯀于羽郊之郊羽山鯀復生禹不腐剖之以呉刀開筮曰鯀死三歳龍也化為黄帝乃命禹卒布土以定九州復命禹終其功鯀績用不成故山海經終
