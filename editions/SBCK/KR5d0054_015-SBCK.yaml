body:
  text: 大荒南經第十五郭氏傳南海之外赤水之西流沙之東流沙出鍾山也赤水出崑崙山有獸左右有首名曰䟣踼黜惕兩音出名國有三青獸相并名曰而俱至者盖謂此也言體合為一也公羊傳所云有阿山者南海之中有汜天之山赤水窮焉此山也流極於赤水之東有蒼梧之野舜與叔均之所葬也均也舜叔均啇留死亦葬焉基今在九疑之中廵狩死於蒼梧而葬之啇圴因爰有文貝貝也即紫離俞朱即離乆鶹也即鵂鷹賈鷹属賈亦委維蛇也即委熊羆象虎豹狼視肉有滎山滎水出焉黑水之南有玄蛇食麈吞鹿亦此今南方蚦蛇有巫山者西有黄鳥帝藥八齋藥在此也天帝神仙黄鳥於巫山司此玄蛇之也言主大荒之中有不庭之山滎水窮焉有人三身帝俊妻娥皇生此三身之國所出也盖後裔姚姓黍食使四鳥姓也姚舜有淵四方四隅皆逹皆旁通也言淵四角北屬黑水南屬大荒連也屬猶北旁名曰少和之淵南旁名曰從淵之騘音騘馬舜之所浴也中澡浴也言舜嘗在此又有成山甘水窮焉極此中也甘水出甘山有季禺之國顓頊之子食黍頊之裔子也言此國人顓有羽民之國其民皆生毛羽有民之國其民皆生生也即大荒之中有不姜之山黑水窮焉崑崙山黑水出又有賈山汔水出焉又有言山又有登備之山所從上下者也即登葆山羣巫有恝恝之山契之契音如券又有蒲山澧禮音水出焉又有隗山囂音隗其西有丹其東有玉又南有山漂水出焉栗音有尾山有翠山翠鳥也言此山有有盈民之國於姓黍食又有人方食木葉有不死之國阿姓甘木是食樹食之不老甘木即不死大荒之中有山名曰去痓南極果北不成去痓果如音痓未詳風痓之南海渚中有神人面珥兩青蛇踐兩赤蛇曰不廷胡余名耳一神有神名曰因因乎南方曰因乎夸風曰乎民二名亦有處南極以出入風有襄山又有重隂之山有人食獸曰季釐帝俊生季釐故曰季釐之國有緡淵昬音少昊生倍伐倍伐降處緡淵有水四方名曰俊壇因名舜壇也水狀似土壇有臷民之國黄色為人帝舜生無降臷處是謂巫臷民巫臷民朌姓食榖不績不經服也布帛也言自然有不稼不穡食也之為稼収之為穡言五榖自生也種爰有歌舞之鳥鸞鳥自歌鳯鳥自舞爰有百獸相群爰處百榖所聚大荒之中有山名曰融天海水南入焉有人曰鑿齒羿殺之之也射殺有蜮山者有蜮民之國惑音桑姓食黍射蜮是食狐也蜮短死此山出之亦以名云似鼈含沙射人中之則病有人方扜弓射黄蛇也音扞挽紆名曰蜮人有宋山者有赤蛇名曰育蛇有木生山上名曰楓木楓木尤所棄其桎梏已摘棄其械化而為樹也尤為黄帝所得械而殺之是謂楓木香樹即今楓有人方齒虎尾名曰祖狀之尸如音之柤柤棃有小人名曰焦僥之國三尺皆長幾姓嘉榖是食大荒之中有山名㱙塗之山朽音青水窮焉崑崙青水出有雲雨之山有木名曰欒栾音禹攻雲雨其林木攻謂槎伐有赤石焉生欒此木於赤石之上言山有精靈復變生黄本赤枝青葉群帝焉取藥皆為神藥言樹花實有國曰顓頊生伯服食黍有鼬姓之國柚之柚音如橘有苕山又有宗山又有姓山又有壑山又有陳州山又有東州山又有白水山白水出焉而生白淵昆吾之師所浴也水也出善金二文有異莫知所辨測昆吾古王者号音義曰昆吾山名溪有人名曰張弘在海上捕魚海中有張弘之國肱人疑非或曰即竒食魚使四鳥有人焉鳥喙有翼方捕魚於海大荒之中有人名曰驩頭鯀妻士敬士敬子曰炎融生驩頭驩頭人面鳥喙有翼食海中魚杖翼而行不翅之用而已可以飛倚杖維冝苣穋楊是食其種穋䄫黑皆子說地所宜云作禾旁起秬虬三音禾也苣黒黍今字有驩頭之國帝堯帝嚳帝舜葬於岳山山也即秋爰有文貝離俞乆鷹賈延維視肉熊羆虎豹朱木赤支青華玄實有申山者大荒之中有山名曰天臺高山海水入焉東南海之外甘水之間有羲和之國有女子名曰羲和方浴日於甘淵啟筮曰空桑之蒼蒼八極之既張羲和盖天地始生主日月者也故上天一明一晦有夫羲和之子出于湯谷故堯因此乃有夫羲和是主日月職出入以為晦明又曰瞻彼之象而掌之沐浴運轉之於甘水中以効其出入湯谷而立羲和之官以主四時其後世遂為此國作日月世不失職耳虞淵也所謂羲和者帝俊之妻生十日以日名名之言生十子各日數十也故言生十有盖猶之山者其上有甘柤枝幹皆赤黄葉白華黒實東又有甘華枝幹皆赤黄葉有青馬有赤馬名曰三騅有視肉有小人名曰菌人菌之菌音如朝有南之山爰有遺玉青馬三騅視肉甘華百穀所在
