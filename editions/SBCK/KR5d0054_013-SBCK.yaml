front:
  text: 海内東經第十三
  hash: sha256:24a40f2fb8989336490a6d36c98bac71602e076f0cfd4ad6465de68d98e60147
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_SBCK_013-1a}
body:
  text: 郭氏傳海内東北陬以南者鉅燕在東北陬國在流沙中者埻端敦音璽㬇作繭㬉音喚或在崑崙墟東南一曰海内之郡不為郡縣在流沙中國在流沙外者大夏為數十國地和温冝五榖大夏國城方二三百里分竪沙居繇遥音月支之國馿尾即羬羊也小月支天竺國皆月支國多好馬羙果有大尾羊如云附庸西胡白玉山在大夏東蒼梧在白玉山西南皆在流沙西崑崙墟東南崑崙山在西胡西皆在西北志崑地理有西王母祠也崙山在臨羌西又雷澤中有雷神龍身而人頭皷其腹在吳西有堯冡今城陽在雷澤華胥之而生伏羲靈臺雷澤在此也河圖曰大迹都州在海中一曰郁州自蒼梧從南徙來上皆有南今在東海胊縣界世傳此山郁音欝方物也琅琊臺在渤海間琅瑘之東嶢特起狀如髙臺此即今琅瑘在海邊有山嶕勾踐入覇中國之所都琅瑘臺也琅瑘者越王其北有山一曰在海間韓鴈在海中都州南始鳩在海中轅厲南鳥名也國名或曰㑹稽山在大楚南岷二江首大江出汶山郡犍為至江陽東北經巴東建平宜都今江出汶山郡升遷縣岷山東南經蜀東北經淮南下邳至廣陵郡入海南郡江夏弋陽安豐至廬江南界北江出曼山南江出高山髙山在城都西入海在長州南浙江出三天子都在其東縣南蠻中東入海今錢唐按地里志浙江出新安黟歙也浙音折浙江是也黟即在閩西北入海餘暨南今為永興縣餘暨縣属㑹稽廬江出三天子都入江彭澤西在尋陽彭澤縣彭澤今彭蠡也一曰天子鄣淮水岀餘山餘山在朝陽東義鄉西入海淮浦北淮今南譙國下邳至廣陵縣入海朝陽縣今属新野水岀義陽平氏縣桐栢山山東北經汝南汝隂淮湘水岀舜葬東南陬西環之營道縣陽湖山入江環統也今湘水岀零陵入洞庭下中有包山下有洞庭穴道潜行水底云無洞庭地穴也在長沙巴陵今吴縣南大湖為地脉所不通號一曰東南西澤漢水出鮒魚之山漢水出武都沮縣東狼谷經漢中書曰嶓冡導漾東流為漢案水經縣入江别為沔水又為滄浪之水魏興至南鄉東經襄陽至江夏安陸帝顓頊葬于陽九嬪葬于隂四蛇衛之衛守山下言有四蛇濛水出漢陽西入江聶陽西屬朱提漢陽縣温水出崆峒崆峒山在臨汾南入河華陽北在京兆今温水臨汾縣属平陽隂盤縣水常温也頴水出少室少室山在雍氏南入淮西鄢北出河南今頴水南下蔡入淮鄢今鄢陵縣属頴川陽城縣乾山東南經頴川汝隂至淮一曰緱氏南音鈎縣属河汝水出天息山在梁勉郷西南入淮極西北出南陽今汝水城頴川汝南至汝隂褒信縣入淮淮極地名魯陽縣大孟山東北至河南梁縣東南經襄一曰淮在期思北属弋陽期思縣涇水出長城北山山在郁致長垣北郅音桎皆縣名也北入渭戯北平扶風至京兆高陵縣入渭戯地名今新豐今涇水出安定朝那縣西笄頭山東南經新也縣渭水出鳥䑕同穴山東注河入華隂北今在隴西首鳥鼠同穴山扶風始平京兆弘農華隂縣入河陽縣渭水出其東經南安天水略陽白水出蜀而東南注江緑從臨洮之西西傾山來經色㣲白濁今在梓童白水縣至漢夀縣入潜沓中東流通隂平入江州城下属巴郡江州縣沅水山出郡鐔城西縣今属武陵音潯象郡今日南也鐔城入東注江入下雋西沙音昨兖反下雋縣今属長合洞庭中出牂牁且蘭水經曰沅水過臨沅縣南又東至長沙下雋縣縣又東北至鐔城縣為沅水又東贑水出聶都東山野縣西北音感也今贑水出南康南東北注江入彭澤西泗水出吳東北而南西南過湖陵西而東南注東海入淮隂北陸縣東南經沛國彭城下邳至臨淮今泗水出魯國下縣西南至髙平胡入淮下相縣鬱水出象郡而西南注南海入湏陵東南肄水出臨西南習之肄音如肄而東南注海入番禺西禺番之城下也縣属南海越潢水出桂陽西北山黄音東南注肄水入敦浦西洛水出洛西山東北注河入成皐之西熊耳案水經書云道洛自河南鞏縣入河成臯縣亦属河南也洛水今出上洛冢嶺山東北經弘農至汾水出上窳北愈音而西南注河入皮氏南太原陽今汾水出陽至河東汾隂入河皮氏縣属平陽故汾陽縣東南經陽西南經西河平沁水出井陘山東東南注河入懷東南内北有井陘山懷縣属河内河濟水出共山南東丘㳟同共與絶鉅鹿澤鹿今在髙平絶猶截度也鉅注渤海入齊琅槐東北留至潛隂北東北至髙平東今濟水自滎陽卷縣東經陳又與水經違錯以為凡山川或有同名而異實或同北經濟南至樂安博昌縣入海今碣石也諸水所出代久逺古今變易語有楚夏名號不同未得詳也實而異名或一實而數名似是而非似非而是且歴潦水出衛皐東山小潦水所出西河注大潦音遼出塞外衛臯山玄莵髙句驪縣有潦東南注渤海入潦陽属潦東潦陽縣虖沲水出陽城南而西至陽曲北而東注渤海河經陽陽曲縣皆属太原間樂城東北注渤海也入越章武北郡名章武漳水出山陽東東注渤海入章武南亦有漳水新城汴隂縣建平元年四月丙戌待詔太常属臣望校治侍中光禄勳臣龔侍中奉車都尉光禄大夫臣秀領主省
