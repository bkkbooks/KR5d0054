front:
  text: 南山經第一
  hash: sha256:484b3a9ca86991860de998617c2bf294cb8e77fd00d345b0d84de9a606e884bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_SBCK_001-1a}
body:
  text: 郭氏傳南山經之首曰䧿山其首曰招摇之山臨于西海之上西頭濱西海也在蜀伏山山南之多桂二尺餘廣數寸桂葉似枇杷長無雜木吕氏春秋曰招揺之桂味辛白花叢生山峯冬夏常青間多金玉有草焉其状如韭云霍山亦多之璨曰韭音九爾雅而青花其名曰祝餘桂荼或作食之不飢有木焉其状如榖而黑理構名榖者以其實如榖也榖楮也皮作紙璨曰榖亦名其花四照燄也若言有光此也見離騷經木華赤其光照地亦其名曰迷穀佩之不迷有獸焉其状如禺而白耳尾今江南山中多有禺似猕猴而大赤目長牛形或作猴皆失之也禺字音遇者不了此物名禺作牛字圗亦作伏行人走其名曰狌狌食之善走足亦此也見京房易生生禺獸状如猿伏行交麗之水出焉作几音而西流注于海其中多育沛詳未佩之無瘕疾病也瘕蟲又東三百里曰堂常一作庭之山多棪木連其子棪别名可食音剡似柰而赤多白猿捷色有黑有黄鳴其聲哀今猿似猕猴而大臂脚長便多水玉玉磊砢赤松子所服見列仙傳水玉今水精也相如上林賦曰水多黄金又東三百八十里曰猨翼之山其中多怪獸水多怪魚曰徐偃王好怪没深水而得怪魚入深凡言怪者皆謂皃状倔竒不常也尸子者多列扵庭山而得怪獸多白玉多蝮虫上有針大者百餘蝮虫色如綬文鼻虫古虺字斤一名反鼻多怪蛇多怪木不可以上又東三百七十里曰杻陽之山紐音其陽多赤金也銅其隂多白金為陽山北為隂銀也見爾雅山南有獸焉其狀如馬而白首其文如虎而赤尾其音如謡歌聲如人其名曰鹿蜀佩之冝子孫其皮尾佩謂帶怪水出焉而東流注于憲翼之水其中多其狀如而鳥首虺尾銳虺尾其名曰旋其音如判木木聲如破佩之不聾可以為底不可為一作底猶病愈也底躪也為猶治也外傳曰疾東三百里祗山蔕音多水無草木有魚焉其狀如牛陵居蛇尾有翼其羽在魼下脅亦作其音如牛天子傳曰天子之狗執虎豹荘子曰執犂之狗謂此牛也穆其名曰鯥六音冬死而夏生言其蟄無所知如死耳此亦蟄也謂之死者食之無腫疾又東四百里曰亶爰之山蟬亶音多水無草木不可以上峭也言崇有獸焉其狀如狸而有髦其名曰髦或作髪或作沛自為牝牡食者不妬自為雌雄而荘子亦曰自為雌雄化今狚猪亦又東三百里曰基山其陽多玉其隂多怪木有獸焉其狀如羊九尾四耳其目在背其名曰猼訑訑一作陁施二音佩之不畏恐畏不知有鳥焉其狀如雞而三首六目六足三翼其名曰敞孚二音急性食之無卧少眠使人又東三百里曰青丘之山云即上林賦云秋田於青亦有青丘國在海外水丘其陽多玉其隂多青䨼音瓠䨼黝属有獸焉其狀如狐而九尾尾狐即九其音如嬰兒食人食者不蠱令人不噉其肉或曰蠱蠱毒逢妖邪之氣有鳥焉其如鳩其音若呵呵呼聲如人相名曰灌灌濩濩或作佩之不惑英水出焉南流注于即翼之澤其中多赤鱬懦音其如魚而人面其音如鴛鴦食之不疥疾一作又東三百五十里曰箕尾之山其尾踆于東海多沙石臨海上音存踆古蹲字言汸水出焉芳音而南流注于淯育音其中多白玉凡䧿山之首自招揺之山以至箕尾之山凡十山一千九百五十里其神狀皆鳥身而龍首其祠之禮毛官曰陽杞用騂牲之毛言擇牲取其毛色也周用一璋玉瘞璋瘞埋半圭為也糈用稌米音壻稌稌稻也他覩反糈或作疏非也糈祀神之米名先吕反今江東音所一一壁稻米白菅為席也音間菅茅属南次二之首曰柜山矩音西臨流黄北望諸毗東望長右名皆山英水出焉西南流注于赤水其中多白玉有玉貟折者有珠尸子曰水方折者多丹粟如粟也細丹砂有獸焉其狀如豚有距其音如狗吠其名曰狸力見則其縣多土功有鳥焉其如䲭而人手䲭音處脂反其脚如人手其音如痺詳未其名曰鴸株音其鳴自號也見則其縣多放士作效也放放還或東南四百五十里曰長右之山無草木多水有獸焉其状如禺而四耳其名長右因以名之以山出此獸其音如吟吟聲如人呻見則郡縣大水又東三百四十里曰堯光之山其陽多玉其隂多金有獸焉其状如人而彘鬛穴居而冬蟄其名曰猾裏兩音滑懷其音如斵木木聲如人斫見則縣有大繇或曰其縣謂作役也亂又東三百五十里曰羽山山即鯀所殛處計此道里今東海柷其縣西南有羽似非也不相應其下多水其上多雨無草木多蝮虫也蚖又東三百七十里曰瞿父之山劬音無草木多金玉又東四百里曰句餘之山無草木多金玉餘姚縣南今在㑹稽為名云見張氏地里志句章縣北故此二縣因此又東五百里曰浮玉之山北望具區南太湖也尚書具區今吳縣西震澤謂之東望諸毗名水有獸焉其状如虎而牛尾其音如吠犬其名曰彘是食人苕水出于其隂北流注于具區其中多鮆魚中今饒之一名刀魚音祚啓反鮆魚狹薄而長頭大者尺餘太湖又東五百里曰成山四方而三壇累也成亦重耳形如人築壇相其上多金玉其下多青䨼䦠水出焉音而南流注于作一于西流注虖勺作多下同虖音呼勺或其中多黄金金如糠在沙中今永昌郡水出出黄金玉英尸子曰清水又東五百里曰會稽之山四方南上有禹及井今在㑹稽郡山隂縣其上多金玉其下多砆石湘出之赤地白文色蘢葱砆武大石似玉今長沙臨明不分勺水出焉而南流注于湨鵙音又東五百里曰夷山無草木多沙石湨浿一作水出焉而南流注于列塗又東五百里曰僕勾夕一作之山其上多金玉其下多草木無鳥獸無水又東五百里曰咸隂之山無草木無水又東五百里曰鹿吳之山上無草木多金石澤更之水出焉而南流注于滂水水有獸焉名曰蠱雕作纂蠱或其状如雕而有角其音如嬰兒之音是食人東五百里曰漆吳之山無草木多博石無玉博碁石可以為處于海東望丘山其光載出載入所潜燿神光之是惟日次所次舍是日景之凡南次二經之首自柜山至于漆吳之山凡十七山七千二百里其神状皆龍身而鳥首其祠毛用一璧瘞糈用稌也稲穬南次三經之首曰天虞之山其下多水不可以上東五百里曰禱過之山其上多金玉其下多犀兕似犀頂上一在額上一在鼻上在鼻上者小而不墮食角水牛猪頭痺脚脚似象有三蹄大腹黑色三角一在似水牛青色一角重三千斤也好噉口中常洒血沫兕亦多鼻大者牙長一丈象獸之最大者長畜淫子性妬不有鳥焉其状如鵁尾音骹箭之骹鵁似鳬而小脚近而白首三足手或作人面其名曰瞿如劬音其鳴自號也泿水出焉銀音而南流注于海其中有虎蛟足龍属蛟似蛇四其状魚身而蛇尾其音如鴛鴦食者不腫可以已痔又東五百里曰丹穴之山其上多金玉丹水出焉而南流注于㴾海曲﨑頭也㴾海海岸有鳥焉其状如雞五采而文名曰鳳皇首文曰徳翼文曰義背文曰禮膺文曰仁腹文曰信是鳥也飲食自然自歌自舞見則天下安寧與此有異廣雅云鳯鷄頭燕頷蛇頸背魚尾漢時鳳鳥數出髙五六尺五采莊周鳳文字雄曰鳯雌曰凰又東五百里曰發爽䘮或作之山無草木多水多白猿汎水出焉而南流注于㴾海又東四百里至于旄山之尾其南有谷曰育遺隧或作多恠鳥鴟雀皆怪鳥之属也廣雅曰鵽離鷦朋爰居凱風自是出南風凱風又東四百里至于非山之首其上多金玉無水其下多蝮虫又東五百里曰陽夾之山無草木多水又東五百里曰灌湘之山上多木無草多怪鳥無獸射之山一作灌湖又東五百里曰鷄山其上多金其下多丹雘者或曰雘赤色書音尺蠖之蠖雘羙丹也見尚黒水出焉而南流注于海其中有鱄魚之團音團扇其状如鮒而彘毛其音如豚見則天下大旱又東四百里曰令丘之山無草木多火其南有谷焉曰中谷條風自是出風至出繫督逋留東北風為條風記曰條有鳥焉其状如梟人面四目而有耳其名曰娱音其鳴自號也見則天下大旱又東三百七十里曰侖者之山論一音倫音論之其上多金玉其下多青䨼有木焉其状如穀而赤理其汗如漆其味如飴食者不飢可以釋勞其名曰白䓘蘇睪蘇或作睪廣雅音羔一名白䓘見可以血玉玉作光彩血謂可用染又東五百八十里曰禺槀之山多怪獸多大蛇東五百八十里曰南禺之山其上多金玉其下多水有穴焉水春輙入夏乃出冬則閉佐水出焉而東南流注于海有鳯皇鵷鶵属亦鳳凡南次三經之首自天虞之山以至南禺之山凡一十四山六千五百三十里其神皆龍身而人面其祠皆一白狗祈禱也祈請糈用稌右南經之山志大小凡四十山萬六千三百八十里
