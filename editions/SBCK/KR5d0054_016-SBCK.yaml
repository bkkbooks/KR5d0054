front:
  text: 大荒西經第十六郭氏傳西北海之外大荒之隅有山而不合名曰不周負子之山天維絶地柱折故今此山缺壊不周匝也淮南子曰昔者共工與顓頊争帝怒而觸不周有兩黄獸守之有水曰寒暑之水水西有濕山水東有幕山莫音有禹攻共工國山啓筮曰共工人面蛇身朱髪也言攻其國殺其臣相柳扵此山有國名曰淑士顓頊之子高陽氏也言亦出自有神十人名曰女媧之腸媧之腹或作女化為神處栗廣之野而帝者人面女媧古神女為此神栗廣野名媧音爪蛇身一日中七十變其腹化横道而處道也言斷有人名曰石夷來風曰韋本也來或作處西北隅以司日月之長短晷度之節言察日月有五彩之鳥有冠名曰㹥鳥夣鳥即此爾雅云㹥也有大澤之長山有白民之國西北海之外赤水之東有長脛之國三丈脚長有西周之國姓食榖有人方耕名曰叔均帝俊生后稷為嚳俊宜生后稷也嚳弟二妃稷降以百榖稷之弟曰台蠒胎音生叔均叔均是代其父及稷播百榖始作耕有赤國妻氏有山西海之外大荒之中有方山者上有青樹名曰柜格之松音矩木名日月所出入也西北海之外赤水之西有先民之國食榖使四鳥有北狄之國黄帝之孫曰始均始均生北狄有芒山有桂山有榣山木因名云耳此山多桂及榣其上有人號曰太子長琴顓頊生老童氏謂之女禄産老童也世本云顓頊娶于滕墳老童生祝融人正號曰祝融也即童黎也高辛氏祝融生太子長琴是處摇山始作樂風風曲也創制樂有五彩鳥三名一曰皇鳥一曰鸞鳥一曰鳯鳥有蟲狀如莬胷以後者裸不見不見其祼露言皮色青故處青如猨狀似猨狀又大荒之中有山名曰豐沮玉門日月所入有靈山巫咸巫即巫朌巫彭巫姑巫眞巫禮巫抵巫謝巫羅十巫從此升降百藥爰在山采之也群巫上下此西有王母之山壑山海山靈之山皆群大有沃之國饒沃也言其土沃民是處沃之野鳯鳥之是食甘露是飲凡其所欲其味盡存此無所不備言其所願滋味爰有甘華甘柤白桞視肉三騅璇瑰瑶碧曰枝斯璿瑰校回二音琁瑰亦玉名穆天子傳白木琅玕有文木亦黑木也樹色正白今南方白丹青丹契曰王者徳至山而又有黒丹也孝經援神名亦猶黒白黄皆云丹也黑丹出然則丹者别是彩多銀䥫鸞鳥自歌鳯鳥自舞爰有百獸相群是處是謂沃之野有三青鳥赤首黑目一名曰大一名少黎音一名曰青鳥母所使皆西王也有軒轅之臺射者不敢西嚮射畏軒轅之臺黄帝敬難神之大荒之中有龍山日月所入有三澤水名曰三淖昆吾之所食也氏之所食亦此也穆天子傳曰滔水濁繇有人衣青以蔽面䄂名曰女丑之尸有女子之國盡東界間其耆王頎至沃沮國東一國在大海中純女無男即此國也老云國人常乘船捕魚遭風見吹數十日有桃山有䖟山有桂山有于土山有丈夫之國婦人也其國無有弇州之山五彩之鳥仰天嘘天張口名曰鳴鳥爰有百樂歌儛之風樂歌儛風曲爰有百種伎有軒轅之國面蛇身其人人江山之南棲為吉為棲吉者言無凶夭即窮山之際也山居不壽者乃八百歳千歳壽者數西海陼中有神人面鳥身珥兩青蛇踐兩赤蛇名曰弇兹大荒之中有山名曰日月山天樞也呉姖天門日月所入有神人面無臂兩足反屬於頭上名曰嘘啼也言嘘顓頊生老童老童生重及氏謂之驕福産重及世本云老童娶於根水帝令重獻上天令卬下地頊乃命南正重司天以古者人神雜擾無别顓上夭實下地獻卬義未詳也屬神命火正司地以屬民重實下地是生噎處於西極以行日月星辰之行次之度數次舍也主察日月星辰有人反臂名曰天虞虞也亦尸有女子方浴月帝俊妻常羲生月十有二此始浴之浴日同義與羲和有玄丹之山黒出也丹有五色之鳥人面有髪爰有青鴍文音黄鷔敖音青鳥黄鳥其所集者其國亡有池名孟翼之攻顓頊之池姓名也孟翼人大荒之中有山名曰鏖鏊鉅如敖鏊音日月所入者有獸左右有首名曰屏蓬有輕重耳即并封也語有巫山者有壑山者有金門之山有人名曰黄姖之尸有比翼之鳥有白鳥青翼黄尾玄喙鳥竒有赤犬名曰天犬其所下者有兵星長十數丈其疾如風其聲如雷其光如周書云天狗所止地盡傾餘光燭天為流吠過梁國者是也電呉楚七國反時西海之南流沙之濵赤水之後黑水之前有大山名曰崑崙之丘有神人面虎身有文有尾皆白處之其言為㸃駮尾以白其下有弱水之淵環之勝鴻毛其水不其外有炎火之山投物輒然千里許有火山國其山雖霖雨火常今去扶南東萬里有耆薄國東復五以毛作布今之火幹布是也即此山之然火中有白鼠時出山邉求食人捕得之有人戴勝虎齒有豹尾穴處名曰西王母母居崑崙之山西山河圖玉版亦曰西王之右曰西王母之山也然則西王母雖以崑崙之宫經曰西王母居玉山穆天子傳曰乃紀名迹于弇山一山也故記事者各舉所見而言之亦自有離宫别窟逰息之處不專住此山萬物盡有大荒之中有山名曰常陽之山日月所入有寒荒之國有二人女祭女薎或持爼或持觶有壽麻之國壽府此懷闒耳吕氏春秋曰南服南岳娶州山女名曰女䖍女䖍生季格季格生壽麻壽麻正立無景疾呼無嚮也列仙傳曰玄俗無景言其禀形氣有異於人爰有大暑不可以徃殺人也言炙有人無首操戈盾立名曰夏耕之尸尸之亦行天故成湯伐夏桀于章山克之山名于章斬耕厥前前者頭亦在耕既立無首走厥咎罪也逃避乃降于巫山今在建平巫縣自竄于巫山巫山有人名曰呉回竒左是無右臂融弟亦為火正也即竒肱也呉回祝有盖山之國有樹赤皮支幹青葉名曰朱木威木也或作朱有一臂民人見河圖玉版北極下亦有一脚大荒之中有山名曰大荒之山日月所入有人焉三靣是顓頊之子三靣一臂臂也無左三靣之人不死頭三言人復有一破船隨波岀在海岸邊上有一人項中復有邉各有靣也玄莬太守王頎至沃沮國問其耆老云人也吕氏春秋曰一臂三靣之郷也靣與語不觧了不食而死此是兩靣是謂大荒之野西南海之外赤水之南流沙之西有人珥兩青蛇乘兩龍名曰夏后開開上三嬪于天美人于天帝嬪婦也言獻得九辯與九歌以下之也開筮曰昔彼九㝠是與帝辯同皆天帝樂名也開登天而竊以下用與九歌以國于下義具見於歸蔵宫之序是為九歌又曰不得切辯此天穆之野高二千仭維若陽居天穆之陽也竹書曰顓頊産伯鯀是開焉得始歌九招曰夏竹書九招也后開舞有互人之國魚身人靣炎帝之孫神農炎帝名曰靈恝契之契音如券靈恝生互人是上下于天雲雨也言乘有魚偏枯名曰魚婦顓頊死即復蘇變化也言其人風道北來天乃大水泉韓非曰玄鶴二八道南方而來言泉水得風暴溢出道尤從也蛇乃化為魚是謂魚婦顓頊死即復蘇人死復蘇其半為魚盖謂此也淮南子曰后稷龍在建木西其有青鳥身黄赤足六首名曰鳥觸音有大巫山有金之山西南大荒之中隅有徧勾常羊之山
