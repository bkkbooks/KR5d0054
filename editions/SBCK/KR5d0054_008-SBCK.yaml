body:
  text: 海外北經第八郭氏傳海外自東北陬至西北陬者無䏿之國作綮音啓或在長股東為人無䏿人穴居食土䏿肥腸也其朽死百廿歳乃復更生無男女死即埋之其心不鍾山之神名曰燭隂九隂因名云燭龍也是燭視為晝暝為夜吹為冬呼為夏不飲不食不息息為風息也息氣身長千里在無䏿之東其為物人靣蛇身赤色居鍾山下子曰淮南一足龍身一目國在其東一目中其靣而居一曰有手足柔利國在一目東為人一手一足反膝曲足居上脚一卷曲也一手反一云留利之國人足反折共工之臣曰相栁氏九州者共工覇九首以食于九山自食頭各貪難饜一山之物言相栁之所抵厥為澤谿也音撅抵觸厥掘禹殺相桞其血腥不可以樹五穀種禹厥之三仭三沮之而掘塞血膏浸潤壞地上三沮滔言其乃以為衆帝之臺積土以為臺觀言地潤濕唯可在崑崙之北在海外者此崑崙山柔利之東相桞者九首人面蛇身而青不敢北射畏共工之臺臺在其東臺四方隅有一蛇虎色首衝南方向也衝猶深目國在其東為人舉一手一目曰一作在共工臺東無膓之國在深目東南一作其為人長而無膓大腹内為人長物通過無膓所食之聶耳之國在無腸國東使兩文虎為人兩手聶其耳持之也音諾頰反言耳長行則以手攝縣居海水中邑也縣猶及水所出入竒物有之言盡規兩虎在其東夸父與日逐走入日入也逐音胄言及日於將渴欲得飲飲於河渭河渭不足北飲大澤未至道渴而死弃其杖化為鄧林豈以走飲哉寄用於走飲其幾乎不疾而速不夸父者盖神人之名也其及日景而傾河渭謝寄鄧林而遯形惡得尋其靈化哉行而至者矣此以一體為萬殊存亡代愽父國在聶耳東其為人大右手操青蛇左手操黄蛇鄧林在其東二樹木一曰父禹所積石之山在其東河水所入注塩澤從塩澤復行南出於此山而河出崑崙而潜行地下至葱嶺復出石言時有壅塞故導利以通之為中國河遂注海也書曰導河積拘纓之國在其東一手把纓纓也或曰纓冝作廮言其人常以一手持冠一曰利纓之國尋木長千里在拘纓南生河上西北跂踵國在拘纓東企音其為人大兩足亦大跟不着地其人行脚僥跂踵重譯欵塞也也孝經鈎命訣曰焦一曰大踵華黄百果所生在兩山夾上谷二大丘居中名曰平丘北海内有獸其狀如馬名曰騊駼見爾雅陶塗兩音有獸焉其名曰駮狀如白馬鋸牙食虎豹兹白若白馬鋸牙周書曰義渠兹白説與爾雅同食虎豹案此二有素獸焉狀如馬名曰蛩蛩鉅虚也即蛩蛩天子傳音卭一走百里見穆有青獸焉狀如虎名曰羅羅北方禺彊人面鳥身珥兩青蛇踐兩青蛇神也莊周字玄水云北方禺彊黒身手足乘兩龍曰禺彊立扵北極一曰禺京一本
