body:
  text: 海内西經第十一郭氏傳海内西南陬以北者貳之臣曰危危與貳殺窫窳帝乃梏之䟽屬之山也音谷梏猶繋縳桎其右足械桎反縳兩手與髪縳之也并髪合繋之山上木在開題西北室中得一人徒裸被髪反縳漢宣帝使人上郡發盤石石大驚於是時人爭學山海經矣論者多以為是其尸械一足以問群臣莫能知劉子政案此言對之宣帝氣出於不然不可以常運推不可以近數揆矣魏時象非真體也意者以靈怪變化論難以理測物禀異氣數月而能語狀如甘許人送京師郭太后愛養有人發故周王者得殉女子不死不生數日時有哀思哭泣一年餘而死即此也之恒在左石十餘年太后崩此女大澤方百里群鳥所生及所觧乳觧之毛羽百鳥於此生在鴈門北鴈門山鴈出其間在髙栁北髙栁在代北后稷之葬山水環之之野在廣都在氐國西流黄酆氏之國中方三百里城内言國有塗四方中有山道塗在后稷葬西流沙出鍾山西行又南行崑崙之墟西南入海黑水之山流沙者形如月生五日也今西海居延澤尚書所謂東胡在大澤東間也在岩赤水之際非仁羿莫能上岡之巖有才藝如羿言非仁人及請藥西王母亦言其得道也羿或作聖者不得登此山之剛嶺巉岩也羿嘗赤水出東南隅以行其東北西南流注南海厭火東河水出東北隅以行其北西南又入渤海又出海外即西而北入禹所導積石山之故云導河積石禹治水復决䟽出洋水翔音黑水出西北隅以東東行又東北南入海羽民南弱水青水出西南隅以東又北又西南過畢方鳥東至條枝國臨西海長若傳聞有弱水西王母云東夷西域傳烏弋國去長安萬五千餘里西行可百餘日子云弱水岀窮石窮石今之西郡那冉盡其别之傳亦曰長城外數千里亦有弱水皆所未見也准南耳源崑崙南淵深三百仭淵靈開明獸身大虎作身或而九首皆人靣東嚮立崑崙上乾精瞪視崑崙威振百靈天獸也銘曰開明爲獸禀資開明西有鳯凰鸞鳥皆戴蛇踐蛇膺有赤蛇開明北有視肉珠樹文玉樹玉樹五彩玗琪樹属也吳天玗琪赤王莖葉紫色詰曲傾靡有光彩即玉樹之也于其兩璽元年臨海郡吏伍曜在海水際得石樹髙三尺餘音不死樹生也言長鳯凰鸞鳥皆戴音戈盾也又有離朱木禾栢樹甘水泉也即醴聖木智聖也食之令人曼兌詳未一曰挺木牙交琁玉也淮南作琁樹開明東有巫彭巫抵巫陽巫履巫凡巫相世本曰巫皆神醫也曰帝告巫陽彭作醫楚詞夾窫窳之尸皆操不死之藥以距之距為求更生却死氣窫窳者蛇身人靣貳負臣所殺也服常樹其上有三頭人伺琅玕樹子似珠爾雅曰西服常木未詳琅玕頭遞卧遞起以伺琅玕與玗琪子謂此人也北之羙者有崑崙之琅玕焉莊周曰有人三開明南有樹鳥六首蛟脚龍也蛟似蛇四蝮蛇蜼豹鳥秩樹未詳木名於表池樹木池即華池也言列樹以表誦鳥未詳也鳥名形鶽穆天雕也青雕音竹荀之筍子傳曰爰有白鶽視肉
