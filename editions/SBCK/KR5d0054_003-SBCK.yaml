  text: 北山經第三
  hash: sha256:885de42d3c8f0bab76e32d02b1b0c3396ec922cde4e8c3e6795b8c464aa0a294
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_SBCK_003-1a}
body:
  text: 郭氏傳北山經之首曰單狐之山多机木糞稲田出蜀中音机木似榆可燒以飢其上多華草漨水出焉逢音而西流注于泑水其中多芘石文石又北二百五十里曰求如之山其上多銅其下多玉無草木滑水出焉而西流注于諸毗之水毗山也水出諸其中多滑魚其状如鱓赤背蛇音善鱓魚似其音如梧枝梧聲如人相之吾音吾子食之已疣也疣贅其中多水馬其状如馬文臂牛尾四年燉煌渥洼水出焉以為靈瑞者即此也臂前脚也周禮曰馬黑脊而班臂膢漢武元狩其音如呼呌呼如人又北三百里曰帶山其上多玉其下多青碧有獸焉其状如馬一角有錯也或作暦言角有甲錯其名曰䑏䟽歡音可以辟火有鳥焉其状如烏五彩而赤文名曰鵸䳜已上疑同名有此鳥是自為牝牡食之不疽病也無廱疽彭水出焉而西流注于芘湖之水其中多儵魚由音其状如鷄而赤毛三尾六足四首其音如鵲食之可以己憂又北四百里曰譙明之山譙水出焉西流注于河其中多何羅之魚一首而十身其音如吠犬食之已癰有獸焉其状如貆而赤豪也音丸貆豪猪其音如榴榴名曰孟槐可以禦凶在畏狩畫中也辟凶邪氣也亦是山也無草木多青雄黄青碧一作多又北三百五十里曰涿光之山囂水出焉而西流注于河其中多鰼鰼之魚之褶音袴褶其状如鵲而十翼鱗皆在羽端其音如鵲可以禦火食之不癉其上多松栢其下多㯶橿其獸多麢羊其鳥多蕃即鴞音煩未詳或云又北三百八十里曰虢山其上多漆其下多桐椐梧桐節中椐桾音祛桐也椐樻木腫其陽多玉其隂多鐡伊水出焉西流注于河其獸多橐駝里其負千斤知水泉所在也有肉鞍善行流沙中日行三百其鳥多寓状如䑕而鳥翼其音如羊可以禦兵又北四百里至于虢山之尾其上多玉而無石魚水出焉而西流注于河其中多文貝又北二百里曰丹熏之山其上多樗柏其草多韭薤雅有其名皆山果爾多丹雘熏水出焉而西流注于棠水有獸焉其状如䑕而莬首麋身其音如獋犬以其尾飛作或音豪髯飛獋名曰耳䑕食之不䐆禆倉音采也䐆大腹也見又可以禦百毒又北二百八十里曰石者之山其上無草木多瑶碧泚水出焉而西流注于河有獸焉其状如豹而文題白身也題額名曰孟極是善伏其鳴自呼又北百一十里曰邊春之山春山或作多葱葵韭茖大葉山葱名桃李小不解核也山桃榹桃子杠水出焉而西流注于泑澤有獸焉其状如禺而文身善見人則卧眠也言佯名曰幽鴳鴳音遏或作嬻嬒其鳴自呼又北二百里曰蔓聮之山二音萬連其上無草木有獸焉其状如禺而有鬛牛尾文臂馬蹄見人則呼名曰足訾其鳴自呼有鳥焉群居而朋飛軰朋猶其毛如雌雉名曰鵁作渇也交音或其名自呼食之已風又北百八十里曰單張之山其上無草木有獸焉其状如豹而長尾人首而牛耳一目名曰諸犍牛之犍音如犍善吒行則㗸其尾居則蟠其尾有鳥焉其状如雉而文首白翼黄足名曰白鵺夜音食之已嗌痛梁傳曰嗌嗌咽也谷呼咽為嗌音隘不容粒今呉人可以已痸病也痸癡櫟水出焉而南流注于杠水又北三百二十里曰灌題之山其上多樗柘其下多流沙多砥有獸焉其状如牛而白尾其音如訆呼喚如人呌訆音名曰那父有鳥焉其状如雌雉而人靣見人則躍跳躍名曰竦斯其鳴自呼也匠韓之水出焉而西流注于泑澤其中多磁石磁石者下必有銅音慈可以取鐡管子曰山上有又北二百里曰潘侯之山其上多松栢其下多榛楛其陽多玉其隂多鐡有獸焉其状如牛而四節生毛名曰旄牛胡尾皆有長毛今旄牛背膝及邊水出焉而南流注于櫟澤又北二百三十里曰小咸之山無草木冬夏有雪北二百八十里曰大咸之山無草木其下多玉是山也四方不可以上有蛇名曰長蛇其毛如彘豪云長者鬐此其也常山亦有長蛇與此形不同百尋今蝮蛇色似艾綬文文間有毛如猪其音如皷柝木柝聲音託如人行夜敲又北三百二十里曰敦薨之山其上多㯶柟其下多茈草敦薨之水出焉而西流注于泑澤出于崑崙之東北隅實惟河源崑崙之虚即河水出其中多赤鮭為鮭魚音今名鯸鮐圭其獸多兕旄牛離騷天問所未詳或作撲牛撲牛見其鳥多鳲鳩又北二百里曰少咸之山無草木多青碧有獸焉其状如牛而赤身人靣馬足名曰窫窳虎爪與此錯爾雅云窫窳似二音軋愈其音如嬰兒是食人敦水出焉東流注于鴈門之水門山間水出鴈其中多䰽䰽之魚或作鯆音沛未詳食之殺人又北二百里曰獄法之山瀤澤之水出焉懐音而東北流注于㤗澤其中多䲃魚藻音其状如鯉而雞足食之已疣有獸焉其状如犬而人靣善投見人則其名山暉音其行如風疾言見則天下大風又北一百里曰北嶽之山多枳剛木之属檀柘有獸焉其状如牛而四角人目耳其名曰諸懐其音如鳴鴈是食人諸懐之水出焉而西流注于水其中多鮨魚音魚身而犬首其音如嬰兒及海狶体皆如魚今海中有虎鹿魚猪此其也而頭似虎鹿食之已狂又北百八十里曰渾夕之山無草木多銅玉水出焉而西北流注于海有蛇一首兩身名曰肥遺見則其國大旱状如蛇長八尺以其名呼之可使取魚子曰涸水之精名曰蟡一頭而两身其亦此又北五十里曰北單之山無草木多葱韭又北百里曰羆差之山無草木多馬馬而小野馬也似又北百八十里曰北鮮之山是多馬鮮水出焉而西北流注于涂吾之水出涂吾水中也漢元狩二年馬又北百七十里曰隄山古字耳或作䧑多馬有獸焉其状如豹而文首名曰狕么音隄水出焉而東流注于㤗澤其中多龍凡北山經之首自單狐之山至于隄山凡二十五山五千四百九十里其神皆人靣蛇身其祠之毛用一雄鷄彘瘞吉玉用一珪瘞而不糈埋其所用牲玉言祭不用米皆其山北人皆生食不火之物食而不火或作皆生北次二經之首在河之東其首枕汾也音墳臨汾水上其名曰管涔之山北秀容山涔音岑也今在太原郡故汾陽縣其上無木而多草其下多玉汾水出焉而西流注于河北西入河至汾陽縣又西二百五十里曰少陽之山其上多玉其下多赤銀精也銀之酸水出焉而東流注于汾水其中多羙赭子管者其下有鐵曰山上有赭又北五十里曰縣雍之山名汲甕雍音甕今在晉陽縣西其上多玉其下多銅其獸多閭麋麢羊一名山馿周書曰北唐閭即羭也似馿而岐蹄角如鄉射禮以閭亦見其鳥多白翟白䳑音于六反即白也晉水出焉而東南流注于汾水又東入汾東過晉陽南其中多鮆魚其状如儵而赤麟曰儵小魚其音如叱食之不驕騷臭也或作騷又北二百里曰狐岐之山無草木多青碧勝水出焉而東北流注于汾水其中多蒼玉又北三百五十里曰白沙山廣員三百里盡沙也無草木鳥獸鮪水出于其上潜于其下停其底也出山之頂是多白玉又北四百里曰爾是之山無草木無水又北三百八十里曰狂山無草木是山也冬夏有雪狂水出焉而西流注于浮水其中多羙玉又北三百八十里曰諸餘之山其上多銅玉其下多松栢諸餘之水出焉而東流注于旄水又北三百五十里曰敦頭之山其上多金玉無草木旄水出焉而東流注于印澤其中多馬勃音牛尾而白身一角其音如呼又北三百五十里曰鉤吾之山其上多玉其下多銅有獸焉其状如羊身人靣其目在腋下虎齒人其音如嬰兒名曰狍鴞是食人書其身像在夏鼎左傳為物貪淋食人未盡還也狍音咆所謂饕餮是又北三百里曰北之山無石其陽多碧其隂多玉有獸焉其状如虎而白身犬首馬尾彘鬛名曰獨谷音有鳥焉其狀如烏人靣名曰或作夏也般冐两音宵飛而晝㐲之属鵂鶹食之已暍音謁中熱也涔水出焉而東流注于卭澤又北三百五十里曰梁渠之山無草木多金玉脩水出焉而東流注于鴈門名水其獸多居暨其状如彚而赤毛剌也猬彚音渭彚似鼠赤毛如其音如豚有鳥焉其状如夸父舉父或作四翼一目犬尾名曰其音如鵲食之已腹痛可以止衕也音洞治洞下又北四百里曰姑灌之山無草木是山也冬夏有雪又北三百八十里曰湖灌之山其陽多玉其隂多碧多馬湖灌之水出焉而東流注于海其中多䱇魚字亦鱓有木焉其葉如柳而赤理又北水行五百里流沙三百里至于洹山其上多金玉三桑生之其樹皆無枝其髙百仞百果樹生之其下多怪蛇又北三百里曰敦題之山無草木多金玉是錞于北海凡北次二經之首自管涔之山至于敦題之山凡十七山五千六百九十里其神皆蛇身人靣其祠毛用一雄雞瘞之埋用一璧一珪投而不糈以禮神不埋擿玉於山中也之北次三經之首曰太行之山西北行音户剛反今在河内野王縣其首曰歸山其上有金玉其下有碧有獸焉其状如麢羊而四角馬尾而有距其名曰䮝善還也䮝音暉還旋旋儛其鳴自䚯有鳥焉其状如鵲白身赤尾六足其名曰䴅犇音是善驚其鳴自詨詨音呼交反今呉人謂呼為又東北二百里曰龍侯之山無草木多金玉决决之水出焉訣音而東流注于河其中多人魚其状如䱱魚四足其音如嬰兒鮎而四足聲如小兒啼今亦呼鮎䱱見山中經或曰人魚即鯢也似音蹄為䱱食之無癡疾又東北二百里曰馬成之山其上多文石其隂多金玉有獸焉其状如白犬而黑頭見人則飛行自在言肉翅飛其名曰天馬其鳴自䚯有鳥焉其状如烏首白而身青足黄是名曰鶌鶋或作鳴屈居二音其鳴自詨食之不飢可以已寓寓猶誤也不詳或曰又東北七十里曰咸山其上多玉其下多銅是多松栢草多茈草條菅之水出焉間菅音而西南流注于長澤其中多噐酸三歲一成詳也所未食之已癘又東北二百里曰天池之山其上無草木多文石有獸焉其状如而䑕首以其背飛飛飛則仰也用其背上毛其名曰飛䑕澠水出焉潜于其下底也停山其中多黄堊也堊土又東三百里曰陽山其上多玉其下多金銅有獸焉其状如牛而赤尾其頸腎其状如勾瞿腎勾瞿牛也言頸上有肉劬音其名曰領胡其鳴自詨食之已狂有鳥焉其状如雌雉而五彩以文是自為牝牡名曰蛇其鳴自詨留水出焉而南流注于河其中有父之魚䧟音其状如鮒魚魚首而彘身食之已嘔又東三百五十里曰賁聞之山其上多蒼玉其下多黄堊多石又北百里曰王屋之山書曰至于王屋也今在河東東垣縣北是多石㶌水出焉輦㶌音而西北流注于㤗澤沇水所出聲相地理志王屋山則濟㶌水也近殆一水耳沇又東北三百里曰教山其上多玉而無石教水出焉西流注于河是水冬乾而夏流實惟乾河喜縣東北今河東聞有故溝䖏無復水即是也有乾河口因名乾河里但其中有兩山是山也廣員三百步其名曰發丸之山其上有金玉又南三百里曰景山霍以為城外傳曰景南望販之澤池也即塩縣或無販字今在河東猗氏北望少澤其上多草藷藇可食曙豫根似羊蹄藷音儲語有輕重耳二音今江南單呼為其草多秦椒細葉草也子似椒而其隂多赭其陽多玉有鳥焉其状如蛇而四翼六目三足名曰酸與其鳴自詨見則其邑有恐之不醉或曰食又東南三百二十里曰孟門之山吕梁未鑿河出於尸子曰龍門未辟曰洪水穆天子傳曰北升孟門九河之澄孟門之上大溢逆流無有丘髙阜㓕之名其上多蒼玉多金其下多黄堊多石又東南三百二十里曰平山平水出于其上潜于其下是多羙玉又東三百里曰京山有羙玉多漆木多竹其陽有赤銅其隂有䃤明色非一也䃤音竹篠之篠黒砥名也尸子曰加黄砥髙水出焉南流注于河又東二百里曰虫尾之山其上多金玉其下多竹多青碧丹水出焉南流注于河薄水出焉水出鮮于山淮南子曰薄而東南流注于黄澤又東三百里曰彭毗之山其上無草木多金玉其下多水蚤林之水出焉早音東南流注于河肥水出焉而南流注于牀水其中多肥遺之蛇又東百八十里曰小侯之山明漳之水出焉南流注于黄澤有鳥其状如烏而白文名曰鴣二音姑習食之不灂作㬭音醮不瞧白也或又東三百七十里曰泰頭之山共水出焉恭音南注于虖池音下同呼佗二其上多金玉其下多竹箭又東北二百里曰軒轅之山其上多銅其下多竹有鳥焉其状如梟而白首其名曰黄鳥其鳴自詨食之不妬又北二百里曰謁戾之山郡縣今在上黨其上多松栢有金玉沁水出焉南流注于河出榖述縣羊頭山也至滎陽縣東北入河或其東有林焉名曰丹林丹林之水出焉南流注于河嬰侯之水出焉北流注于汜水東三百里曰沮洳之山汾沮洳詩云彼無草木有金玉濝水出焉其音南流注于河山東過河内縣南為白溝今淇水出汲郡隆慮縣大號又北三百里曰神囷之山囷之囷音如倉其上有文石其下有白蛇有飛蟲黄水出焉而東流注于洹郡林慮縣洹水出汲入清水洹音丸東北至魏郡長樂水出焉而東流注于歐水今出水至列人縣入于漳其水臨水縣西釡口山經鄴西北又北二百里曰發鳩之山長子縣西今在上黨郡其上多柘木有鳥焉其状如烏文首白喙赤足名曰精衛其鳴自詨是炎帝之少女名曰女娃佳反語誤或作階炎帝神農也娃惡女娃遊于東海溺而不返故為精衛常銜西山之木石以堙于東海音因堙塞也漳水出焉音章濁漳東流注于河出長或曰東至鄴入清漳子縣鹿谷山而又東北百二十里曰少山沾縣故属上黨今在樂平郡沾縣其上有金玉其下有銅清漳之水出焉東流于濁漳之水漳清濁漳或曰東北至邑城入于大河也出少山大繩谷至武安縣南暴宫邑入又東北二百里曰錫山其上多玉其下有砥牛首之水出焉而東流注于水又北二百里曰景山有羙玉景水出焉東南流注于海澤又北百里曰題首之山有玉焉多石無水又北百里曰繡山其上有玉青碧其木多栒也音荀木中枚其草多芍藥芎窮夷亦香草属芍藥一名辛洧水出焉而東流注于河其中有鱯大白色也鱯似鮎而黽或曰蠖黽一物名耳䵸黽似蝦蟇小而青又北百二十里曰松山陽水出焉東北流注于河又北百二十里曰敦與之山其上無草木有金玉溹水出于其陽各反音悉而東流注于泰陸之水鉅鹿北廣大陸水今其水平澤即泜水出于其隂肆反音抵而東流注于彭水水出今泜于堂陽縣入于漳水中丘縣西窮泉谷東注槐水出焉而東流注于泜澤又北百七十里曰柘山其陽有金玉其隂有鐵歷聚之水出焉而北流注于洧水又北三百里曰維龍之山其上有碧玉其陽有金其隂有鐵肥水出焉而東流注于皐澤其中多礨石詳未大石貌或曰石名也音雷或作壘磈壘敞鐡之水出焉而北流注于大澤又北百八十里曰白馬之山其陽多石玉其隂多鐡多赤銅木馬之水出焉而東北流注于虖沱二音呼佗又北二百里曰空桑之山無草木疑同名也上已有此山冬夏有雪空桑之水出焉東流注于虖沱又北三百里曰泰戱之山無草木多金玉有獸焉其状如羊一角一目目在耳後其名曰䍶䍶之棟音屋棟其鳴自䚯虖沱之水出焉鹵成縣南武夫山今虖沱水出鴈門而東流注于漊水樓音液女之水出于其陽南流注于沁水懌之懌液音恱又北三百里曰石山多蔵金玉濩濩之水出焉尺蠖濩音蠖之而東流注于虖沱鮮于之水出焉而南流注于虖沱又北二百里曰童戎之山皐涂之水出焉而東流注于漊液水又北三百里曰髙是之山靈丘縣今在北地滋水出焉慈音而南流注于虖沱其木多㯶其草多條水出焉冦音東流注于河東北入于易水過博陵縣南又又北三百里曰陸山多羙玉水出焉郯水或作而東流注于河又北二百里曰沂山祈音般水出焉盤音而東流注于河北百二十里曰燕山多嬰石嬰帶所謂燕石者言石似玉有符彩燕水出焉東流注于河又北山行五百里水行五百里至于饒山是無草木多瑶碧其獸多槖駝其鳥多鶹鶹鵂鶹也未詳或曰歷虢之水出焉而東流注于河其中有師魚食之殺人作鯢未詳或又北四百里曰乾山無草木其陽有金玉其隂有鐡而無水有獸焉其状如牛而三足其名曰獂元音其鳴自詨又北五百里曰倫山倫水出焉而東流注于河有獸焉其状如麋其川在尾上也川竅其名曰羆又北五百里曰碣石之山臨渝縣南水中或曰在右水經曰碣石山今在遼西縣海邊山北平驪城繩水出焉而東流注于河其中多蒲夷之魚詳未其上有玉其下多青碧又北水行五百里至于鴈門之山無草木北西隃鴈門山即名云在髙柳北鴈之所出因以又北水行四百里至于泰澤其中有山焉曰帝都之山廣員百里無草木有玉金又北五百里曰錞于母逢之山北望鷄號之山其風如䬅戻或云飄風也䬅急風貌也音西望幽都之山浴水出焉黒水浴即也是有大蛇赤首白身其音如牛見則其邑大旱凡北次三經之首自太行之山以至于無逢之山凡四十六山萬二千三百五十里其神状皆馬身而人靣者廿神其祠之皆用一藻茝瘞之蘭之音昌代藻聚藻茝香草反其十四神状皆彘身而載玉其祠之皆玉不瘞埋不玉也所用其十神状皆彘身而八足蛇尾其祠之皆用一璧瘞之大凡四十四神皆用稌糈米祠之此皆不火食右北經之山志凡八十七山二萬三千二百三十里
