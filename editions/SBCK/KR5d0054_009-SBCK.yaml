front:
  text: 海外東經第九
  hash: sha256:8cb4fcc75284d913c80f5a75766337908408ddac38ebf63ad86af255802c5542
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_SBCK_009-1a}
body:
  text: 郭氏傳海外自東南陬至東北陬者丘作髪音嗟或爰有遺玉青馬視肉楊栁甘柤甘華甘果所生在東海兩山夾丘上有樹木一曰嗟丘一曰百果所在在堯葬東大人國在其北為人大坐而削舡一曰在丘北奢比之尸在其北名也亦神獸身人面大耳珥兩青蛇以珥釣餌之餌蛇貫耳也音一曰肝榆之尸在大人北君子國在其北衣冠帶劔食獸使二大虎在旁其人好讓不爭有薰堇或作華草朝生夕死一曰在肝榆之尸北在其北虹音各有兩首蝀也虹螮一曰在君子國北朝陽之谷神曰天吴是為水伯在北兩水間其為獸也八首人面八足八尾皆青黄東十尾大荒東經青丘國在其北榖衣絲帛其人食五其狐四足九尾一曰在朝陽北及三夀得一狐九尾即此䫋也汲郡竹書曰栢抒子征于東海帝命竪亥歩自東極至于西極五億十選人選萬也堅亥徤行九千八百步竪亥右手把筭左手指青丘北一曰禹令竪亥一曰五億十萬九千八百歩東西二億三萬三詩含神霧曰夭地里天地相去一億五萬里千里南北二億一千五百黒齒國在其北裸國東南有黒齒國舡行一年可至東夷傳曰倭國東四千餘里有裸國染齒亦以放此人也異物志云西屠為人黑食稻啖蛇一赤一青一青一作蛇在其旁一曰在竪亥北為人黑手食稻使蛇其一蛇赤下有湯谷也谷中水湯谷上有扶桑木也扶桑十日所浴在黒齒北居水中有大木九日居下枝一日居上枝乃令羿射十日中其九日日中烏盡死離騷所謂莊周云昔者十日並出草木焦枯淮南子亦云堯射畢十日果畢之汲郡竹書曰胤甲即位居西河有羿焉畢日烏焉落羽者也歸蔵鄭母經云昔者羿善十日日之數十此云九日居下枝一日居上枝大荒妖孽十日並岀明此自然之異有自來矣傳曰天有以次第迭出運照而今俱見為天下妖災故羿稟堯經人曰一日方至一日方出明天地雖有十日自使可以激水烈火精感可以降霜囬景然則羿之鑠明之命洞其靈誠仰天控弦而九日潜退也假令噐用推之以數則無徃不通逹觀之客冝領其玄致歸之離而斃陽烏未足為難也若搜之常情則無理以然滯言竒不廢矣會則逸義無雨師妾在其北屏翳也雨師謂其為人黑兩手各操一蛇左耳有青蛇右耳有赤蛇一曰在十日北為人黑身人靣各操一玄股之國在其北黑故云髀以下盡其為人衣魚為衣也以魚皮食䳼也音憂䳼水鳥使兩鳥夾之一曰在雨師妾北毛民之國在其北為人身生毛千里有毛人在大海今去臨海郡東南二晉永嘉四年呉郡司塩都尉逢在海邊得一舡上州島上為人短小靣體盡有毛如猪能宂居無衣服道死唯有一人在上賜之婦生子岀入布并漸曉人有男女四人狀皆如比言語不通送詣丞相府未至荒經云毛民食者是矣語自說其所在是毛民也大一曰在玄股北勞民國在其北其為人黑有一鳥兩頭食果草實也或曰教民一曰在毛民北為人面目手足盡黑東方勾芒鳥身人靣乘兩龍曰昔秦穆公有明徳上木神也方靣素服墨子之壽十九年帝使勾芒賜建平元年四月丙戌待太常属臣望校治侍中光禄勲臣龔侍中奉車都尉光禄大夫臣秀領主省
