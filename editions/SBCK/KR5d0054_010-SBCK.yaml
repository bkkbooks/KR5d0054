body:
  text: 海内南經第十郭氏傳海内東南陬以西者起之也從南頭甌居海中甌在岐海中也音嘔今臨海永寧縣即東閩在海中旻音其西北有山郡是也亦在岐海中閩越即西甌今建安一曰閩中山在海中三天子鄣山章音在閩西海北王山浙江出其邊也張氏土今在新安歙縣東今謂之三有小石城云黄帝曾逰此即三天子都也地記曰東陽永康縣南四里有石城山上一曰在海中桂林八樹在番隅東也番隅今番隅縣八而成林言其大伯慮國詳未離耳國耳也在朱崖海渚中不食五榖但鎪雜其耳分令下垂以為飾即儋藷藇也噉蚌及彫題國鱗采即鮫人也㸃湼其靣畫體為北朐國音劬未詳皆在鬰水南鬰水出湘南山一曰相慮梟陽國在北朐之西其為人人面長唇黒身有毛反踵見人笑亦笑左手操管反踵自笑笑則上唇掩其周書曰州靡髣髴者人身内經謂之贑臣人今交州南康郡深山中皆有此物面爾雅云髴髴大傳曰周書成王時州靡國獻之海中人即病土俗呼為山都南康今有贑水以有此人也長丈許脚跟反向徤走被髪好笑雌者能作汁洒人因號其山為域山亦此也因以名水猶大荒說地有域人兕在舜葬東湘水南其狀如牛蒼黑一角蒼梧之山帝舜葬于陽曰舜葬蒼梧之野也即九疑山也禮記亦帝丹朱葬于隂朱于丹水與此義符丹朱稱帝者猶漢山陽今丹陽復有丹朱冡也竹書亦曰后稷放帝帝之謚也公死加獻汜林方三百里在狌狌東字同耳或作猩猩狌狌知人名其為獸如豕而人面狗而人面頭如雄雞食之不周書曰鄭郭狌狌者狀如黄狀如豚而後似狗聲如小兒啼也眯今交州封溪出狌狌土俗人說云在舜西狌狌西北有犀牛其狀如牛而黒知人名之西北庳脚三角犀牛似水牛猪頭在狌狌夏后啓之臣曰孟涂是司神于巴人為之神主聽其獄訟請訟于孟涂之所之也令斷其衣有血者乃執之血見于衣不者則是請生生也言好居山上在丹山西丹山在丹陽丹陽居屬也東七里即孟涂所居也今建平郡丹陽城秭歸縣窫窳龍首居弱水中在狌狌知人名之西其狀如龍首食人臣所殺復化而成此物也窫窳本蛇身人靣為貳有木其狀如牛圖河或如龍蛇之狀亦此也玉版說芝草樹生或如車馬引之有皮若纓黄蛇牽言纓及黄蛇狀也之皮剥如人冠其葉如羅羅也如綾其實如欒本赤枝青欒木名黄夘或作麻音欒葉生雲雨山或作其木若蓲名未詳蓲亦木其名曰建木在窫窳西弱水上其下聲無響立無影也建木青葉紫莖黒花黄實氐人國抵之抵氐音觸在建木西其為人人靣而魚身無足胷以下魚也盡胷以上人巴蛇食三歳而出其骨君子服之無心腹之疾南今出此其也楚詞曰有蛇吞象厥大何如說者云長方蚺蛇吞鹿鹿已爛自絞於樹腹中骨皆穿鱗甲間尋千其為蛇青黄赤黑一曰黑蛇青首在犀牛西旄馬其狀如馬四節有毛馬者亦有旄牛穆天子傳所謂毫在巴蛇西北髙山南匈奴獫狁一曰開題之國提音列人之國並在西北在旄馬三國並北西
