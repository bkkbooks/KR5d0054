  text: 中山經第五
  hash: sha256:3ac509a0ab6b976cadeac318c626ea1ac185f7cd7bebfb817c77b45f9626f903
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_SBCK_004-10a}
body:
  text: 郭氏傳中山經薄山之首曰甘棗之山共水出焉恭音而西流注于河其上多杻木其下有草焉葵本而杏葉楛葉或作黄華而莢實名曰蘀反他落可以已瞢盲音有獸焉其狀如鼠而文題虺字亦或作虺䑕所未詳音其名曰㔮作熊也音那或食之已癭又東二十里曰歴兒之山其上多橿多櫔木厲音是木也方莖而員葉黄華而毛其實如揀頭白而粘可以揀木名子如指練或作簡浣衣也音服之不忘又東十五里曰渠豬之山其上多竹渠豬之水出焉而南流注于河其中是多豪魚狀如鮪鱣也鮪似赤喙尾赤羽可以已白癬又東三十五里曰葱聾之山其中多大谷是多白堊黑青黄堊色堊也言有雜又東十五里曰涹山倭音其上多赤銅其隂多鐵又東七十里曰脱扈之山有草焉其狀如葵葉而赤華莢實實如㯶莢似皁莢也今㯶木莢名曰植楮可以已癙病癙狸頭已癙也也淮南子曰食之不眯又東二十里曰金星之山多天嬰其狀如龍骨可以已痤也癰痤又東七十里曰泰威之山其中有谷曰梟谷其中多鐵谷字或無又東十五里曰橿谷之山其中多赤銅谷之山或作檀又東百二十里曰吳林之山其中多葌草字亦菅又北三十里曰牛首之山有館下有水未知此是非今長安西南有牛首山上有草焉名曰草其葉如葵而赤莖其秀如禾服之不憂勞水出焉而西流注于潏水詐之譎音如譎是多飛魚其狀如鮒魚食之已痔衕又北四十里曰霍山羅江縣河南鞏縣皆有霍山明今平陽永安縣廬江縣晉安爾雅大山繞小山為霍山以霍為名者非一矣按其木多榖有獸焉其狀如狸而白尾有鬛名曰朏朏養之可以已憂也普昧反謂蓄養之又北五十二里曰合谷之山是多薝棘音瞻未詳又北三十五里曰隂山險山亦曰多礪石文石中磨者礪石石少水出焉其中多彫棠其葉如榆葉而方其實如赤菽豆菽食之已聾又東北四百里曰皷鐙之山多赤銅有草焉名曰榮草其葉如柳其本如鷄卵食之已風凡薄山之首自甘棗之山至于皷鐙之山凡十五山六千六百七十里歴兒冡也其祠禮毛太牢之具縣以吉玉也見爾雅縣祭山之名其餘十三山者毛用一羊縣嬰用桑封瘞而不糈桑封者桑主也方其下而鋭其上而中穿之加金公羊傳曰虞主用桑主或作玉言作神主而祭以金銀飾之也中次二經濟山之首曰煇諸之山其上多桑其獸多閭麋其鳥多鶡闘死乃止音曷出上黨也似雉而大青色有毛勇徤又西南二百里曰發視之山其上多金玉其下多砥礪即魚之水出焉而西流注于伊水又西三百里曰豪山其上多金玉而無草木又西三百里曰鮮山多金玉無草木鮮水出焉而北流注于伊水其中多鳴蛇其狀如蛇而四翼其音如磬見則其邑大旱又西三百里曰陽山多石無草木陽水出焉而北流注于伊水其中多化蛇其狀如人靣而豺身鳥翼而蛇行其音如叱呼見則其邑大水又西二百里曰昆吾之山其上多赤銅色赤如火以此山出名銅謂昆吾之劒也越絶書曰赤堇之山破而出錫若耶之作刀切玉如割泥也周穆王時西戎獻之尸子所得銅劒一枝長三尺五寸乃今所名為干將劒汲郡之谷涸而出銅歐冶子因以為純鈞之劒汲郡冡中以錫雜銅為兵噐也亦皆非鐵也明古者通有獸焉其狀如彘而有角其音如號號哭如人名曰蠪蚳獸疑同名上已有此食之不眯又西百二十里曰葌間音山葌水出焉而北流注于伊水其上多金玉其下多青雄黄有木焉其狀如棠而赤葉名曰芒草忘音可以毒魚又西一百五十里曰獨蘇之山無草木而多水又西二百里曰蔓渠之山其上多金玉其下多竹箭伊水出焉而東流注于洛耳山東北至河南洛陽縣今伊水出上洛盧氏縣熊洛入有獸焉其名曰馬腹其狀如人靣虎身其音如嬰兒是食人凡濟山經之首自煇諸之山至于蔓渠之山凡九山一千六百七十里其神皆人面而鳥身祠用毛毛色擇用用一吉玉投而不糈中次三經萯山之首曰敖岸之山萯音倍或作獻其陽多㻬琈之玉其隂多赭黄金神熏池居之是常出羙玉作或石北望河林其狀如蒨如舉名也未詳蒨音倩説者云蒨舉皆木有獸焉其狀如白鹿而四角名曰夫諸見則其邑大水又東十里曰青要之山實維帝之密都密之邑天帝曲北望河曲曲一直也河千里一是多駕鳥為鴐鴐鵞也音加未詳也或曰駕冝南望墠渚渚墠音填也水中小洲名禹父之所化復云在此然則一已有鯀化於羽淵為黄熊今無徃而不化也變怪之性者亦是多僕纍蒲盧曰蒲盧者螟蛉也僕纍蝸牛也爾雅䰠武羅司之䰠即神字武羅神名其狀人面而豹文小腰而白齒首或作而穿耳以鐻未詳也音渠鐻金銀噐之名其鳴如鳴玉鳴玉如人聲佩是山也冝女子畛水出焉軫音而北流注于河其中有鳥焉名曰鴢窕之窈音如窈其狀如鳬青身而朱目赤尾食之冝子赤也朱淺有草焉其狀如葌茅也菅似而方莖黄華赤實其本如藁本亦香草根似藁本名曰荀草苞草或作服之羙人色羙豔令人更又東十里曰騩山巍音其上有羙棗其隂有㻬琈之玉正回之水出焉而北流注于河其中多飛魚其狀如豚而赤文服之不畏雷可以禦兵又東四十里曰冝蘇之山其上多金玉其下多蔓居之木詳未滽滽之水出焉容音而北流注于河是多黄貝又東二十里曰和山其上無草木而多瑶碧實惟河之九都故曰九都九水所潜是山也五曲五重曲回九水出焉合而北流注于河其中多蒼玉吉神泰逢司之善也吉猶其狀如人而虎尾雀尾或作是好居于萯山之陽出入有光太逢神動天地氣也田於萯山之下天大風晦冥孔甲迷言其有靈爽興雲雨也夏后孔甲吕氏春秋也惑入于民室見凡萯山之首自敖岸之山至于和山凡五山四百四十里其祠太逢熏池武羅皆一牡羊副磔之以祭也副謂破羊骨悃愊之愊見周禮音嬰用吉玉其二神用一雄鷄瘞之糈用稌中次四經釐山之首狸音曰鹿蹄之山其上多玉其下多金甘水出焉而北流注于洛其中多泠石或作涂未聞也泠西五十里曰扶豬之山其上多礝石中出礝石白者音耎今鴈門山有赤色者如水水中有獸焉其狀如貉而人目古字貉或作其名曰䴦作麋音銀或虢水出焉而北流注于洛其中多瓀石水中言亦出又西一百二十里曰釐山其陽多玉其隂多蒐茅蒐音捜草也今之蒨有獸焉其狀如牛蒼身其音如嬰兒是食人其名曰犀渠滽滽之水出焉而南流注于伊水有獸焉名曰之頡音蒼頡其狀如獳犬而有鱗其毛如彘鬛間也生鱗又西二百里曰箕尾之山多榖多涂石其上多㻬琈之玉又西二百五十里曰柄山其上多玉其下多銅滔雕之水出焉而北流注于洛其中多羬羊有木焉其狀如樗其葉如桐而莢實其名曰苃可以毒魚作艾苃一又西二百里曰白邊之山其上多金玉其下多青雄黄又西二百里曰熊耳之山洛縣南今在上其上多漆其下多㯶浮濠之水出焉而西流注于洛其中多水玉多人魚有草焉其狀如蘇而赤華名曰葶䔭聹二音亭寧耵可以毒魚又西三百里曰牡山其上多文石其下多竹箭竹䉋其獸多㸲牛羬羊鳥多赤鷩鷩雉也音閉即又西三百五十里曰讙舉之山雒水出焉而東北流注于玄扈之水其中多馬腸之物此二山者洛間也圗曰玄扈洛汭謂此間也洛水今出上洛縣嶺山河凡釐山之首自鹿蹄之山至于玄扈之山凡九山千六百七十里其神狀皆人面獸身其祠之毛用一白鷄祈而不糈祈禱言直以彩衣之飾鷄以彩中次五經薄山之首曰茍牀之山林山或作茍無草木多怪石曰鉛松怪石也怪石似玉也書東三百里曰首山其隂多穀柞草多芫芫華中藥山薊也其陽多㻬琈之玉木多槐其隂有谷曰机谷多鳥之音如鉗其狀如梟而三目有耳其音如錄食之已墊聞未又東三百里曰縣斸之山斸之斸音如斤無草木多文石又東三百里曰葱聾之山無草木多石詳未東北五百里曰條谷之山其木多槐桐其草多芍藥冬滿冬今作門俗作耳本草經曰冬一名又北十里曰超山其隂多蒼玉其陽有井冬有水而夏竭又東五百里曰成侯之山其上多櫄木車轅吳人呼似樗樹材中或曰輶車櫄音輴車其草多芃又東五百里曰朝歌之山谷多羙堊又東五百里曰槐山谷多金錫又東十里曰歴山其木多槐其陽多玉又東十里曰尸山多蒼玉其獸多麖小黑色似鹿而尸水出焉南流注于洛水其中多羙玉又東十里曰良餘之山其上多榖柞無石餘水出于其隂而北流注于河乳水出于其陽而東南流注于洛又東南十里曰蠱尾之山多礪石赤銅龍餘之水出焉而東南流注于洛又東北二十里曰升山其木多榖柞棘其草多藷藇蕙草也蕙香多冦脫中有瓤正白零桂人植而日灌之以冦脫草生南方髙丈許似荷葉而堇也為樹黄酸之水出焉而北流注于河其中多琁玉次石瑶珠不知佩音旋玉者也荀卿曰旋玉又東十二里曰陽虛之山多金臨于玄扈之水曰蒼河圗靈龜負書丹甲青文以授之出此水中也頡為帝南巡狩登陽虚之山臨于玄扈洛汭凡薄山之首自茍林之山至于陽虚之山凡十六山二千九百八十二里升山也其祠禮太牢嬰用吉玉首山䰠也其祠用稌黑犧大牢之具蘖釀醴酒也以蘖作干儛干楯也干儛萬儛置皷以儛擊之嬰用一璧尸水合天也神天馮也之所牲祠之用一黑犬于上用一雌鷄于下刉一牝羊獻血周禮曰刉咡奉犬牲以血祭也刉猶刲也嬰用吉玉彩之以繒又加飾也綵之饗之禮曰執奠祝饗是也勸強之也特牲饋食中次六經縞羝山之首曰平逢之山南望伊洛東望榖城之山在此山下張良取以合葬爾在濟北榖城縣西黄石公石無草無木水多沙石有神焉其狀如人而二首名曰驕蟲是為螫蟲之長為螫蟲實惟蜂蜜之廬集蜜赤蜂名言群蜂之所舎其祠之用一雄鷄禳而勿殺禳却惡氣也禳亦祭名謂西十里曰縞羝之山無草木多金玉又西十里曰廆山偉之瓌音如瓌其隂多㻬琈之玉其西有谷焉名曰雚谷其木多柳楮其中有鳥焉狀如山鷄而長尾赤如丹火而青喙名曰鴒䳩二音鈴要其鳴自呼服之不眯交觴之水出于其陽而南流注于洛俞隨之水出于其隂而北流注于榖水又西三十里曰瞻諸之山其陽多金其隂多文石㴬水出焉謝音而東南流注于洛少水出其隂而東流注于榖水慈澗世謂之又西三十里曰婁之山無草木多金玉瞻水出于其陽而東流注于洛陂水出于其隂百荅水世謂之而北流注于榖水其中多茈石文石又西四十里曰白石之山惠水出于其陽而南流注于洛其中多水玉澗水出于其隂洛潤書曰伊西北流注于榖水其中多麋石櫨丹聞皆未又西五十里曰榖山其上多榖其下多桑爽水出焉紵麻澗世謂之而西北流注于榖水其中多碧緑又西七十二里曰密山有密山疑非也今滎陽密縣亦其陽多玉其隂多鐵豪水出焉而南流注于洛其中多旋龜其狀鳥首而鼈尾其音如判木無草木又西百里曰長石之山無草木多金玉其西有谷焉名曰共谷多竹共水出焉西南流注于洛其中多鳴石七八里今零泉縣永正鄉有鳴石二所其一晉永康元年襄陽郡上鳴石似玉色青撞之聲聞石皷即此也狀如皷俗因名為又西一百四十里曰山無草木多瑶碧厭染之水出于其陽而南流注于洛其中多人魚其西有林焉名曰墦番音穀水出焉而東流注于洛陽谷東北至今榖水出谷入洛河榖城縣其中多珚玉珚音堙未聞也又西五十里曰橐山其木多樗多木木七八月中今蜀中有著狀可以酢音備吐穗穗成如有塩粉其陽多金玉其隂多鐵多蕭蒿蕭雅見爾橐水出焉而北流注于河其中多脩辟之魚狀如黽属也黽蛙而白喙其音如䲭食之已白癬又西九十里曰常烝之山無草木多堊潐水出焉譙音而東北流注于河其中多蒼玉菑水出焉而北流注于河又西九十里曰夸父之山其木多㯶柟多竹箭其獸多㸲牛羬羊其鳥多鷩其陽多玉其隂多鐵其北有林焉名曰桃林是廣員三百里其中多馬農湖縣闕桃林今弘野馬山羊山牛也郷南谷中是也饒湖水出焉而北流注于河其中多珚玉又西九十里曰陽華之山其陽多金玉其隂多青雄黄其草多藷藇多苦辛其狀如橚字也即楸其實如其味酸甘食之已楊水出焉而西南流注于洛其中多人魚門水出焉而東北流注于河其中多玄䃤砥黒水中石生姑之水出于其隂藉音而東流注于門水其上多銅門水出于河七百九十里入雒水凡縞羝山之首自平逢之山至于陽華之山凡十四山七百九十里嶽在其中以六月祭之歳之中六月亦如諸嶽之祠法則天下安寧中次七經苦山之首曰休與之山与下同與或作其上有石焉名曰帝臺之棋棋謂棋也帝臺神人名五色而文其狀如鶉卵帝臺之石所以禱百神者也則用此石禱祀百神服之不蠱有草焉其狀如蓍赤葉而本叢生名曰風條可以為簳笴也中箭東三百里曰皷鍾之山帝臺之所以觴百神也燕㑹舉觴名為皷鍾也則於此山因有草焉方莖而黄華員葉而三成重也葉三其名曰焉酸可以為毒治為其上多礪其下多砥又東二百里曰姑媱之山之山字音遥或無帝女死焉其名曰女尸化為䔄草其葉胥成也亦音遥言葉相重其華黄其實如菟丘也見爾雅菟丘菟絲服之媚於人媚之如是一名荒夫為人所愛也傳曰人服草又東二十里曰苦山有獸焉名曰山膏其狀如逐豚即字赤若丹火善詈人好罵其上有木焉名曰黄棘黄華而員葉其實如蘭服之不字女子貞不字字生也易曰有草焉員葉而無莖赤華而不實名曰無條服之不癭又東二十七里曰堵山神天愚居之是多怪風雨其上有木焉名曰天楄鞭音方莖而葵狀服者不㖶噎也食不又東五十二里曰放皐之山又作牧放或作効明水出焉南流注于伊水其中多蒼玉有木焉其葉如槐黄華而不實其名曰蒙木服之不惑有獸焉其狀如蜂枝尾而反舌善呼喚也好呼其名曰文文又東五十七里曰大之山多㻬琈之玉多麋玉詳未有草焉其狀葉如榆方莖而蒼傷其名曰牛傷牛棘猶言其根蒼文服者不厥氣病厥逆可以禦兵其陽狂水出焉西南流注于伊水其中多三足君山山上有池水今吳典陽羨縣有三足者名賁出爾雅中有三足六眼龞食者無大疾可以已腫又東七十里曰半石之山其上有草焉生而秀其髙丈餘赤葉赤華華而不實着葉花生穗間初生先作穗却其名曰嘉榮服之者不霆也音廷之廷不畏雷霆辟礰來需之水出于其陽而西流注于伊水其中多鯩魚倫音黑文其狀如鮒食者不睡合水出于其隂而北流注于洛多鰧魚騰音狀如鱖居逵水中之冗道交通者鱖音劌鱖魚大口大目細鱗有班彩逵蒼文赤尾食者不癰可以為瘻南子曰雞頭已瘻音漏瘻癰属也中多有虫淮又東五十里曰少室之山西俗名泰室今在河南陽城百草木成囷詳未其上有木焉其名曰帝休葉狀如楊其枝五衢衢路也離騷曰靡萍九衢言樹枝交錯相重五出有黄華黑實服者不怒其上多玉仙道世人不能上也時含神霧云此山巔亦有白玉膏得服之即得其下多鐵休水出焉而北流注于洛其中多䱱魚狀如蜼詳未侜音而長距足白而對詳未食者無蠱疾可以禦兵又東三十里曰泰室之山今在陽城縣西即中嶽嵩髙山也其上有木焉葉狀如蔾而赤理其名曰栯木郁音服者不妬有草焉其狀如葪也木似白華黑實澤如蘡薁滑澤言子其名曰䔄草服之不昧上多羙石生啓在此山見淮南子次玉者也啓母化為石而又北三十里曰講山其上多玉多柘多栢有木焉名曰帝屋葉狀如椒反傷赤實下勾也反傷刺可以禦凶又北三十里曰嬰梁之山上多蒼玉錞于玄石玉依言蒼于樂噐名形似推頭黑石而生也或曰錞又東三十里曰浮戯之山有木焉葉狀如樗而赤實名曰亢木食之不蠱汜水出焉而北流注于河其東有谷因名曰蛇谷故以名之言此中出蛇上多少辛也細辛又東四十里曰少陘之山有草焉名曰草剛音葉狀如葵而赤莖白華實如蘡薁食之不愚人智言益噐難之水出焉囂或作而北流注于役水侵一作又東南十里曰太山縣汶水所出疑此非也别有東小太山今在朱虚有草焉名曰梨其葉狀如荻也音狄荻亦蒿而赤華可以已疽太水出于其陽而東南流注于没水承水出于其隂而東北流注于没靖澗水世謂之又東二十里曰末山上多赤金末水出焉北流注于没作沬水經又東二十五里曰役山上多白金多鐵役水出焉北注于河又東三十五里曰敏山上有木焉其狀如荆白華而赤實名曰葪計音栢服者不寒耐寒令人其陽多㻬琈之玉又東三十里曰大騩之山騩因溝水所出音㱕今滎陽密縣有大騩山其隂多鐵羙玉青堊有草焉其狀如蓍而毛青華而白實其名曰戾音狼服之不夭或作芺言盡夀也可以為腹病治為作巳也一凡苦山之首自休與之山至于大騩之山凡十有九山千一百八十四里其十六神者皆豕身而人面其祠毛牷用一羊羞為薦羞言以羊嬰用一藻玉瘞五彩者也藻玉玉有玉藻藉也或曰所以盛苦山少室太室皆也其祠之太牢之具嬰以吉玉其神狀皆人面而三首其餘屬皆豕身人面也中次八經荆山之首曰景山郡界中今在南其上多金玉其木多杼檀柱之柱杼音椽雎水出焉疽之疽雎音癰東南流注于江山東南至南郡枝江縣入江也今睢水出新城魏昌縣東南發阿其中多丹粟多文魚有斑東北百里曰荆山沐鄉縣南今在新城其隂多鐵其陽多赤金其中多犛牛徼外也音狸一音來旄牛属也黑色出西南多虎豹其木多松栢其草多竹多橘櫾也皮厚味酸櫾似橘而大漳水出焉而東南流注于雎當陽縣入沮水出荆山至南郡其中多黃金多鮫魚鮒鮫皮可飾刀劒口錯治材角今臨海郡亦有之音交魚也皮有珠文而堅尾長三四尺末有毒螫人其獸多閭麋大也似鹿而又東北百五十里曰驕山其上多玉其下多青䨼其木多松栢多桃枝鈎端神圍處之魚之鼉音鼉其狀如人面羊角虎爪恒遊于睢漳之淵府奥也淵水之出入有光又東北百二十里曰女几之山其上多玉其下多黄金其獸多豹虎多閭麋麖麂毛豹脚音几麂似獐而大偎其鳥多白鷮走且鳴音驕鷮似雉而長尾多翟多頭赤喙食蝠蛇頭雄大如鵰紫綠色長名隂諧也名運目雌又東北二百里曰冝諸之山其上多金玉其下多青䨼洈水出焉詭音而南流注于漳山至華容縣入江也今洈水出南郡東洈其中多白玉又東北三百五十里曰綸山倫音其木多梓柟多桃枝多柤栗橘櫾而酢濇柤似棃其獸多閭麈麢㚟脚青色音勑㚟似菟而鹿反略又東北二百里曰陸䣀之山告之跪音如跪其上多㻬琈之玉其下多堊其木多杻橿又東百三十里曰光山其上多碧其下多木神計蒙處之其狀人身而龍首恒遊于漳淵出入必有飄風暴雨又東百五十里曰岐山其陽多赤金其隂多白珉似石音旻玉者其上多金玉其下多青䨼其木多樗神涉處之笑逰切徒河切一作其狀人身而方面三足又東百三十里曰銅山其上多金銀鐵其木多榖柞柤栗橘櫾其獸多豹又東北一百里曰羙山其獸多兕牛多閭麈多豕鹿其上多金其下多青䨼又東北百里曰大堯之山其木多松栢多梓桑多机其草多竹其獸多豹虎麢㚟又東北三百里曰靈山其上多金玉其下多青䨼其木多桃李梅杏而酢也梅似杏又東北七十里曰龍山上多寓木宛童見爾雅寄生也一名其上多碧其下多赤錫其草多桃枝鈎端又東南五十里曰衡山上多寓不榖柞多黄堊白堊又東南七十里曰石山其上多金其下多青䨼多寓木又南百二十里曰若山其上多㻬琈之玉多赭土赤多邽石詳未多寓木多柘作前若或又東南一百二十里曰彘山多羙石多柘又東南一百五十里曰玉山其上多金玉其下多碧鐵其木多栢楢一作又東南七十里曰讙山其木多檀多邽石多白錫白今也鑞郁水出于其上潜于其下其中多砥礪又東北百五十里曰仁舉之山其木多穀柞其陽多赤金其隂多赭又東五十里曰師每之山其陽多砥礪其隂多青䨼其木多栢多檀多柘其草多竹又東南二百里曰琴皷之山其木多榖柞椒柘樹小椒為草木則蠚死而叢生下有其上多白珉其下多洗石其獸多豕鹿多白犀其鳥多鴆凡荆山之首自景山至琴皷之山凡二十三山二千八百九十里其神狀皆鳥身而人面其祠用一雄雞祈瘞埋之也禱請已用一藻圭糈用稌驕山冡也其祠用羞酒少牢祈瘞嬰毛一璧中次九經岷山之首曰女凡之山其上多石其木多杻橿其草多菊洛水出焉東注于江其中多雄黃出水中雄黃亦其獸多虎豹又東北三百里曰岷山江水出焉廣陽縣西大江所出岷山今在汶山郡東北流注于海縣入海至廣陽其中多良善良多鼉大者長似蜥蜴皮可以冐皷二丈有鱗彩其上多金玉其下多白珉其木多梅棠其獸多犀象多夔牛為䕫牛晉太興元年此牛出上今蜀山中有大牛重數千斤名八檐肉即爾雅所謂魏庸郡人弩射殺得三十其鳥多翰鷩赤鷩白翰又東北一百四十里曰崍山江水出焉漢嘉嚴道縣卭來山今在㹮㹮似熊而黒白駮亦食銅鐵也南江水所自出也山有九折坂出東流注大江其陽多黄金其隂多麋麈其木多檀柘其草多薤韭多葯䖀即空奪脫也即蛇被又東一百五十里曰崌山居音江水出焉江北東流注于大江其中多怪蛇水中鈎取岸上人牛馬啖之又呼今永昌郡有鈎蛇長數丈尾岐在此也馬絆虻謂多䲀魚未聞音䞇其木多楢杻車材音秋楢剛木也中多梅梓其獸多䕫牛麢㚟犀兕有鳥焉狀如鴞而赤身白首其名曰竊脂者為竊脂疑此非也今呼小青萑曲觜肉食可以禦火又東三百里曰髙梁之山其上多堊其下多砥礪其木多桃枝鈎端有草焉狀如葵而赤華莢實白柎可以走馬又東四百里曰蛇山其上多黄金其下多堊其木多栒多豫樟其草多嘉榮少辛有獸焉其狀如狐而白尾長耳名狼巴音見則國内有兵有亂一作國又東五百里曰鬲山其陽多金其隂多白珉蒲薨音之水出焉而東流注于江其中多白玉其獸多犀象熊羆多猨蜼蒼黄色雨則自縣樹以尾塞鼻孔或以蜼似猕猴鼻露上向尾四五尺頭有岐塞之兩指又東北三百里曰隅陽之山其上多金玉其下多青䨼其木多梓桑其草多茈徐之水出焉東流注于江其中多丹粟又東二百五十里曰岐山羡陽縣西今在扶風其上多白金其下多鐵其木多梅梓音梅或作多杻楢減水出焉東南流注于江又東三百里曰勾檷之山之椐音絡椐其上多玉其下多黄金其木多櫟柘其草多芍藥又東一百五十里曰風雨之山其上多白金其下多石其木多棷樿理中擳騶善二音棷木未詳也樿木白多楊宣余之水出焉東流注于江其中多蛇其獸多閭麋多麈豹虎其鳥多白鷮又東北二百里曰玉山其陽多銅其隂多赤金其木多豫樟楢杻其獸多豕鹿麢㚟其鳥多鴆又東一百五十里曰熊山有穴焉熊之穴恒出神人夏啓而冬閉是穴也冬啓乃必有兵山下有石皷象今鄴西北有皷與此穴殊象而同應懸著山旁鳴則有軍事其上多白玉其下多白金其木多樗柳其草多寇脱又東一百四十里曰騩山其陽多羙玉赤金其隂多鐵其木多桃枝荆又東二百里曰葛山其上多赤金其下多瑊石勁石瑊石音緘似玉也其木多柤栗橘櫾楢杻其獸多麢㚟其草多嘉榮又東一百七十里曰賈超之山其陽多黄堊其隂多羙赭其木多柤栗橘櫾其中多龍脩細生山石穴中龍須也似莞而以為席莖倒垂可凡岷山之首自女几山至于賈超之山凡十六山三千五百里其神狀皆馬身而龍首其祠毛用一雄雞瘞糈用稌文山勾檷風雨醜之山是皆也其祠之羞酒以酹神先進酒少牢具嬰毛一吉玉熊山席也之所憑席者神也止其祠羞酒大牢具嬰毛一璧干儛用兵以禳除之禳祓盾武儛也祭名儛者持祈璆冕舞冕服也羙玉曰璆已求反所求福祥也祭用玉儛者中次十經之首曰首陽之山其上多金玉無草木又西五十里曰虎尾之山其木多椒椐多封石其陽多赤金其隂多鐵又西南五十里曰繁繢之山潰音其木多楢杻其草多枝勾有此草今山中又西南二十里曰勇石之山無草木多白金多水又西二十里曰復州之山其木多檀其陽多黄金有鳥焉其狀如鴞而一足彘尾其名曰跂踵企音見則其國大疫䕫不為樂興反以來悲銘曰跂踵為鳥一足似又西三十里曰楮山多寓木多椒椐多柘多堊州之山一作渚又西二十里曰又原之山其陽多青䨼其隂多鐵其鳥多鸜鵒鵒來巢音臞鴝鵒也傳曰鴝又西五十里曰涿山其木多榖柞杻其陽多㻬琈之玉又西七十里曰丙山其木多梓檀多弞杻未詳弞義所凡首陽山之首自首山至于丙山凡九山二百六十七里其神狀皆龍身而人面其祠之毛用一雄雞瘞糈用五種之糈堵山也其祠之少牢具羞酒祠嬰毛一璧瘞騩山帝也其祠羞酒太牢其合巫祝二人儛嬰一璧中次一十一山經荆山之首曰翼望之山湍水出焉反鹿摶東流注于濟穰縣而入清水今湍水逕南陽貺水出焉况音東南流注于漢其中多蛟癭大者十數圍卵如一二石甕似蛇而四脚小頭細頸頸有白人吞其上多松栢其下多漆梓其陽多赤金其隂多珉又東北一百五十里曰朝歌之山潕水出焉在南陽潕水今音武舞陽縣東南流注于榮其中多人魚其上多梓柟其獸多麢麋有草焉名曰莽草可以毒魚殺魚今用之又東南二百里曰帝囷之山反去倫其陽多㻬琈之玉其隂多鐵帝囷之水出于其上潜于其下多鳴蛇又東南五十里曰視山其上多韭有井焉名曰天井夏有水冬竭其上多桑多羙堊金玉又東南二百里曰前山其木多櫧冬夏生作屋柱難音諸似柞子可食作儲腐或多栢其陽多金其隂多赭又東南三百里曰豐山有獸焉其狀如蝯赤目赤喙黄身名曰雍和見則國有大恐神耕父處之常逰清泠之淵出入有光時水赤有光耀今有屋祠之清冷水在西號郊縣山上神來見則其國為敗有九鐘焉是知霜鳴知也物有自然感霜降則鍾鳴故言可為也應而不其上多金其下多榖柞杻橿又東北八百里曰牀之山其陽多鐵其木多藷藇其草多雞榖其本如雞卵其味酸甘食者利於人又東六十里曰皮山多堊多赭其木多松栢又東六十里曰瑶碧之山其木多梓柟其隂多青䨼其陽多白金有鳥焉其狀如雉食蜚名曰鴆盤也蜚非食蛇之鴆也音翡此更一種鳥又東四十里曰支離之山濟水出焉南流注于漢濟今入漢酈離音字亦同水出酈縣西北山中南有鳥焉其名曰嬰勺其狀如鵲赤目赤喙白身其尾若勺勺形似酒其鳴自呼多㸲牛多羬羊又東北五十里曰祑之山彫音其上多松栢机栢葉栢衣去垢核堅正黒可以間香纓一名括樓也似栁皮黄不措子似棟着酒中飲之辟惡氣浣又西北一百里曰堇理之山其上多松栢多羙梓其隂多丹䨼多金其獸多豹虎有鳥焉其狀如鵲青身白喙白目白尾名曰青耕可以禦疫其鳴自呌又東南三十里曰依軲之山枯音其上多杻橿多苴詳未音有獸焉其狀如犬虎爪有甲其名曰獜甲音吝言體有鱗善駚鞅奮兩音跳躍自撲也食者不風天風不畏又東南三十五里曰即谷之山多羙玉多玄豹也則黒豹出黒虎也今荆州山中多閭麈多麢㚟其陽多珉其隂多青䨼又東南四十里曰鷄山其上多羙梓多桑其草多韭又東南五十里曰髙前之山其上有水焉甚寒而清潜或作帝臺之漿也出停不流俗名為盎漿即此也今河東觧縣南檀首山上有水潜飲之者不心痛其上有金其下有赭又東南三十里曰游戯之山多杻橿榖多玉多封石又東南三十五里曰從山其上多松栢其下多竹從水出于其上潜于其下其中多三足鼈枝尾名能見三足龞雅爾食之無蠱疫又東南三十里曰嬰䃌之山真音其上多松栢其下多梓櫄又東南三十里曰畢山帝苑之水出焉東北流注于視其中多水玉多蛟其上多㻬琈之玉又東南二十里曰樂馬之山有獸焉其狀如彚赤如丹火其名曰戾音見則其國大疫又東南二十五里曰葴山視水出焉瀙水今在南陽或曰視冝為瀙也東南流注于汝水其中多人魚多蛟多頡狗如青又東四十里曰嬰山其下多青䨼其上多金玉又東三十里曰虎首之山多苴椆椐也音彫椆未詳又東二十里曰嬰侯之山其上多封石其下多赤錫又東五十里曰大孰之山殺水出焉東北流注于視水其中多白堊又東四十里曰卑山其上多桃李苴梓多纍狸豆之今虎豆縢音誄属纍一名又東三十里曰倚帝之山其上多玉其下多金有獸焉其狀如鼣鼠鼠形所未詳也音狗吠之吠爾雅說鼠有十三種中有此白耳白喙名曰狙如蛆音即見則其國有大兵又東三十里曰鯢山倪音鯢水出于其上潜于其下其中多羙堊其上多金其下多青䨼又東三十里曰雅山灃水出焉水出南陽音禮今澧東流注于視水其中多大魚其上多羙桑其下多苴多赤金又東五十里曰宣山淪水出焉東南流注于視水其中多蛟其上有桑焉大五十尺丈也圍五其枝四衢交互言枝出四其葉大尺餘赤理黃華青柎名曰帝女之桑主蚕婦女名桑故以又東四十五里曰衡山南嶽也俗謂之岣嶁山今衡山在衡陽湘南縣其上多青䨼多桑其鳥多鸜鵒又東四十里曰豐山其上多封石其木多桑多羊桃狀如桃而方莖桃一名可以為皮張腫起治皮又東七十里曰嫗山其上多羙玉其下多金其草多鷄榖又東三十里曰鮮山其木多楢杻苴其草多冬其陽多金其隂多鐵有獸焉其狀如膜大赤喙赤目白尾見則其邑有火名曰即移音又東三十里曰章山童山或作其陽多金其隂多羙石臯水出焉東流注于澧水其中多脆石脆反未聞魚又東二十五里曰大支之山其陽多金其木多榖柞無草木又東五十里曰區吴之山其木多苴又東五十里曰聲匈之山其木多榖多玉上多封石又東五十里曰大騩之山山疑同名上已有此其陽多赤金其隂多砥石又東十里曰踵臼之山無草木又東北七十里曰歴磨或作石之山其木多荆芑其陽多黄金其隂多砥石有獸焉其狀如狸而白首虎爪名曰梁渠見則其國有大兵又東南一百里曰求山求水出于其上潜于其下中有羙赭其木多苴多䉋属篠其陽多金其隂多鐵又東二百里曰丑陽之山其上多椆椐有鳥焉其狀如烏而赤足名曰餘柑之枳音如枳可以禦火又東三百里曰奧山其上多栢杻橿其陽多㻬琈之玉奥水出焉東流注于視水又東三十五里曰服山其木多苴其上多封石其下多赤錫又東三百里曰杳山其上多嘉榮草多金玉又東三百五十里曰几山其木多楢檀杻其草多香有獸焉其狀如彘黃身白頭白尾名曰聞隣音見則天下大風音瓶一作凡荆山之首自翼望之山至于几山凡四十八山三千七百三十二里其神狀皆彘身人首其祠毛用一雄雞祈瘞用一珪糈用五種之精禾山帝也其祠太牢之具羞瘞倒毛牲埋之也薦羞反倒用一璧牛無常堵山玉山也皆倒祠羞毛少牢嬰毛吉玉中次十二經洞庭山之首曰篇遇之山肩或作無草木多黃金又東南五十里曰雲山無草木有桂竹甚毒傷人必死交趾有篥竹實中勁强有毒銳以刺虎中之則死今始興郡桂陽縣出筀竹大者圍二尺長四丈又也亦此其上多黃金其下多㻬琈之玉又東南一百三十里曰山其木多榖柞椆椐其上多黄金其下多青雄黃多扶竹杖也名之扶老竹卭竹也髙節實中中又東七十里曰丙山多筀竹多黄金銅鐵無木又東南五十里曰風伯之山其上多金玉其下多痠石文石石之義未詳痠多鐵其木多栁杻檀楮其東有林焉名曰莽浮之林多羙木鳥獸又東一百五十里曰夫夫之山其上多黄金其下多青雄黃其木多桑楮其草多竹雞皷神于兒居之其狀人身而身操兩蛇常逰于江淵出入有光又東南一百二十里曰洞庭之山又有洞庭陂潛伏今長沙巴陵縣西木葉下皆謂此也字或作銅冝從水通江離騷曰邅吾道洞庭洞庭波其上多黄金其下多銀鐵其木多柤棃橘櫾其草多葌蘪蕪芍藥芎藭牀而香也蘪蕪似蛇帝之二女居之為神即列仙傳江妃天帝之二女而處江圗玉版曰湘夫人者帝堯女也秦始皇浮江至湘山二女也離騷九歌所謂湘夫人稱帝子者是也而河妃也死而葬此列女傳曰二女死扵江湘之間俗謂逢大風而問博士湘君何神博士曰聞之堯二女舜而死二妃從之俱溺死於湘江遂號為湘夫人按九為湘君鄭司農亦以舜妃為湘君說者皆以舜陟方有虙妃也此之為靈與天地並矣安得謂之堯女且歌湘君湘夫人自是二神江湘之有夫人猶河洛之舜葬蒼梧二妃不從明二妃生不從征死不從葬義既謂之堯女安得復總云湘君哉何以考之禮記曰裳救井廪之難豈當不能自免於風波而有双淪可知矣即令從之二女靈達鍳通無方尚能以烏工比三公四瀆比諸侯今湘川不及四瀆無秩於命祀之患乎假復如此傳曰生為上公死為貴神禮五岳為夫人也參互其義義既混錯錯紵其理理無可據而二女帝者之后配靈神祇無緣當復下降小水而實相亂莫矯其失習非勝是終古不悟可悲矣斯不然矣原其致謬之由由乎俱以帝女為名名是常逰于江淵澧沅之風交瀟湘之淵江之淵府則此言二女逰戯湘沅水皆共㑹巴陵頭故號為三江之口澧又去之七皷三江令風波之氣共相交通言其靈響之意也江釣瀟湘今所在未詳也瀟音肖八十里而入江焉淮南子曰弋是在九江之間志九地里皆東會于大江書曰九江孔殷是也江今在潯陽南江自潯陽而分為九出入必以飄風雨是多怪神狀如人而載蛇左右手操蛇多怪鳥又東南一百八十里曰山其木多㯶柟荆竹箭䉋箘箭見禹貢亦篠中其上多黄金玉其下多文石鐵其獸多麋鹿就見廣雅就鵰也又東南二百里曰即公之山其上多黄金其下多㻬琈之玉其木多栁杻檀桑有獸焉其狀如而白身赤首名曰蛫詭音是可以禦火又東南一百五十九里曰堯山其隂多黃堊其陽多黃金其木多荆芑栁檀其草多藷藇㭉又東南一百里曰江浮之山其上多銀砥礪無草木其獸多豕鹿又東二百里曰真之山其上多黃金其下多玉其木多榖柞栁杻其草多榮草又東南一百二十里曰陽帝之山多羙銅其木多檀杻檿楮桑也檿山其獸多麢麝又南九十里曰柴桑之山南共廬山相連也今在潯陽柴桑縣其上多銀其下多碧多冷石赭其木多栁芑楮桑其獸多麋鹿多白蛇飛蛇霧而飛者即螣蛇乗又東二百三十里曰榮余之山其上多銅其下多銀其木多栁芑其蟲多怪蛇怪蟲凡洞庭山之首自篇遇之山至于榮余之山凡十五山二千八百里其神狀皆鳥身而龍首其祠毛用一雄鷄一牝豚刉刺之名刉亦割糈用稌凡夫夫之山即公之山堯山陽帝之山皆冢也其祠皆肆瘞牲玉而後埋肆陳之也陳之藏祈用酒毛用少牢嬰毛一吉玉洞庭榮余山神也其祠皆肆瘞前埋之也肆竟然後依祈酒太牢祠嬰用圭璧十五五彩惠之方言也惠猶飾也右中經之山志大凡百九十七山二萬一千三百七十一里大凡天下名山五千三百七十居地大凡六萬四千五十六里禹曰天下名山經五千三百七十山六萬四千五十六里居地也言其五臧盖其餘小山甚衆不足記云天地之東西二萬八千里南北二萬六千里出水之山者八千里受水者八千里出銅之山四百六十七出鐵之山三千六百九十此天地之所分壤樹榖也戈矛之所發也刀鎩之所起也者有餘拙者不足封於太山禪於梁父七十二家得失之數皆在此内是謂國用之王七十二家也子地數云封禪右五臧山經五篇大凡一萬五千五百三字
