body:
  text: 監學今刻郭注山海寘諸公庫摹印流傳永為士大夫博學之助成化戊子夏五月朝刋大夫子祭酒襄邢瀼等僅俧山海經校勘記卷上前二行重三葉郭氏傳正文移前一行餘卷同行宋本吴本並在首行以下後四麗之水岀焉本宋吳本音几二字注於下二行注焉下注音几三字無作字四葉後愈並作愈五行注宋本吳本五葉前本吳二字行注無此後三懦作儒行宋本後七玉凡凡字三行吴本無六葉前柜作秬三行注吴木九葉前沫兕並脫兕字行注宋本吴本前六音銀五行泿字下七行注吴本此二字在十葉前扇之團無此吴本字前四行注三重十一葉藻恐誤行注宋本同後三時本作詩行注宋本吳後八所未詳也無此吴本字一行注四十二葉前蔽作數四行注吳本十三葉前創本作瘉行注宋本同吴前五竦者音橋無音橋二字四行注吴本竦作聳十四葉後音潜涔字下九行注吴本在十五葉前徤作善二行注吴本十六葉前音美目眄兮之眄此七字行吴本無後五九百五十百九十行吴本作五後八珪作圭前四行吴本十七葉西次不提行八行注吴本此條十八葉前未詳此二字葉前七吳本無二十一行澤作黑前三行注宋本二十二葉之栖也字下無也字行注吴本栖上有所後五主也有音韶宋本下字後三行注二二十四葉九氣作之氣前三行注宋本吴本二十五葉鵲作雀行注吴本前四驅外字外同恐誤後一行注宋本吴本二十六葉或榴榴二字後五行吴本上有二十七葉集甞注同前二行吴本作二十九葉汵冷注同前四行注吴本作三十一葉玼本作毗注宋本吴九行㳙作有後四行注吴本三十五葉敲作繫吴本前九行注三十九葉猬彚此二字九行注吴本無四十葉前儛作舞後八行注吴本四十一葉屋有是字吴本下後六行注四十三葉作行注吴本後七榮作滎後六行注宋本四十四葉繩作黽葉前五吴本四十六注行成作城行注吴本前六樓作婁行注吴本後六郯作剡前八行注吴本五十一葉餘作余六吴本後行鴛鴦夗央前七行注吴本作五十二葉蟞作敝吴本卷下一行六葉後泠冷恐誤三行吴本作七葉後石作玉二行注吴本九葉後旋玉無玉字後二宋本吴本十葉行鳴作名一行注吴本十二葉前蒿作艾行吴本後四辛本作莘行宋本吴後五酸作辛三吴本十行注葉後一治有也字六行注吴本下十五葉前侜作舟八行注呉本十八葉前音有綽字行宋本下後三計作記前八行注吴本二十一葉岐作歧後一行注宋本二十三葉莞作筦前一行吴本二十六葉霜鳴作降行吴本鳴後二鳴作名前八行注吴本二十八葉虎豆狸豆作且後六行注吳本豆三十三葉共作与六行注吴本四十葉前作前三行宋本四十一葉丈夫注同恐誤行丈吴本作大後三此本吴北前三行注作四十二葉音空一字後六行宋本下四十三葉帝作地前四行注吴本五十二葉谷作苦宋本前四行五十三葉孟鳥不提行後九行注宋本吴本五十六葉作盡後三行注宋本六十三葉九畝下本作載後七行下字吴六十八葉從作前六行宋本六十九葉漂作漂後九行注吴本七十五葉擾作揉吳本前二行葉八十四東海海並作經宋本吴本此書黄蕘翁嘗以宋本黄省曾本吴匏菴毛抄本匯校於古今逸史本上甲冬江安傅沅叔先生得見黄校於京華廠肆因屬吴君慈培迻寫宋本吴抄兩校筆於所藏明嘉靖前山書屋潘侃本之上以宋本罕覯吴抄亦不傳於世也叢刊再版蒙以迻校本珍重郵示謂可錄附叢刊成化本後檢勘數過其長處不勝枚舉古書非校不可讀宜乎前賢之不憚其煩也亟爲照傳於此並誌所自以諗讀是書者己巳中元閩縣林志烜識山海經目緫十八卷十字緫五萬一千二百六十九字本三萬九百十九字注二萬三百五南山經第一字注二千一百七字本三千五百四十七西山經第二字注三千二百二字本五千六百七十二北山經第三注二千三百八十二字本五千七百四十六字東山經第四三百七十五字本二千四十字注中山經第五注三千四百八十五字本四千七百一十八字海外南經第六注六百三十二字本五百一十一字海外西經第七注四百五十二字本五百三十七字海外北經第八注四百九十三字本五百八十四字海外東經第九注五百九十五字本四百四十二字海内南經第十字注七百九字本三百六十四海内西經第十一注六百九十五字本四百三十九字海内北經第十二注四百九十五字本五百九十四字海内東經第十三一千四百九十五字本六百二十四字注大荒東經第十四注八百一十三字本八百六十四字大荒南經第十五注五百九十八字本九百七十三字大荒西經第十六字注一千二百三字本一千二百八十二大荒北經第十七注七百六十七字本一千五十六字海内經第十八字此海内經及大荒經本皆逸在外本一千二百十一字泫九百六十七侍中奉車都尉光祿大夫臣秀領校祕書言校祕書太常屬臣望所校山海經凡三十二篇今定為一十八篇巳定山海經者出於唐虞之際昔洪水洋溢漫衍中國民人失據﨑嶇於丘陵巢於木鯀既無功而帝尭使禹之禹乗四載随山刋木定髙山大川蓋與伯翳主驅禽獸命山川草木别水土四嶽佐之以周四方逮人跡之所希至及舟輿之所罕到内别五方之山外分八方之海紀其珎寳竒物異方之所生水土草木禽獸昆蟲麟鳳之所止禎祥之所及四海之外絶域之國殊之人禹别九州任土作貢而益等物善惡著山海經皆賢聖之遺事古文之著明者也其事質明有信孝武皇帝時甞有獻異鳥者食之百物所不肯食東方朔見之言其鳥名又言其所當食如朔言問朔何以知之即山海經所出也孝宣皇帝時擊磻石於上郡䧟得石室其中有反盗祴人時臣秀父向為諌議大夫言此貳之臣也詔問何以知之亦以山海經對其文曰貳殺窫窳帝乃梏之䟽属之山桎其右足反两手上大驚朝士由是多竒山海經者文學大儒皆讀學以為竒可以考禎祥變恠之物見逺國異人之謡俗故易曰言天下之至而不可亂也物之君子其可不惑焉臣秀昧死謹上國學新山海卷帙殽混行列牽聮尚多譌舛閣老彭先生嘗是正之予手為緬校以便檢閲若正未正猶有望於博雅君子成化庚寅春正月榖旦後學古呉陳鑑緝熙識
