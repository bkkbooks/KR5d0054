front:
  text: 山海經序世之覽山海經者皆以其閎誕迂誇多竒言莫不疑焉甞試論之曰荘生有云人之所知莫若其所不知吾於山海經見之矣夫以宇宙之寥廓群生之紛紜隂陽之煦蒸萬殊之區分精氣渾淆自相潰薄逰魂靈怪觸像而流形於山川麗状於木石者惡可勝言乎然則緫其所以乖皷之於一響成其所以變混之於一象世之所謂異未知其所以異世之所謂不異未知其所以不異何者物不自異待我而後異異果在我非物異也故胡人見布而疑黂越人見而駭毳夫翫所習見而竒所希聞此人情之常蔽也今略舉可以明之者陽火出於氷水隂䑕生於炎山而俗之論者莫之或怪及談山海經所載而咸怪之是不怪所可怪而怪所不可怪也不怪所可怪則㡬於無怪矣怪所不可怪則未始有可怪也夫然所不可不可所不可然則理無不然矣按汲郡竹書及穆天子傳穆王西征見西王母執璧帛之好獻錦組之属穆王享王母于瑶池之上賦詩徃來辭義可遂襲崑崙之丘逰軒轅之宫眺鍾山之嶺玩帝者之寳勒石王母之山紀跡玄圃之上乃取其嘉木草竒鳥怪獸玉石珎瑰之噐金膏燭銀之寳歸而殖養之於中國穆王駕八駿之乗右服盗驪左驂騄耳造父為御犇戎為右萬里長騖以周歷四荒名山大川靡不登濟東升大人之堂西燕王母之廬南轢黿鼉之梁北躡積羽之衢窮歡極娱然後旋歸按史記穆王得盗驪騄耳驊騮之驥使造父御之以西廵狩見西王母樂而忘歸亦與竹書同左傳曰穆王欲肆其心使天下皆有車轍馬跡焉竹書所載則是其事也而譙周之徒足為通識瑰儒而雅不平此驗之史考以著其妄司馬遷叙大宛傳亦云自張騫使大夏之後窮河源惡覩所謂崑崙者乎至禹本紀山海經所有怪物余不敢言也不亦悲乎若竹書不潜出於千載以作徴於今日者則山海之言其㡬乎廢矣若乃東方生暁畢方之名劉子政辨盗械之尸王頎訪兩靣之客海民長臂之衣精驗潜效絶代懸符於戯群惑者其可以少窹乎是故聖皇原化以極變象物以應怪鑒無滯曲畫幽情神焉廋哉神焉廋哉盖此書跨世七代歷載三千雖暫顯於漢而尋亦寝廢其山川名號所在多有舛謬與今不同師訓莫傳遂湮泯道之所存俗之所䘮悲夫余有懼焉故為之創傳䟽其壅閡闢其茀蕪領其玄致標其洞渉庶㡬令逸文不墜于世竒言不絶於今夏后之迹靡刋於來八荒之事有聞於後裔不亦可乎夫蘙薈之翔叵以論垂天之蹄涔之逰無以知絳虬之騰釣天之庭豈伶人之所躡無航之津豈蒼兕之所渉非天下之至通難與言山海之義矣嗚呼逹物之客其鑒之哉
