body:
  text: 大荒北經第十七郭氏傳東北海之外大荒之中河水之間附禺之山帝顓頊與九嬪葬焉義所作冡此皆殊俗爰有乆文貝離俞鸞鳥凰鳥大物小物有也言備有青鳥琅鳥玄鳥黄鳥虎豹熊羆黄蛇視肉璿瑰瑶碧皆出衛於山邉也在其山丘方圓三百里丘南帝俊竹林在焉大可為舟節則可以為船言舜林中竹一也竹南有赤澤水赤也水色名曰封淵大也封亦有三桑無枝百仞皆髙丘西有沉淵顓頊所浴有胡不與之國胡夷語皆通然一國復名耳今烈姓黍食大荒之中有山名曰不咸有肅愼氏之國去遼東三今肅愼國風寒其人皆工射弓長四尺勁彊箭以楛為之長尺千餘里穴居無衣衣猪皮冬以膏塗體厚數分用却晋大興三年平州刺史崔毖遣别駕髙㑹使來獻肅五寸青石為銅此春秋時隼集陳侯之庭所得矢也通得用此今名之為挹婁國出好貂赤玉豈從海外愼氏之弓矢箭鏃有似銅骨作者問云轉與海内國所謂挹婁國是也轉而至此乎後漢書有悲蛭四翼兩音翡窒有蟲獸首蛇身名曰琴蟲也亦蛇有人名曰大人有大人之國釐姓黍食有大青蛇黄頭食麈鹿鹿亦麈属也今南方蚦蛇食有榆山有鯀攻程州之山而名物也皆因其事大荒之中有山名曰衡天有先民之山有槃木千里盤音有叔歜國一音觸音昨感反顓頊之子黍食使四鳥虎豹熊羆有黑蟲如熊状名曰猎猎音夕同或作獡有北齊之國姜姓使虎豹熊羆大荒之中有山名曰先檻大逢之山河濟所入海北注焉海外入此山中也河濟注海已復出其西有山名曰禹所積石有陽山者有順山者順水出焉有始州之國有丹山西征得一丹山今所在亦有丹此山純出丹朱也竹書曰和甲土穴中山丹出有大澤方千里羣鳥所觧野飛鳥所觧其羽乃於此穆天子傳曰北至廣原之征行流沙千里積羽千里皆謂此澤也獵鳥獸絶羣載羽百車竹書亦曰穆王北有毛民之國皆生毛其人面體依姓食黍使四鳥禹生均國均國生役采役采作來采一生脩鞈祫之祫音如單脩鞈殺綽人名人帝念之潜為之國之為國潜宻用是此毛民有儋耳之國任姓儋耳鏤畫其耳亦以放之也其人耳大下儋垂在肩上失崖禺號子食榖北海之渚中給食謂禺彊也言在海島中種粟有神人面鳥身珥兩青蛇踐兩赤蛇名曰禺彊大荒之中有山名曰北極天樻匱音海水北注焉有神九首人面鳥身名曰九鳯又有神衘蛇操蛇其狀虎首人身四蹄長肘名曰彊良獸中亦在畏大荒之中有山名曰成都載天有人珥兩黄蛇把兩黄蛇名曰夸父后土生信信生夸父夸父不量力欲追日景逮之於禺谷也今作虞禺淵日所入將飲河而不足也將走大澤未至死于此死渴應龍已殺尤又殺夸父殺死無定名觸事而寄明其變化無方不可揆測上云夸父不量力與日競而死今此復云為應龍所乃去南方處之故南方多雨相感故也言龍水物以又有無膓之國是任姓長也為人無繼子食魚謂膓也維亦當作䏿共工臣名曰相繇聲轉耳相栁也語九首蛇身自環旋也言轉食于九土殘也言貪其所歍所尼吒尼止也歍嘔猶噴即為源澤氣力言多不辛乃苦酷烈言氣百獸莫處之也言畏禹湮洪水殺相繇水由以禹塞洪之也溺殺其血腥臭不可生榖其地多水不可居也膏血言其淵水也滂流成禹湮之三仞三沮之地䧟壊也言禹以土塞乃以為池群帝是因以為臺因來在此共作臺地下宜積土故衆帝在崑崙之北有岳之山㝷竹生焉竹名尋大大荒之中有山名曰不句海水入焉有係昆之山者有共工之臺射者不敢北嚮之也言畏有人衣青衣名曰黄帝女魃妭之魃音如旱尤作兵伐黄帝黄帝乃令應龍攻之冀州之野炎帝戰于阪泉之野而滅之見史記冀州中土也黄帝亦教虎豹熊羆以與應龍畜水尤請風伯雨師縱大風雨黄帝乃下天女曰魃雨止遂殺尤魃不得復上所居不雨在也旱氣叔均言之帝後置之赤水之北之也遠徙叔均乃為田祖田主田祖有神之官詩云魃時亡之逐也畏見所欲逐之者令曰神北行位也向水先除水道决通溝瀆除水道今之逐魃是也言逐之必得雨故見先有人方食魚名曰深目民之國昐姓食魚深黄帝時姓也亦胡但眼絶有鍾山者有女子衣青衣名曰赤水女子獻也神女大荒之中有山名曰融父山順水入焉有人名曰犬戎黄帝生苖龍苖龍生融吾融吾生弄卞一作明弄明生白犬白犬有牝牡配合也言自相是為犬戎肉食有赤獸馬狀無首名曰戎宣王尸神名也犬戎之有山名曰齊州之山君山山潜音鮮野山魚山有人一目當面中生一曰是威姓少昊之子食黍有繼無民無民任姓無骨子食氣魚曰徐偃王有筋無骨言有無骨人也尸子西北海外流沙之東有國曰中䡢顓頊之子食黍有國名曰頼丘有犬戎國有神人靣獸身名曰犬戎西北海外黑水之北有人有翼名曰苖民之民三苖顓頊生驩頭驩頭生苖民苖民百姓食肉有山名曰章山大荒之中有衡石山九隂山泂野之山上有赤樹青葉赤華名曰若木其華光赤下照地生崑崙西附西極有牛之國有人無骨儋耳之子無骨子也儋耳人生西北海之外赤水之北有章尾山有神人面蛇身而赤千里身長直目正乘正乘未聞直目目從也其瞑乃晦其視乃明眠為夜也言視為晝不食不不息風雨是謁致風雨言請是燭九隂幽也照九隂之是謂燭龍詩含神霧曰天不足西北無離騷曰日安不到燭龍何燿云淮南子曰長于委羽之山不見天日也有隂陽消息故有龍衘精以徃黜天門中
