front:
  text: 東山經第四
  hash: sha256:404b56c9c8c4d00a34f00e28e74bf41d3dac30cc3813b7564296b298aeade28f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_SBCK_004-1a}
body:
  text: 郭氏傳東山經之首曰樕之山二音速株北臨乾昧也音妺亦山名食水出焉而東北流注于海其中多鱅鱅之魚容音其状如犂牛文者牛似虎其音如彘鳴又南三百里曰藟山誎音其上有玉其下有金湖水出焉東流注于食水其中多活師謂之活東科斗也爾雅又南三百里曰栒状之山其上多金玉其下多青碧石有獸焉其状如犬六足其名曰從從其鳴自詨有鳥焉其状如鷄而䑕毛其名曰䖪䑕咨音見則其邑大旱水出焉枳音而北流注于湖水其中多箴魚其状如儵其喙如箴水中亦有之出東海今江東食之無疫疾又南三百里曰勃亝之山無草木無水又南三百里曰番條之山無草木多沙減水出焉同音之减减損北流注于海其中多鱤魚頰音感一名黄又南四百里曰姑兒之山其上多漆其下多桑柘姑兒之水出焉北流注于海其中多鱤魚又南四百里曰髙氏之山其上多玉其下多箴石以可癰腫者為砥針治諸繩之水出焉東流注于澤其中多金玉又南三百里曰嶽山其上多桑其下多樗濼水出焉樂音東流注于澤其中多金玉又南三百里曰犲山其上無草木其下多水其中多堪㐨之魚音序未詳有獸焉其状如夸父而彘毛其音如呼見則天下大水又南三百里曰獨山其上多金玉其下多羙石末塗之水出焉而東南流注于沔其中多䖺䗤二音條容其状如黄蛇魚翼出入有光見則其邑大旱又南三百里曰泰山縣西北從山下至頂四十八里即東嶽岱宗也今在泰山奉髙步也三百其上多玉其下多金有獸焉其状如豚而有珠名曰狪狪桐之桐音如吟其名自䚯環水出焉東流注于江海一作其中多水玉又南三百里曰竹山錞于江涯一作無草木多瑶碧激水出焉而東南流注于娶檀之水其中多茈羸凡東山經之首自樕之山以至于竹山凡十二山三千六百里其神状皆人身龍首祠毛用一犬祈䎶用魚叩其鼻以䎶社音鈎餌之餌以血塗祭為䎶也公羊傳云蓋東次二經之首曰空桑之山材見周禮也此山出琴瑟北臨食水東望沮呉南望沙西望湣澤旻音有獸焉其状如牛而虎文其音如欽吟或作其名曰軨軨靈音其鳴自叫見則天下大水又南六百里曰曹夕之山其下多榖而無水多鳥獸又西南四百里曰嶧皐之山亦音其上多金玉其下多白堊嶧皐之水出焉東流注于激女之水其中多蜃珧蚌屬腎遥兩音蜃蚌也珧玉珧亦又南水行五百里流沙三百里至于山之尾無草木多砥礪又南三百八十里曰山之首無草木澧水出焉礼音東流注于余澤其中多珠蟞魚鼈音其状如肺而有目六足有珠其味酸甘食之無癘秋曰澧水之魚名曰無時氣病也吕氏春珠魚之羙也朱蟞六足有又南三百八十里曰餘峩之山其上多梓柟其下多荆雜余之水出焉東流注于黄水有獸焉其状如莬而鳥喙䲭目蛇尾見人則眠死也言佯名曰犰狳二音仇餘其鳴自䚯見則螽蝗為敗敗田苗音終螽蝗也言傷又南三百里曰杜父之山無草木多水又南三百里曰耿山無草木多水碧王亦水多大蛇有獸焉其状如狐而魚翼其名曰朱獳儒音其鳴自叫見則其國有恐又南三百里曰盧其之山無草木多沙石沙水出焉南流注于涔水其中多鶘音其状如鴛鴦而人足其鳴自䚯見則其國多土功似人脚形状也今鵜胡足頗有又南三百八十里曰姑射之山無草木多水又南水行三百里流沙百里曰北姑射之山無草木多石又南三百里曰南姑射之山無草木多水又南三百里曰碧山無草木多大蛇多碧水玉又南五百里曰維氏之山無草木多金玉原水出焉東流注于沙澤氏之山一曰俠又南三百里曰姑逢之山無草木多金玉有獸焉其状如狐而有翼其音如鴻鴈其名曰獙獙斃音見則天下大旱又南五百里曰鳬麗之山其上多金玉其下多箴石有獸焉其状如狐而九尾九首虎爪名曰蠪姪二音龍蛭其音如嬰兒是食人又南五百里曰䃌山真反音一南臨䃌水東望湖澤有獸焉其状如馬而羊目四角牛尾其音如獋狗其名曰峳峳攸音見則其國多狡客猾也狡狡有鳥焉其状如鳬而䑕尾善登木其名曰絜鈎見則其國多疫凡東次二經之首自空桑之山至于䃌山凡十七山六千六百四十里其神状皆獸身人靣載觡角為觡麋鹿屬格音其祠毛用一鷄祈嬰用一璧瘞又東次三經之首曰尸胡之山北望山詳音其上多金玉其下多有獸焉其状如麋而魚目名曰妴胡婉音其鳴自䚯又南水行八百里曰岐山其木多桃李其獸多虎又南水行五百里曰諸鈎之山無草木多沙石是山也廣員百里多魚音味即鮇魚又南水行七百里曰中父之山無草木多沙又東水行千里曰胡射之山無草木多沙石又南水行七百里曰孟子之山其木多梓桐多桃李其草多菌蒲之未詳音其獸多麋鹿是山也廣員百里其上有水出焉名曰碧陽其中多鱣鮪似鱣而長鮪即鱏也䱎一名鱑也鼻體無鱗甲别名又南水行五百里曰流沙行五百里有山焉曰跂踵之山企跂音廣員二百里無草木有大蛇其上多玉有水焉廣員四十里皆涌地底濆沸涌出其深無限即今河東汾隂縣有瀵水源在也此其名曰深澤其中多蠵文彩似瑇瑁而薄音蠵觜蠵大也甲有反遺知有魚焉其状如鯉而六足鳥尾名曰鮯鮯之魚蛤音其鳴自叫又南水行九百里曰踇隅之山字音敏其上有草木多金玉多赭有獸焉其状如牛而馬尾名曰精精其鳴自呌又南水行五百里流沙三百里至于無皐之山南望幼海東方有渚曰少海即少海也淮南子曰東望榑木二音扶枽無草木多風是山也廣員百里凡東次三經之首自尸胡之山至于無睪之山凡十九山六千九百里其神状皆人身而羊角其祠用一牡羊米用是神也見則風雨水為敗又東次四經之首曰北號之山臨于北海有木焉其状如楊赤華其實如而無核其味酸甘食之不瘧食水出焉而東北流注于海有獸焉其状如狼赤首䑕目其音如豚名曰猲狙二音葛苴是食人有鳥焉其状如鷄而白首䑕足而虎爪其名曰鬿祈音雀亦食人又南三百里曰旄山無草木蒼體之水出焉而西流注于展水其中多鱃魚或作鱃秋音今蝦鰌字亦其状如鯉而大首食者不疣又南三百二十里曰東始之山上多蒼玉有木焉其状如楊而赤理其汁如血不實其名曰起音可以服馬則馬調良以汁塗之泚水出焉而東北流注于海其中多羙貝多茈魚其状如鮒一首而十身其臭如蘪蕪食之不䊧失氣也孚謂反止又東南三百里曰女烝之山其上無草木石膏水出焉而西注于鬲水其中多薄魚其状如鱣魚而一目其音如歐吐聲也如人嘔見則天下大旱又東南二百里曰欽山多金玉而無石師水出焉而北流注于皐澤其中多鱃魚多文貝有獸焉其狀如豚而有牙其名曰當康其鳴自叫見則天下大穰又東南二百里曰子桐之山子桐之水出焉而西流注于餘如之澤其中多䱻魚滑音其状如魚而鳥翼出入有光其音如鴛鴦見則天下大旱又東北二百里曰剡山多金玉有獸焉其状如彘而人面黄身而赤尾其名曰合窳庾音其音如嬰兒是獸也食人亦食蟲蛇見則天下大水又東二百里曰太山上多金玉楨木冬不凋女楨也葉有獸焉其状如牛而白首一目而蛇尾其名曰蜚翠之翡音如翡行水則竭行草則死見則天下大疫也其銘曰蜚之言其體含災氣於鴆厲萬物斯懼思爾遐逝為名體似無害所經枯竭甚鈎水出焉而北流注于勞水其中多鱃魚凡東次四經之首自北號之山至于大山凡八山一千七百二十里右東經之山志凡四十六山萬八千八百六十里
