body:
  text: 海外南經第六郭氏傳地之所載六合之間爲六合也四方上下四海之内照之以日月經之以星辰紀之以四時要之以太歳神靈所生其物異形或夭或壽唯聖人能通其道則不能原極其情變言自非窮理盡性者海外自西南陬至東南陬者也音騶陬猶隅結匈國在其西南其爲人結匈人結喉也臆前胅出如南山在其東南自此山來蟲爲蛇蛇號爲魚以蛇爲魚以蟲爲蛇一曰南山在結匈東南比翼鳥在其東其爲鳥青赤鳬似兩鳥比翼一曰在南山東羽民國在其東南其為人長頭身生羽卵生畫似仙能飛不能逺也人一曰在比翼鳥東南其為人長頰状鳥喙赤目而啓筮曰羽民之首白有神人二八連臂為帝司夜於此野夜見晝在羽民東其為人小頰赤肩正赤也當脾上盡十六人增益語耳疑此後人所畢方鳥在其東青水西其為鳥人面一脚一曰在二八神東讙頭國在其南其為人人靣有翼鳥喙方捕魚堯臣讙兠子居南海而祠之畫亦似仙人也有罪自投南海而死帝憐之使其一曰在畢方東或曰讙朱國厭火國在其國南獸身黒色生火出其口中火畫似言能吐黒色也獼猴而一曰在讙朱東三株樹在厭火北生赤水上其爲如栢葉皆爲珠一曰其爲樹若彗星状如彗三苖國在赤水東其爲人相隨苖之君非之帝殺之昔堯以天下讓舜三南海爲三苖國有苖之民叛入一曰三毛國臷國在其東音替音秩亦其爲人黄操弓射蛇云此國大荒經穀衣服自然有五一曰臷國在三毛東貫匈國在其東其爲人匈有竅貫匈者有深目者有尸子曰四夷之民有國去其衣則無自然者蓋似效此貫匈人也長肱者黄帝之徳甞致之異物志曰穿匈之一曰在臷國東交脛國在其東其爲人交脛雕題交趾者也或作頸言脚脛曲戾相交所謂頸而行也其爲人交一曰在穿匈東不死民在其東其爲人黒色壽不死不死樹食之乃有貟丘山上有飲之不老壽亦有赤泉一曰在穿匈國東岐舌國在其東或云支舌也其人舌皆岐一曰在不死民東崑崙墟在其東墟四方基也墟山下一曰在岐舌東爲墟四方羿與鑿齒戰於壽華之野羿射殺之在崑崙墟東羿持弓矢鑿齒持盾長五六尺因以名云鑿齒亦人也齒如鑿一曰戈詳未三首國在其東其為人一身三首一曰在鑿齒東周饒國在其東其為人短小冠帶為機巧有五榖也其人長三尺穴居一曰焦僥國在三首東至也詩含神霧曰從中州以外傳云焦饒民長三尺短之僥國人長尺五寸也東西四十萬里得焦長臂國在其東捕魚水中兩手各操一魚人手下垂舊說云其之過沃沮國其東界臨大海近日之所出問其耆老至地魏黄初中玄菟太守王頎討髙句麗王宫窮追如中人衣兩袖長三尺即此長臂人衣也海東復有人否云甞在海中得一布褶身一曰在焦僥東捕魚海中狄山帝堯葬于陽榖林今陽城縣西吕氏春秋曰堯葬狄山帝堯于陽西東阿縣城次鄊中赭陽縣湘亭吕氏春秋曰堯榖林今陽城縣堯南皆有帝嚳于隂縣城南䑓隂野中也音酷嚳堯父號髙辛今冡在頓丘爰有熊羆文虎執大行之而右雕虎也彫虎也尸子曰中黄伯余左蜼豹猴蜼獼離朱今圖作赤烏木名也見莊子視肉食之無盡尋復更生如故聚肉形如牛肝有兩目也吁咽詳也所未文王皆其所中案帝王冡墓皆有定䖏今文王墓在長安鄗聚社廣及恩洽鳥獸至扵殂亡四海若䘮考蚍無思不哀而山海經徃徃復見之者盖以聖人久扵其位仁化起土為冡是以所在有焉亦猶漢氏諸逺郡國皆有故絶域殊俗之人聞天子崩各自立坐而祭醊哭泣其遺也天子廟此一曰湯山一曰爰有熊羆文虎蜼豹離朱乆鴝鶹乆屬之視肉虖交詳也所未其范林方三百里濫布衍也言林木汜方祝融獸身人面乘兩龍也火神
