body:
  text: 海内北經第十二郭氏傳海内西北陬以東者蛇巫之山上有人操杯而東向立一曰山棓字同杯或作西王母梯几而戴勝杖慿也梯謂其南有三青鳥為西王母取食鳥主給使又有三足在崑崙虚北有人曰大行伯把戈其東有犬封國可以訓乃浮之㑹稽東南海中得三昔盤瓠殺戎王髙辛以羙女妻之不為羙人是為狗封之民也百里地封之生男為狗女貳負之尸在大行伯東犬封國曰犬戎國頭自相牝牡遂為此國黄帝之後卞明生白天二狀如犬國也言狗有一女子方跪進柸食食也與酒有文馬縞身朱鬛如縞色白目若黄金名曰吉量良一作乘之壽千歳犬戎文周書曰六韜曰文身朱鬛眼若黄金項若鷄尾名曰雞斯之馬赤鬛白身目若黄金名曰黄之乘成王時獻之千歳者惟名有不同說有小錯其實一物耳今博舉乘大傳曰駮身朱鬛雞目山海經亦有吉黄之乘壽異聞也之以廣國在貳負之尸北為物人靣而一目一曰貳負神在其東為物人面蛇身蜪犬如犬青陶音食人從首始蚼音鉤或作蚼窮竒狀如虎有翼蝟毛如食人從首始所食髪在蜪犬北一曰從足帝堯臺帝嚳臺帝丹朱臺帝舜臺各二臺臺四方在崑崙東北輙共為築立臺以標顕其遺跡也一本此盖天子廵狩所經過夷狄慕聖人恩徳種五谷以為衆帝之臺云所殺相桞地腥臊不可大蠭其狀如螽朱蛾其狀如蛾如壷赤蛾如象謂此也蛾蚍蜉也楚詞曰玄蜂蟜其為人虎文脛有䏿膓也音橋言脚有膊在窮竒東一曰狀如人崑崙虚北所有物事也此目上闒非人靣而獸身青色榻音據比椽比一云之尸其為人折頸髪無一手環拘其為人獸首人身一曰蝟狀如狗黄色袜其為物人身黑首從目魅也袜即戎其為人人首三角林氏國有珍獸大若虎五彩畢具尾長於身名曰騶吾乘之日行千里氏國求得此獸獻之紂大説乃釋六韜云紂囚文王閎夭之徒林身食虎豹大傳謂之侄獸吾宜作虞也之周書曰夾林酋耳酋耳若虎尾參於崑崙虚南所有汜林方三百里從極之淵深三百仭維氷夷都焉南云馮夷得道氷夷馮夷也淮伯无夷者竹書作馮夷字或作氷也以潛大川即河伯也穆天子傳所謂河氷夷人靣乘兩龍靈車駕二龍四靣各乗一曰忠極之淵陽汙之山河出其中門之山河出其中所出之處也皆河之枝源王子夜之尸兩手兩股胷首齒皆斷異處而神連貌此盖形觧為宻離不為踈乖而氣合合不舜妻登比氏生宵明燭光能光照因名云即二女字也以處河大澤溢漫處澤河邊二女之靈照此所方百里燭及者方百里言二女神光所一曰登北氏盖國在鉅燕南倭北倭属燕以女為主其俗露紒衣倭國在帶方東大海内妬忌一男子數十婦也服無針㓛以丹朱塗身不朝鮮在列陽東海北山南列陽属燕箕子所封也列朝鮮今樂浪縣方帶方有列口縣亦水名也今在列姑射在海河洲中所經者莊子所謂藐姑射之山也山名也山有神人河洲在海中河水姑射國在海中属列姑射西南山環之大蟹在海中之蟹也盖千里陵魚人靣手足魚身在海中大鯾居海中也音鞭鯾即魴魚明組邑居海中祖音蓬萊山在海中獸盡白望之如雲在渤海中也上有仙人宫室皆以金玉為鳥大人之市在海中
