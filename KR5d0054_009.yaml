  text: 山海經卷之九
  hash: sha256:62a0f2837d08f7b8b54b3f3540f9129d6f9b6ab923e6cc9575e5925761d6c650
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0054_HFL_009-001a, image: hfl/0676/0676-126.png}
body:
  text: 郭璞傳海外東經海外自東南陬至東北陬者𨲠丘音嗟或作髮爰有遺玉青馬視肉揚柳甘祖甘華甘果所生在東海兩山夾丘上有樹木一曰嗟丘一曰百果所在在堯葬東大人國在其北為人大坐而削船一曰在𨲠丘北奢比之尸在其北亦神名也獸身人面大耳珥兩青蛇珥似蛇貫耳也音釣餌之餌一曰肝榆之尸在大人北君子國在其北衣冠帶劎食獸使二文虎在左右其人好讓不爭有薰或作堇華草朝生夕死一曰在肝榆之尸北虹虹音薛在其北各有兩首虹螮蝀也一曰在君子國北朝陽之谷神曰天吳是為水伯在虹虹北兩水間其為獸也八首人面八足八尾皆青黃大荒東經云十尾青丘國在其北其人食五穀衣絲帛其狐四足九尾一曰在朝陽北汲郡竹書曰柏杼子征于東海及三壽得一狐九尾即此類也帝命堅亥步自東極至于西極五億十選堅亥健行人選萬也九千八百步堅亥右手把算左手指青丘北一曰禹令堅亥一曰五億十萬九千八百步詩含神霧曰天地東西二億三萬三千里南北二億一千五百里天地相去一億五萬里黑齒國在其北東夷傳曰倭國東四千餘里有裸國裸國東南有黑齒國船行一年可至也異物志云西屠染齒亦以放此人為人黑食稻啖蛇一赤一青一作一青蛇在其旁一曰在堅亥北為人黑手食稻使蛇其一蛇赤下有湯谷谷中水熱也湯谷上有扶桑扶桑木也十日所浴在黑齒北居水中有大木九日居下枝一日居上枝莊周云昔者十日並出草木焦枯淮南子亦云堯乃令羿射十日中其九日日中烏盡死離騷所謂羿焉畢日烏焉落羽者也歸藏鄭母經云昔者羿善射畢十日果畢之汲郡竹書曰胤甲即位居西河有妖孽十日並出明此自然之異有自來矣傳曰天有十日日之數十此云九日居下枝一日居上枝大荒經又云一日方至一日方出明天地雖有十日自使以次第迭出運照而今俱見為天下妖災故羿稟堯之命洞其靈誠仰天控弦而九日潛退也假令器用可以激水烈火精感可以降霜回景然則羿之鑠明離而斃陽烏未足為難也若搜之常情則無禮以然推之以數則無往不通達觀之客宜領其玄致歸之冥會則逸義無滯奇言不廢矣雨師妾在其北雨師謂屏翳也其為人黑兩手各操一蛇左耳有青蛇右耳有赤蛇一曰在十日北為人黑身人面各操一龜玄股之國在其北髀以下盡黑故云其為人衣魚以魚皮為衣也食鷗鷗水鳥也音憂使兩鳥夾之一曰在雨師妾北毛民之國在其北為人身生毛今去臨海郡東南二千里有毛人在大海洲島上為人短小面體盡有毛如豬能穴居無衣服晉永嘉四年吳郡司鹽都尉戴逢在海邊得一船上有男女四人狀皆如此言語不通送詣丞相府未至道死唯有一人在上賜之婦生子出入市井漸曉人語自説其所在是毛民也大荒經云毛民食黍者是矣一曰在玄股北勞民國在其北其為人黑食果草實也一鳥兩頭或曰殺民一曰在毛民北為人面目手足盡黑褒兩龍東方勾芒鳥身人面乘兩龍靈威仰之佐也木神也方面素服墨子曰昔秦穆公有明德上帝使勾芒賜之壽十九年建平元年四月丙戌待詔太常屬臣望校治侍中光祿勳臣龔侍中奉車都尉光祿大夫臣秀領主省海外東經圖讚君子國東方氣仁國有君子薰華是食雕虎是使雅好禮讓禮委論理天吳耽耽水伯號曰谷神八頭十尾人面虎身龍據兩川威無不震九尾狐青丘奇獸九尾之狐有道翔見出則銜書作瑞周文以標靈符堅亥禹命堅亥青丘之北東盡太遠西窮邠國步履宇宙以明靈德十日十日並出草木焦枯羿乃控弦仰落陽烏可謂洞感天人懸符毛民國牢悲海鳥西子駭麋或貴穴倮或尊裳衣物我相傾孰了是非黑齒國雨師妾玄股國勞民國陽谷之山國號黑齒雨師之妾以蛇挂耳玄股食鷗勞民黑趾東方勾芒有神人面身鳥素服銜帝之命錫齡秦穆皇天無親行善有福山海經卷之九
